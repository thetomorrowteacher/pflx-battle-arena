  render();
}

function startCipherGame() {
  SFX.battleStart();
  // Show rules screen first — roles assigned after player confirms
  state.screen = "cipher_rules";
  render();
}

function cipherStartFromRules() {
  const c = state.cipher;
  SFX.click();

  // Assign roles randomly
  const playerCount = c.players.length;
  const sabCount = CIPHER_CONFIG.saboteurCount;
  const guardianEnabled = CIPHER_CONFIG.guardianEnabled && playerCount >= 5;
  const indices = shuffleArray([...Array(playerCount).keys()]);
  for (let i = 0; i < sabCount; i++) c.players[indices[i]].role = 'saboteur';
  if (guardianEnabled) c.players[indices[sabCount]].role = 'guardian';
  c.players.forEach(p => { if (!p.role) p.role = 'agent'; });

  const myP = c.players.find(p => p.id === state.player.id);
  c.myRole = myP ? myP.role : 'agent';

  // Prepare question pool
  c.questionPool = shuffleArray([...CIPHER_QUESTIONS]);

  // Show role reveal
  state.screen = "cipher_role";
  SFX.roleReveal();
  MUSIC.play('hunt');
  render();

  // Auto-advance to hunt after 4 seconds
  c.phaseTimer = setTimeout(() => {
    c.phase = "hunt";
    cipherAssignLocations();
    initExplorer();
    cipherStartTimer();
    cipherNextQuestion();
    cipherPushEvent('🚀 Cipher Hunt has begun! Use arrow keys to explore the ship.', 'info');
    state.screen = "cipher_hunt";
    render();
    startExplorerLoop();
  }, 4000);
}

// ── Event log helper ──
function cipherPushEvent(text, type) {
  const c = state.cipher;
  const t = cipherTimerStr();
  c.eventLog.push({ text, time: t, type: type || 'info' });
  if (c.eventLog.length > 30) c.eventLog.shift();
}

// ── Saboteur inline action (Among Us kill-button style) ──
function cipherInlineSabotage() {
  const c = state.cipher;
  if (c.myRole !== 'saboteur' || c.saboteurInlineCooldown) return;
  c.saboteurInlineCooldown = true;
  SFX.sabotageAlert();

  // Pick a random sabotage type
  const actions = ['corrupt', 'malfunction', 'falseclue'];
  const action = actions[Math.floor(Math.random() * 3)];
  let msg = '';
  if (action === 'corrupt') {
    const targetTerminal = c.terminalsUnlocked;
    c.sabotageLog.push({ action:'corrupt', terminal: targetTerminal, fixed:false, round: c.roundNumber, message:'⚠️ Terminal integrity compromised!' });
    if (c.terminalsUnlocked > 0) { c.terminalsUnlocked--; c.keysThisTerminal = 0; }
    msg = '⚠️ You corrupted a terminal!';
  } else if (action === 'malfunction') {
    c.sabotageLog.push({ action:'malfunction', round: c.roundNumber, message:'⚡ System malfunction detected!' });
    c.timeRemaining = Math.max(0, c.timeRemaining - 30);
    msg = '⚡ Malfunction triggered! -30s';
  } else {
    const agents = c.players.filter(p => p.role === 'agent' && p.alive && !p.ejected);
    const target = agents[Math.floor(Math.random() * agents.length)];
    if (target) {
      c.sabotageLog.push({ action:'falseclue', target: target.id, round: c.roundNumber, message:`🎭 ${target.brand || 'Unknown'} is acting suspicious...` });
    }
    msg = '🎭 False clue planted!';
  }
  cipherPushEvent(msg, 'danger');
  render();

  // Cooldown resets after 3 more questions
  setTimeout(() => { c.saboteurInlineCooldown = false; }, 15000);
}

// ── Guardian scan ──
function cipherGuardianScan(targetId) {
  const c = state.cipher;
  if (c.myRole !== 'guardian' || c.guardianScannedThisRound) return;
  c.guardianScannedThisRound = true;
  SFX.roleReveal();
  const target = c.players.find(p => p.id === targetId);
  if (!target) return;
  c.guardianScanResult = {
    name: target.brand.split(' ')[0],
    isSab: target.role === 'saboteur',
  };
  cipherPushEvent(`🛡️ Guardian scanned ${target.brand.split(' ')[0]}`, 'info');
  render();
  // Auto-hide scan overlay after 4 seconds
  setTimeout(() => { c.guardianScanResult = null; render(); }, 4000);
}

// ── Fill-in-blank submission ──
function cipherSubmitFillIn() {
  const c = state.cipher;
  if (c.huntAnswered || !c.currentQ || !c.currentQ.fillIn) return;
  const input = document.getElementById('cipherFillInput');
  const answer = (input ? input.value : c.huntFillIn).trim().toLowerCase();
  const correct = c.currentQ.correctAnswer.toLowerCase();
  c.huntAnswered = true;
  c.huntFillIn = answer;
  c.huntCorrect = (answer === correct || correct.includes(answer) && answer.length >= correct.length * 0.7);
  if (c.huntCorrect) {
    cipherHandleCorrectAnswer();
  } else {
    SFX.wrong();
  }
  cipherPostAnswer();
}

// ── Skip vote in discussion ──
function cipherSkipVote() {
  const c = state.cipher;
  clearInterval(c.discussionInterval);
  cipherPushEvent('⏭️ Discussion ended — moving to next round', 'info');
  c.phase = "hunt";
  c.roundNumber++;
  c.guardianScannedThisRound = false;
  c.guardianScanResult = null;
  c.discussionMessages = [];
  c.deadBodies = [];
  cipherAssignLocations();
  cipherNextQuestion();
  MUSIC.play('hunt');
  state.screen = "cipher_hunt";
  render();
  startExplorerLoop();
}

// ── AI discussion message generator ──
function cipherGenerateDiscussionMessages() {
  const c = state.cipher;
  const aiPlayers = c.players.filter(p => p.id !== state.player.id && p.alive && !p.ejected);
  const messages = [];
  const susTemplates = [
    '{name} seems suspicious... low key count.',
    'I think {name} might be the saboteur.',
    'Has anyone noticed {name} acting weird?',
    'Something about {name} is off...',
    "Don't trust {name}. Just a feeling.",
  ];
  const clearTemplates = [
    "I'm definitely not the saboteur.",
    'We need to unlock more terminals. Focus up.',
    'That sabotage was close... stay alert.',
    'I think we should vote this round.',
    "Let's look at the key counts carefully.",
    'Who had the lowest keys this round?',
    'We need to be strategic about voting.',
  ];

  // System message about the sabotage
  const latestSab = c.sabotageLog.filter(s => s.round === c.roundNumber);
  if (latestSab.length > 0) {
    messages.push({ system: true, text: `⚠️ System Alert: ${latestSab[0].message}` });
  }

  // AI messages (2-4 messages from random AI players)
  const msgCount = 2 + Math.floor(Math.random() * 3);
  const shuffledAI = shuffleArray([...aiPlayers]);
  for (let i = 0; i < Math.min(msgCount, shuffledAI.length); i++) {
    const p = shuffledAI[i];
    if (Math.random() > 0.4) {
      // Accuse someone
      const targets = c.players.filter(t => t.id !== p.id && t.alive && !t.ejected);
      const target = targets[Math.floor(Math.random() * targets.length)];
      if (target) {
        const tmpl = susTemplates[Math.floor(Math.random() * susTemplates.length)];
        messages.push({ name: p.brand.split(' ')[0], text: tmpl.replace('{name}', target.brand.split(' ')[0]) });
      }
    } else {
      const tmpl = clearTemplates[Math.floor(Math.random() * clearTemplates.length)];
      messages.push({ name: p.brand.split(' ')[0], text: tmpl });
    }
  }
  return messages;
}

// ── Start discussion phase ──
function cipherStartDiscussion() {
  const c = state.cipher;
  c.phase = "discussion";
  c.discussionTimer = 30; // 30 second discussion
  c.guardianScanResult = null; // reset but keep scanned status
  c.discussionMessages = cipherGenerateDiscussionMessages();
  MUSIC.play('discussion');
  SFX.voteCall();
  cipherPushEvent('💬 Discussion phase — review evidence and vote', 'warning');
  // Add proximity alerts
  const myRoom = c.playerLocations[state.player.id];
  if (myRoom) {
    const nearby = c.players.filter(p => p.id !== state.player.id && c.playerLocations[p.id] === myRoom && !p.ejected);
    if (nearby.length > 0) {
      c.proximityAlert = `📍 You were near ${nearby.map(p => p.brand.split(' ')[0]).join(', ')} during the hunt phase`;
    } else {
      c.proximityAlert = null;
    }
  }

  state.screen = "cipher_discuss";
  render();

  // Discussion countdown
  clearInterval(c.discussionInterval);
  c.discussionInterval = setInterval(() => {
    c.discussionTimer--;
    if (c.discussionTimer <= 0) {
      clearInterval(c.discussionInterval);
      // Auto-skip to next round when discussion timer ends
      cipherSkipVote();
    }
    if (state.screen === 'cipher_discuss') render();
  }, 1000);
}

// ── Shared correct-answer logic ──
function cipherHandleCorrectAnswer() {
  const c = state.cipher;
  SFX.keyCollect();
  if (c.myRole !== 'saboteur') {
    c.totalKeys++;
    c.keysThisTerminal++;
    const myP = c.players.find(p => p.id === state.player.id);
    if (myP) myP.keys = (myP.keys || 0) + 1;
    cipherPushEvent('🔑 You earned a Cipher Key!', 'success');
  } else {
    // Saboteur earns fake keys (display only)
    const myP = c.players.find(p => p.id === state.player.id);
    if (myP) myP.keys = (myP.keys || 0) + 1;
    cipherPushEvent('🔑 Fake key earned (saboteur cover)', 'info');
  }

  // Check terminal unlock
  if (c.myRole !== 'saboteur' && c.keysThisTerminal >= CIPHER_CONFIG.keysPerTerminal) {
    c.terminalsUnlocked++;
    c.keysThisTerminal = 0;
    SFX.terminalUnlock();
    cipherPushEvent(`🔓 Terminal ${TERMINAL_NAMES[c.terminalsUnlocked-1]} UNLOCKED!`, 'success');
    if (c.terminalsUnlocked >= CIPHER_CONFIG.terminalCount) {
      render();
      setTimeout(() => cipherEndGame('agents_win'), 1500);
      return true; // signal game over
    }
  }
  return false;
}

// ── Post-answer flow (shared by MC and fill-in) ──
function cipherPostAnswer() {
  const c = state.cipher;

  // Simulate AI players earning keys
  c.players.forEach(p => {
    if (p.id !== state.player.id && p.alive && !p.ejected) {
      if (p.role !== 'saboteur') {
        if (Math.random() > 0.4) p.keys = (p.keys || 0) + 1;
      } else {
        // Saboteur gets fake keys to blend in
        if (Math.random() > 0.5) p.keys = (p.keys || 0) + 1;
      }
    }
  });

  c.questionsAnswered++;
  render();

  // After every 4 questions, trigger sabotage report → discussion
  if (c.questionsAnswered % 4 === 0 && c.outcome === null) {
    c.phaseTimer = setTimeout(() => {
      c.phase = "sabotage";
      c.sabotageChoice = null;

      // If player is NOT saboteur, AI saboteur acts automatically
      if (c.myRole !== 'saboteur') {
        const sabActions = ['corrupt','malfunction','falseclue'];
        const aiAction = sabActions[Math.floor(Math.random()*3)];
        let sabMsg = '';
        if (aiAction === 'corrupt') {
          const tIdx = c.terminalsUnlocked;
          c.sabotageLog.push({ action:'corrupt', terminal:tIdx, fixed:false, round:c.roundNumber, message:'⚠️ Terminal integrity compromised!' });
          if (c.terminalsUnlocked > 0) { c.terminalsUnlocked--; c.keysThisTerminal = 0; }
          sabMsg = '⚠️ Terminal integrity compromised!';
        } else if (aiAction === 'malfunction') {
          c.sabotageLog.push({ action:'malfunction', round:c.roundNumber, message:'⚡ System malfunction detected!' });
          c.timeRemaining = Math.max(0, c.timeRemaining - 30);
          sabMsg = '⚡ System malfunction detected!';
        } else {
          const agents = c.players.filter(p => p.role === 'agent' && p.alive && !p.ejected);
          const target = agents[Math.floor(Math.random()*agents.length)];
          c.sabotageLog.push({ action:'falseclue', target:target?.id, round:c.roundNumber, message:`🎭 ${target?.brand||'Unknown'} is acting suspicious...` });
          sabMsg = `🎭 Suspicious activity detected!`;
        }
        cipherPushEvent(sabMsg, 'danger');

        // Brief sabotage alert then go to discussion
        state.screen = "cipher_sabotage";
        SFX.sabotageAlert();
        render();
        c.phaseTimer = setTimeout(() => {
          cipherStartDiscussion();
        }, 3000);
      } else {
        // Saboteur chooses their action
        state.screen = "cipher_sabotage";
        SFX.sabotageAlert();
        MUSIC.play('sabotage');
        render();
      }
    }, 1500);
  } else {
    // Next question after delay — chance of crisis event every 2 questions
    c.phaseTimer = setTimeout(() => {
      if (c.outcome !== null) return;
      // Crisis event chance (~20% after every 2nd question, not in first round)
      if (c.questionsAnswered % 2 === 0 && c.questionsAnswered > 2 && Math.random() < 0.2 && !c.crisisActive && c.crisisRound !== c.roundNumber) {
        cipherTriggerCrisis();
        // After crisis resolves, continue with next question
        const crisisCheck = setInterval(() => {
          if (!c.crisisActive && c.outcome === null) {
            clearInterval(crisisCheck);
            cipherNextQuestion();
            state.screen = "cipher_hunt";
            render();
            startExplorerLoop();
          }
        }, 500);
      } else {
        // Shuffle locations occasionally
        if (c.questionsAnswered % 3 === 0) cipherAssignLocations();
        cipherNextQuestion();
        state.screen = "cipher_hunt";
        render();
        startExplorerLoop();
      }
    }, 1500);
  }
}

// ═══════════════════════════════════════════════════════════════════
// SHIP MAP & LOCATIONS
// ═══════════════════════════════════════════════════════════════════
function cipherAssignLocations() {
  const c = state.cipher;
  c.playerLocations = {};
  c.players.forEach(p => {
    if (p.alive && !p.ejected) {
      c.playerLocations[p.id] = SHIP_ROOMS[Math.floor(Math.random() * SHIP_ROOMS.length)].id;
    }
  });
}

function cipherGetPlayersInRoom(roomId) {
  const c = state.cipher;
  return c.players.filter(p => c.playerLocations[p.id] === roomId && p.alive && !p.ejected);
}

function renderShipMap() {
  const c = state.cipher;
  if (!c.playerLocations || Object.keys(c.playerLocations).length === 0) return '';
  const myRoom = c.playerLocations[state.player.id];

  // Draw connections
  let conns = '';
  SHIP_CONNECTIONS.forEach(([a,b]) => {
    const rA = SHIP_ROOMS.find(r=>r.id===a);
    const rB = SHIP_ROOMS.find(r=>r.id===b);
    if (!rA || !rB) return;
    const dx = rB.x - rA.x;
    const dy = rB.y - rA.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const angle = Math.atan2(dy,dx)*180/Math.PI;
    conns += `<div class="ship-conn" style="left:${rA.x}%;top:${rA.y+3}%;width:${len}%;transform:rotate(${angle}deg)"></div>`;
  });

  // Draw rooms
  let rooms = '';
  SHIP_ROOMS.forEach(r => {
    const playersHere = c.players.filter(p => c.playerLocations[p.id] === r.id && !p.ejected);
    const isMyRoom = r.id === myRoom;
    const dots = playersHere.map(p => {
      const isMe = p.id === state.player.id;
      const isDead = !p.alive;
      const color = isMe ? 'var(--pflx-cyan)' : isDead ? '#333' : (p.role === 'saboteur' && c.myRole === 'saboteur') ? 'var(--pflx-red)' : '#8892b0';
      return `<div class="ship-room-dot ${isMe?'dot-me':''} ${isDead?'dot-dead':''}" style="background:${color}" title="${p.brand}"></div>`;
    }).join('');
    const bg = isMyRoom ? 'rgba(0,229,255,0.08)' : 'rgba(255,255,255,0.02)';
    const border = isMyRoom ? 'rgba(0,229,255,0.25)' : 'rgba(255,255,255,0.08)';
    rooms += `<div class="ship-room" style="left:calc(${r.x}% - 24px);top:calc(${r.y}% - 24px);background:${bg};border-color:${border}">
      ${r.icon}<div class="ship-room-name">${r.name}</div>
      <div class="ship-room-players">${dots}</div>
    </div>`;
  });

  const prox = c.proximityAlert ? `<div class="ship-proximity">${c.proximityAlert}</div>` : '';

  return `<div class="ship-map">
    <div class="ship-map-title">🛸 Ship Map — Round ${c.roundNumber}</div>
    ${conns}${rooms}
  </div>${prox}`;
}

// ═══════════════════════════════════════════════════════════════════
// SABOTEUR KILL MECHANIC
// ═══════════════════════════════════════════════════════════════════
function cipherKillPlayer() {
  const c = state.cipher;
  if (c.myRole !== 'saboteur' || c.killCooldown) return;
  const myRoom = c.playerLocations[state.player.id];
  const targets = c.players.filter(p =>
    p.id !== state.player.id && p.alive && !p.ejected && c.playerLocations[p.id] === myRoom
  );
  if (targets.length === 0) {
    cipherPushEvent('💀 No one nearby to eliminate!', 'warning');
    render();
    return;
  }
  // Kill random target in same room
  const victim = targets[Math.floor(Math.random() * targets.length)];
  victim.alive = false;
  c.deadBodies.push({ id: victim.id, name: victim.brand, room: myRoom, discoveredBy: null });
  SFX.eject();
  cipherPushEvent(`💀 You eliminated ${victim.brand.split(' ')[0]}...`, 'danger');

  // Start kill cooldown (45s)
  c.killCooldown = true;
  clearTimeout(c.killCooldownTimer);
  c.killCooldownTimer = setTimeout(() => { c.killCooldown = false; render(); }, 45000);

  render();

  // Body discovery after 5-10 seconds by random alive AI player
  const discoverDelay = 5000 + Math.random() * 5000;
  c.bodyReportTimer = setTimeout(() => {
    if (c.outcome !== null) return;
    const discoverer = c.players.find(p => p.id !== state.player.id && p.alive && !p.ejected && p.role !== 'saboteur');
    if (!discoverer) return;
    cipherBodyReported(victim, discoverer);
  }, discoverDelay);
}

function cipherBodyReported(victim, discoverer) {
  const c = state.cipher;
  if (c.outcome !== null) return;
  c.bodyReported = true;
  SFX.sabotageAlert();
  cipherPushEvent(`☠️ ${discoverer.brand.split(' ')[0]} found ${victim.brand.split(' ')[0]}'s body in ${SHIP_ROOMS.find(r=>r.id===(c.deadBodies.find(b=>b.id===victim.id)?.room))?.name || 'unknown'}!`, 'danger');

  // Show body reported overlay
  render();

  // After 3 seconds, go to emergency discussion
  setTimeout(() => {
    c.bodyReported = false;
    // Check if too many dead = saboteur wins
    const aliveAgents = c.players.filter(p => p.role !== 'saboteur' && p.alive && !p.ejected);
    const aliveSabs = c.players.filter(p => p.role === 'saboteur' && p.alive && !p.ejected);
    if (aliveAgents.length <= aliveSabs.length) {
      cipherEndGame('saboteur_wins');
      return;
    }
    cipherStartDiscussion();
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// CRISIS EVENTS
// ═══════════════════════════════════════════════════════════════════
function cipherTriggerCrisis() {
  const c = state.cipher;
  if (c.crisisActive || c.outcome !== null) return;
  const crisis = CRISIS_TYPES[Math.floor(Math.random() * CRISIS_TYPES.length)];
  c.crisisActive = true;
  c.crisisType = crisis;
  c.crisisTimer = crisis.time;
  c.crisisResolved = false;
  c.crisisInput = '';
  c.crisisHeld = [false, false];
  c.crisisRound = c.roundNumber;

  if (crisis.id === 'o2') {
    c.crisisCode = String(1000 + Math.floor(Math.random() * 9000));
  }

  SFX.sabotageAlert();
  cipherPushEvent(`🚨 CRISIS: ${crisis.name}!`, 'danger');
  render();

  // Crisis countdown
  clearInterval(c.crisisInterval);
  c.crisisInterval = setInterval(() => {
    c.crisisTimer--;
    if (c.crisisTimer <= 0) {
      clearInterval(c.crisisInterval);
      if (!c.crisisResolved) {
        cipherCrisisFailed();
      }
    }
    render();
  }, 1000);
}

function cipherCrisisAction(action) {
  const c = state.cipher;
  if (!c.crisisActive || c.crisisResolved) return;
  const crisis = c.crisisType;

  if (crisis.id === 'reactor') {
    // Toggle hold on stabilizer button
    c.crisisHeld[action] = true;
    SFX.click();
    if (c.crisisHeld[0] && c.crisisHeld[1]) {
      cipherCrisisResolved();
    } else {
      render();
    }
  } else if (crisis.id === 'o2') {
    // Check code input
    if (c.crisisInput === c.crisisCode) {
      cipherCrisisResolved();
    }
  } else if (crisis.id === 'power') {
    // Power outage — auto resolves after timer. Click to resolve early.
    cipherCrisisResolved();
  }
}

function cipherCrisisResolved() {
  const c = state.cipher;
  c.crisisResolved = true;
  c.crisisActive = false;
  clearInterval(c.crisisInterval);
  SFX.terminalUnlock();
  cipherPushEvent('✅ Crisis averted!', 'success');
  const el = document.querySelector('.power-outage-mask');
  if (el) el.remove();
  render();
}

function cipherCrisisFailed() {
  const c = state.cipher;
  const penalty = c.crisisType.penalty;
  c.crisisActive = false;
  clearInterval(c.crisisInterval);
  c.timeRemaining = Math.max(0, c.timeRemaining - penalty);
  SFX.wrong();
  cipherPushEvent(`⚠️ Crisis failed! -${penalty}s penalty!`, 'danger');
  const el = document.querySelector('.power-outage-mask');
  if (el) el.remove();
  if (c.timeRemaining <= 0) {
    cipherEndGame('saboteur_wins');
    return;
  }
  render();
}

function renderCrisisOverlay() {
  const c = state.cipher;
  if (!c.crisisActive || !c.crisisType) return '';
  const cr = c.crisisType;

  let actionHTML = '';
  if (cr.id === 'reactor') {
    actionHTML = `<div class="crisis-action-area">
      <button class="crisis-btn crisis-btn-reactor ${c.crisisHeld[0]?'held':''}" onmousedown="cipherCrisisAction(0)" ontouchstart="cipherCrisisAction(0)">⬅ STABILIZER A</button>
      <button class="crisis-btn crisis-btn-reactor ${c.crisisHeld[1]?'held':''}" onmousedown="cipherCrisisAction(1)" ontouchstart="cipherCrisisAction(1)">STABILIZER B ➡</button>
    </div>`;
  } else if (cr.id === 'o2') {
    actionHTML = `<div style="margin:8px 0;font-family:Orbitron,monospace;font-size:0.6rem;color:#4488ff">Enter Code: <strong>${c.crisisCode}</strong></div>
    <div class="crisis-action-area">
      <input class="crisis-input" id="crisisCodeInput" type="text" maxlength="4" value="${c.crisisInput}" placeholder="0000" autocomplete="off" />
    </div>`;
  } else if (cr.id === 'power') {
    actionHTML = `<div class="crisis-action-area">
      <button class="crisis-btn" style="border-color:#ffd740;color:#ffd740;background:rgba(255,215,64,0.1)" onclick="cipherCrisisAction(0)">🔦 FIND BREAKER</button>
    </div>
    <div style="font-size:0.5rem;color:#5a6a8a;margin-top:8px">Click to restore power!</div>`;
  }

  return `<div class="crisis-overlay crisis-${cr.id}">
    <div class="crisis-card">
      <div style="font-size:2.5rem;margin-bottom:8px">${cr.icon}</div>
      <div class="crisis-title" style="color:${cr.color}">${cr.name}</div>
      <div style="font-size:0.6rem;color:#aab;margin:6px 0">${cr.desc}</div>
      <div class="crisis-timer" style="color:${c.crisisTimer<=3?'var(--pflx-red)':cr.color}">${c.crisisTimer}s</div>
      ${actionHTML}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// MINI-GAMES
// ═══════════════════════════════════════════════════════════════════
function cipherStartMiniGame() {
  const c = state.cipher;
  const types = ['wire','code','pattern','sequence','decoder','logicgrid','mapfragment','pressure'];
  const type = types[Math.floor(Math.random() * types.length)];
  const mg = { type, completed: false, success: false };

  if (type === 'wire') {
    const order = shuffleArray([0,1,2,3]);
    mg.wires = WIRE_COLORS.map((w,i) => ({ ...w, rightIdx: order[i], connected: false }));
    mg.selectedLeft = -1;
    mg.matched = 0;
  } else if (type === 'code') {
    mg.code = String(1000 + Math.floor(Math.random() * 9000));
    mg.showCode = true;
    mg.input = '';
    setTimeout(() => { if (c.miniGame && c.miniGame.type === 'code') { c.miniGame.showCode = false; render(); } }, 2000);
  } else if (type === 'pattern') {
    const count = 3 + Math.floor(Math.random() * 3);
    const cells = shuffleArray([0,1,2,3,4,5,6,7,8]).slice(0, count);
    mg.pattern = cells;
    mg.playerPattern = [];
    mg.showPattern = true;
    mg.phase = 'show';
    setTimeout(() => { if (c.miniGame && c.miniGame.type === 'pattern') { c.miniGame.showPattern = false; c.miniGame.phase = 'input'; render(); } }, 2500);
  } else if (type === 'sequence') {
    const len = 4 + Math.floor(Math.random() * 2);
    mg.sequence = Array.from({length:len}, () => Math.floor(Math.random() * Math.min(6, SEQ_COLORS.length)));
    mg.playerSeq = [];
    mg.showIdx = 0;
    mg.phase = 'show';
    cipherPlaySequence(mg);
  } else if (type === 'decoder') {
    // Cipher Decoder Wheel — rotate inner ring to align symbols and decode message
    const SYMBOLS = ['α','β','γ','δ','ε','ζ','η','θ','ι','κ','λ','μ'];
    const LETTERS = 'ABCDEFGHIJKL'.split('');
    const words = ['BRIDGE','CARGO','ENGINE','HACK','BLADE','CIPHER','LOCK','FUEL','DECK','HELM'];
    const answer = words[Math.floor(Math.random() * words.length)];
    mg.outerRing = LETTERS.slice(0, 12);
    mg.innerRing = SYMBOLS.slice(0, 12);
    mg.correctOffset = Math.floor(Math.random() * 12);
    mg.currentOffset = 0;
    // Build mapping: at correct offset, letter[i] = symbol[(i + correctOffset) % 12]
    mg.encoded = answer.split('').map(ch => {
      const idx = ch.charCodeAt(0) - 65;
      return SYMBOLS[(idx + mg.correctOffset) % 12];
    }).join(' ');
    mg.answer = answer;
    mg.attempts = 0;
  } else if (type === 'logicgrid') {
    // Logic Grid — deduce the saboteur from clues
    const suspects = shuffleArray(['Nexus','Flux','Onyx','Rune']).slice(0,4);
    const rooms = shuffleArray(['Bridge','Cargo','Engine','Reactor']).slice(0,4);
    const sabIdx = Math.floor(Math.random() * 4);
    // Build clues
    const clues = [];
    // Clue 1: one innocent's room
    const inn1 = (sabIdx + 1) % 4;
    clues.push(`${suspects[inn1]} was confirmed in ${rooms[inn1]}.`);
    // Clue 2: another innocent's alibi
    const inn2 = (sabIdx + 2) % 4;
    clues.push(`${suspects[inn2]} was seen working on terminals by multiple witnesses.`);
    // Clue 3: saboteur was NOT in their listed room (they lied)
    clues.push(`${suspects[sabIdx]} claims they were in ${rooms[(sabIdx+3)%4]}, but no one can confirm.`);
    // Clue 4: last innocent cleared
    const inn3 = (sabIdx + 3) % 4;
    clues.push(`Security logs show ${suspects[inn3]} scanned into ${rooms[inn3]} and never left.`);
    mg.suspects = suspects;
    mg.saboteurIdx = sabIdx;
    mg.clues = clues;
    mg.selected = -1;
    mg.revealed = false;
  } else if (type === 'mapfragment') {
    // Map Fragment Assembly — reorder scrambled tiles to match correct order
    const size = 3; // 3x3 grid
    const correct = [0,1,2,3,4,5,6,7,8];
    let tiles;
    do {
      tiles = shuffleArray([...correct]);
    } while (tiles.every((t,i) => t === correct[i])); // ensure not already solved
    mg.tiles = tiles;
    mg.correct = correct;
    mg.size = size;
    mg.selectedTile = -1;
    mg.moves = 0;
    mg.roomIcons = ['🎛️','📡','🏥','🔒','📦','⚙️','☢️','🛸','🗺️'];
  } else if (type === 'pressure') {
    // Pressure Plate Sequence — step on plates in correct order from clue
    const count = 5;
    const icons = shuffleArray(['🔴','🟢','🔵','🟡','🟣','⚪','🟠']).slice(0, count);
    const correctOrder = shuffleArray([...Array(count).keys()]);
    // Build clue from sequence
    const ordinalWords = ['first','second','third','fourth','fifth'];
    const clueLines = correctOrder.map((plateIdx, step) =>
      `${ordinalWords[step].charAt(0).toUpperCase() + ordinalWords[step].slice(1)}: ${icons[plateIdx]}`
    );
    mg.plates = icons;
    mg.correctOrder = correctOrder;
    mg.playerOrder = [];
    mg.clue = clueLines.join(' → ');
    mg.showClue = true;
    mg.failed = false;
    // Hide clue after 4 seconds
    setTimeout(() => { if (c.miniGame && c.miniGame.type === 'pressure') { c.miniGame.showClue = false; render(); } }, 4000);
  }

  c.miniGame = mg;
  c.huntAnswered = false;
  c.huntCorrect = null;
}

function cipherPlaySequence(mg) {
  const c = state.cipher;
  let idx = 0;
  mg.showIdx = -1;
  const iv = setInterval(() => {
    if (!c.miniGame || c.miniGame !== mg) { clearInterval(iv); return; }
    mg.showIdx = mg.sequence[idx];
    render();
    setTimeout(() => {
      if (!c.miniGame || c.miniGame !== mg) return;
      mg.showIdx = -1;
      render();
    }, 400);
    idx++;
    if (idx >= mg.sequence.length) {
      clearInterval(iv);
      setTimeout(() => {
        if (!c.miniGame || c.miniGame !== mg) return;
        mg.phase = 'input';
        render();
      }, 500);
    }
  }, 700);
}

function cipherMiniGameAction(action, val) {
  const c = state.cipher;
  const mg = c.miniGame;
  if (!mg || mg.completed) return;

  if (mg.type === 'wire') {
    if (action === 'left') {
      mg.selectedLeft = val;
      SFX.click();
    } else if (action === 'right' && mg.selectedLeft >= 0) {
      const wire = mg.wires[mg.selectedLeft];
      if (wire.connected) return;
      if (wire.rightIdx === val) {
        wire.connected = true;
        mg.matched++;
        SFX.keyCollect();
        if (mg.matched >= 4) { cipherMiniGameComplete(true); return; }
      } else {
        SFX.wrong();
      }
      mg.selectedLeft = -1;
    }
  } else if (mg.type === 'code') {
    // action = 'submit'
    if (mg.input === mg.code) {
      cipherMiniGameComplete(true);
      return;
    } else {
      SFX.wrong();
      mg.input = '';
    }
  } else if (mg.type === 'pattern') {
    if (mg.phase !== 'input') return;
    const cellIdx = val;
    if (mg.playerPattern.includes(cellIdx)) {
      mg.playerPattern = mg.playerPattern.filter(c => c !== cellIdx);
    } else {
      mg.playerPattern.push(cellIdx);
    }
    SFX.click();
    // Check when same count selected
    if (mg.playerPattern.length === mg.pattern.length) {
      const correct = mg.pattern.every(p => mg.playerPattern.includes(p));
      if (correct) { cipherMiniGameComplete(true); return; }
      else {
        SFX.wrong();
        mg.playerPattern = [];
        mg.showPattern = true;
        mg.phase = 'show';
        setTimeout(() => { if (c.miniGame === mg) { mg.showPattern = false; mg.phase = 'input'; render(); } }, 2000);
      }
    }
  } else if (mg.type === 'sequence') {
    if (mg.phase !== 'input') return;
    mg.playerSeq.push(val);
    SFX.click();
    const idx = mg.playerSeq.length - 1;
    if (mg.playerSeq[idx] !== mg.sequence[idx]) {
      SFX.wrong();
      cipherMiniGameComplete(false);
      return;
    }
    if (mg.playerSeq.length === mg.sequence.length) {
      cipherMiniGameComplete(true);
      return;
    }
  } else if (mg.type === 'decoder') {
    if (action === 'rotate') {
      mg.currentOffset = ((mg.currentOffset + val) % 12 + 12) % 12;
      SFX.click();
    } else if (action === 'submit') {
      mg.attempts++;
      if (mg.currentOffset === mg.correctOffset) {
        cipherMiniGameComplete(true);
        return;
      } else {
        SFX.wrong();
        if (mg.attempts >= 5) { cipherMiniGameComplete(false); return; }
      }
    }
  } else if (mg.type === 'logicgrid') {
    if (action === 'select') {
      mg.selected = val;
      SFX.click();
    } else if (action === 'accuse') {
      mg.revealed = true;
      if (mg.selected === mg.saboteurIdx) {
        cipherMiniGameComplete(true);
        return;
      } else {
        SFX.wrong();
        cipherMiniGameComplete(false);
        return;
      }
    }
  } else if (mg.type === 'mapfragment') {
    if (mg.selectedTile === -1) {
      mg.selectedTile = val;
      SFX.click();
    } else {
      // Swap tiles
      const tmp = mg.tiles[mg.selectedTile];
      mg.tiles[mg.selectedTile] = mg.tiles[val];
      mg.tiles[val] = tmp;
      mg.selectedTile = -1;
      mg.moves++;
      SFX.click();
      // Check if solved
      if (mg.tiles.every((t,i) => t === mg.correct[i])) {
        cipherMiniGameComplete(true);
        return;
      }
      if (mg.moves >= 20) { cipherMiniGameComplete(false); return; }
    }
  } else if (mg.type === 'pressure') {
    if (mg.showClue || mg.failed) return;
    const expectedPlate = mg.correctOrder[mg.playerOrder.length];
    mg.playerOrder.push(val);
    if (val !== expectedPlate) {
      SFX.wrong();
      mg.failed = true;
      cipherMiniGameComplete(false);
      return;
    }
    SFX.keyCollect();
    if (mg.playerOrder.length === mg.correctOrder.length) {
      cipherMiniGameComplete(true);
      return;
    }
  }
  render();
}

function cipherMiniGameComplete(success) {
  const c = state.cipher;
  const mg = c.miniGame;
  if (!mg) return;
  mg.completed = true;
  mg.success = success;
  c.huntAnswered = true;
  c.huntCorrect = success;

  if (success) {
    const gameOver = cipherHandleCorrectAnswer();
    if (gameOver) return;
  } else {
    SFX.wrong();
  }
  render();
  // Continue the game flow
  c.phaseTimer = setTimeout(() => {
    c.miniGame = null;
    cipherPostAnswer();
  }, 1500);
}

function renderMiniGame() {
  const c = state.cipher;
  const mg = c.miniGame;
  if (!mg) return '';

  let inner = '';
  if (mg.type === 'wire') {
    const leftCol = mg.wires.map((w,i) => {
      const cls = (mg.selectedLeft===i?'wire-selected':'') + (w.connected?' wire-matched':'');
      return `<div class="wire-node ${cls}" style="color:${w.color};border-color:${w.color}" onclick="cipherMiniGameAction('left',${i})">${w.icon}</div>`;
    }).join('');
    // Right side in shuffled order
    const rightOrder = [0,1,2,3];
    const rightCol = rightOrder.map(i => {
      const wire = mg.wires.find(w => w.rightIdx === i);
      const matched = wire && wire.connected;
      return `<div class="wire-node ${matched?'wire-matched':''}" style="color:${wire?wire.color:'#555'};border-color:${wire?wire.color:'#333'}" onclick="cipherMiniGameAction('right',${i})">${wire?wire.icon:'⚫'}</div>`;
    }).join('');
    inner = `<div class="minigame-title">🔌 WIRE CONNECT — Match the wires</div>
      <div class="wire-game"><div class="wire-col">${leftCol}</div><div class="wire-status">${mg.matched}/4<br>matched</div><div class="wire-col">${rightCol}</div></div>`;
  } else if (mg.type === 'code') {
    const display = mg.showCode ? mg.code : '????';
    const cls = mg.showCode ? '' : 'code-hidden';
    inner = `<div class="minigame-title">🔢 CODE CRACK — Memorize the code!</div>
      <div class="code-display ${cls}">${display}</div>
      ${!mg.showCode ? `<div class="code-input-wrap"><input class="code-input" id="mgCodeInput" type="text" maxlength="4" value="${mg.input}" placeholder="0000" autocomplete="off" />
      <button class="cipher-fill-submit" onclick="cipherMiniGameAction('submit',0)" style="margin-top:8px">Submit</button></div>` : '<div style="text-align:center;font-size:0.55rem;color:var(--pflx-cyan)">Memorize this code...</div>'}`;
  } else if (mg.type === 'pattern') {
    const cells = Array.from({length:9}, (_,i) => {
      const isLit = mg.showPattern && mg.pattern.includes(i);
      const isSelected = !mg.showPattern && mg.playerPattern.includes(i);
      const cls = isLit ? 'pat-lit' : isSelected ? 'pat-selected' : '';
      return `<div class="pattern-cell ${cls}" onclick="cipherMiniGameAction('pattern',${i})"></div>`;
    }).join('');
    const label = mg.phase === 'show' ? 'Memorize this pattern...' : `Select ${mg.pattern.length} cells to match`;
    inner = `<div class="minigame-title">🧩 PATTERN MATCH — ${label}</div>
      <div class="pattern-grid">${cells}</div>`;
  } else if (mg.type === 'sequence') {
    const btns = SEQ_COLORS.slice(0, Math.min(6, SEQ_COLORS.length)).map((col,i) => {
      const lit = (mg.phase === 'show' && mg.showIdx === i);
      return `<div class="seq-btn ${lit?'seq-lit':''}" style="background:${col}40;color:${col};border-color:${col}30" onclick="cipherMiniGameAction('sequence',${i})"></div>`;
    }).join('');
    const label = mg.phase === 'show' ? 'Watch the sequence...' : 'Repeat the sequence!';
    inner = `<div class="minigame-title">🎵 SEQUENCE — ${label}</div>
      <div class="seq-row">${btns}</div>
      ${mg.phase==='input'?`<div style="text-align:center;font-size:0.5rem;color:#5a6a8a">${mg.playerSeq.length}/${mg.sequence.length}</div>`:''}`;
  } else if (mg.type === 'decoder') {
    // Cipher Decoder Wheel
    const outerHTML = mg.outerRing.map((l,i) => {
      const angle = (i * 30);
      return `<div class="decoder-symbol decoder-outer" style="transform:rotate(${angle}deg) translateY(-70px) rotate(-${angle}deg)">${l}</div>`;
    }).join('');
    const innerHTML = mg.innerRing.map((s,i) => {
      const angle = (i * 30) + (mg.currentOffset * 30);
      return `<div class="decoder-symbol decoder-inner" style="transform:rotate(${angle}deg) translateY(-44px) rotate(-${angle}deg)">${s}</div>`;
    }).join('');
    inner = `<div class="minigame-title">🔮 CIPHER DECODER — Align the wheel to decode</div>
      <div style="text-align:center;font-family:Orbitron,monospace;font-size:0.7rem;color:var(--pflx-gold);letter-spacing:4px;margin:8px 0">${mg.encoded}</div>
      <div class="decoder-wheel-wrap">
        <div class="decoder-wheel outer-wheel">${outerHTML}</div>
        <div class="decoder-wheel inner-wheel">${innerHTML}</div>
        <div class="decoder-center">⚙️</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:10px">
        <button class="btn-arena" style="font-size:0.65rem;padding:8px 16px" onclick="cipherMiniGameAction('rotate',-1)">◄ Rotate</button>
        <button class="btn-arena" style="font-size:0.65rem;padding:8px 16px;background:rgba(0,229,255,0.15)" onclick="cipherMiniGameAction('submit',0)">✓ Decode</button>
        <button class="btn-arena" style="font-size:0.65rem;padding:8px 16px" onclick="cipherMiniGameAction('rotate',1)">Rotate ►</button>
      </div>
      <div style="text-align:center;font-size:0.45rem;color:#5a6a8a;margin-top:6px">Attempts: ${mg.attempts}/5 • Decode "${mg.answer}"</div>`;
  } else if (mg.type === 'logicgrid') {
    // Logic Grid Deduction
    const clueHTML = mg.clues.map((cl,i) => `<div style="font-size:0.55rem;color:#b0bec5;margin:4px 0;padding:4px 8px;background:rgba(255,255,255,0.03);border-radius:6px">📋 ${cl}</div>`).join('');
    const suspectHTML = mg.suspects.map((s,i) => {
      const sel = mg.selected === i;
      const bg = sel ? 'rgba(255,23,68,0.2)' : 'rgba(255,255,255,0.04)';
      const border = sel ? 'rgba(255,23,68,0.5)' : 'rgba(255,255,255,0.08)';
      return `<div style="padding:10px 14px;border-radius:8px;background:${bg};border:1px solid ${border};cursor:pointer;text-align:center;font-family:Orbitron,monospace;font-size:0.6rem;color:${sel?'var(--pflx-red)':'#ccd6f6'};transition:all 0.2s" onclick="cipherMiniGameAction('select',${i})">${s}</div>`;
    }).join('');
    inner = `<div class="minigame-title">🔍 LOGIC GRID — Who is the saboteur?</div>
      <div style="margin:8px 0">${clueHTML}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0">${suspectHTML}</div>
      ${mg.selected >= 0 && !mg.revealed ? `<button class="btn-arena btn-arena-red" style="font-size:0.65rem;padding:8px 20px;display:block;margin:10px auto" onclick="cipherMiniGameAction('accuse',0)">⚡ Accuse ${mg.suspects[mg.selected]}</button>` : ''}`;
  } else if (mg.type === 'mapfragment') {
    // Map Fragment Assembly
    const tileHTML = mg.tiles.map((t,i) => {
      const sel = mg.selectedTile === i;
      const correct = mg.tiles[i] === mg.correct[i];
      const bg = sel ? 'rgba(0,229,255,0.25)' : correct ? 'rgba(0,230,118,0.08)' : 'rgba(255,255,255,0.04)';
      const border = sel ? 'rgba(0,229,255,0.6)' : correct ? 'rgba(0,230,118,0.2)' : 'rgba(255,255,255,0.08)';
      return `<div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;background:${bg};border:1px solid ${border};cursor:pointer;font-size:1.3rem;transition:all 0.2s" onclick="cipherMiniGameAction('mapfragment',${i})">${mg.roomIcons[t]}</div>`;
    }).join('');
    const solved = mg.tiles.every((t,i) => t === mg.correct[i]) ? mg.tiles.length : mg.tiles.filter((t,i) => t === mg.correct[i]).length;
    inner = `<div class="minigame-title">🗺️ MAP FRAGMENT — Reassemble the ship map</div>
      <div style="font-size:0.5rem;color:#5a6a8a;text-align:center;margin:4px 0">Tap two tiles to swap them • ${solved}/${mg.tiles.length} correct • ${mg.moves}/20 moves</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:200px;margin:10px auto">${tileHTML}</div>`;
  } else if (mg.type === 'pressure') {
    // Pressure Plate Sequence
    const plateHTML = mg.plates.map((icon,i) => {
      const pressed = mg.playerOrder.includes(i);
      const bg = pressed ? 'rgba(0,230,118,0.2)' : 'rgba(255,255,255,0.04)';
      const border = pressed ? 'rgba(0,230,118,0.4)' : 'rgba(255,255,255,0.1)';
      const scale = pressed ? 'scale(0.9)' : 'scale(1)';
      return `<div style="width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:${bg};border:2px solid ${border};cursor:${pressed?'default':'pointer'};font-size:1.4rem;transition:all 0.2s;transform:${scale}" onclick="${pressed?'':'cipherMiniGameAction(\\\'pressure\\\','+i+')'}">${icon}</div>`;
    }).join('');
    inner = `<div class="minigame-title">🔲 PRESSURE PLATES — Step in the right order!</div>
      ${mg.showClue ? `<div style="text-align:center;font-family:Orbitron,monospace;font-size:0.6rem;color:var(--pflx-gold);margin:10px 0;padding:10px;background:rgba(255,215,0,0.06);border-radius:8px;border:1px solid rgba(255,215,0,0.15)">${mg.clue}</div>
      <div style="text-align:center;font-size:0.5rem;color:#5a6a8a">Memorize the sequence...</div>` :
      `<div style="text-align:center;font-size:0.5rem;color:var(--pflx-cyan);margin:6px 0">${mg.playerOrder.length}/${mg.correctOrder.length} plates activated</div>`}
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0">${plateHTML}</div>`;
  }

  // Show result
  if (mg.completed) {
    inner += mg.success ?
      `<div class="cipher-key-earned" style="margin-top:12px">🔑 +1 Cipher Key Earned!</div>` :
      `<div style="text-align:center;margin-top:12px;font-family:Orbitron,monospace;font-size:0.65rem;color:var(--pflx-red)">✕ Task Failed</div>`;
  }

  return `<div class="minigame-card">${inner}</div>`;
}

function cipherSendChat() {
  const c = state.cipher;
  const msg = c.chatInput.trim();
  if (!msg) return;
  c.discussionMessages.push({ name: 'You', text: msg, isMe: true });
  c.chatInput = '';
  SFX.click();
  render();

  // AI responds after 1-2 seconds
  c.chatTyping = true;
  render();
  setTimeout(() => {
    if (state.screen !== 'cipher_discuss') return;
    c.chatTyping = false;
    const aiPlayers = c.players.filter(p => p.id !== state.player.id && p.alive && !p.ejected);
    if (aiPlayers.length === 0) { render(); return; }
    const responder = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
    const responses = [
      "Hmm, that's interesting...",
      "I agree, something feels off.",
      "I don't know, I was busy with my terminal.",
      "Wait, really? That changes things.",
      "I was in " + (SHIP_ROOMS[Math.floor(Math.random()*SHIP_ROOMS.length)].name) + " the whole time.",
      "Let's focus on who had the lowest keys.",
      "I think we should vote.",
      "I'm not sure about that...",
      "That's exactly what the saboteur would say.",
      "Can we check who was near the reactor?",
    ];
    c.discussionMessages.push({
      name: responder.brand.split(' ')[0],
      text: responses[Math.floor(Math.random() * responses.length)]
    });
    render();
  }, 1200 + Math.random() * 1500);
}

function cipherStartTimer() {
  const c = state.cipher;
  clearInterval(c.timerInterval);
  c.timerInterval = setInterval(() => {
    c.timeRemaining--;
    if (c.timeRemaining <= 60 && c.timeRemaining % 10 === 0) SFX.timerTick();
    if (c.timeRemaining <= 0) {
      clearInterval(c.timerInterval);
      cipherEndGame('saboteur_wins');
    }
    // Re-render only if on a cipher screen
    if (state.screen.startsWith('cipher_')) render();
  }, 1000);
}

function cipherNextQuestion() {
  const c = state.cipher;
  c.miniGame = null; // clear any previous mini-game

  // ~35% chance of mini-game task instead of question
  if (Math.random() < 0.35 && c.questionsAnswered > 0) {
    c.currentQ = null;
    cipherStartMiniGame();
    return;
  }

  if (c.questionPool.length === 0) {
    c.questionPool = shuffleArray([...CIPHER_QUESTIONS]); // recycle
  }
  const raw = c.questionPool.pop();

  // ~25% chance of fill-in-the-blank question
  const useFillIn = Math.random() < 0.25;

  if (useFillIn) {
    c.currentQ = {
      text: `Define: "${raw.term}"`,
      fillIn: true,
      correctAnswer: raw.def,
      cat: raw.cat, diff: raw.diff,
    };
  } else {
    // Build multiple choice: correct answer + 3 distractors
    const allAnswers = [raw.def, ...raw.distractors];
    const shuffled = [];
    const indices = shuffleArray([0,1,2,3]);
    let correctIdx = 0;
    indices.forEach((origIdx, newIdx) => {
      shuffled.push(allAnswers[origIdx]);
      if (origIdx === 0) correctIdx = newIdx;
    });
    c.currentQ = { text: `What is: "${raw.term}"?`, answers: shuffled, correctIdx, cat: raw.cat, diff: raw.diff };
  }

  c.huntAnswered = false;
  c.huntSelectedAns = -1;
  c.huntCorrect = null;
  c.huntFillIn = '';
}

function cipherAnswerQuestion(idx) {
  const c = state.cipher;
  if (c.huntAnswered) return;
  c.huntAnswered = true;
  c.huntSelectedAns = idx;
  c.huntCorrect = (idx === c.currentQ.correctIdx);

  if (c.huntCorrect) {
    const gameOver = cipherHandleCorrectAnswer();
    if (gameOver) return;
  } else {
    SFX.wrong();
  }

  cipherPostAnswer();
}

function cipherSabotageAction(action) {
  state.cipher.sabotageChoice = action;
  SFX.click();
  render();
}

function cipherConfirmSabotage() {
  const c = state.cipher;
  const action = c.sabotageChoice;
  SFX.sabotageAlert();

  let message = '';
  if (action === 'corrupt') {
    // Find next locked terminal to corrupt
    const targetTerminal = c.terminalsUnlocked;
    c.sabotageLog.push({ action:'corrupt', terminal: targetTerminal, fixed:false, round: c.roundNumber, message:'⚠️ Terminal integrity compromised!' });
    if (c.terminalsUnlocked > 0) { c.terminalsUnlocked--; c.keysThisTerminal = 0; }
    message = 'Terminal corrupted!';
  } else if (action === 'malfunction') {
    c.sabotageLog.push({ action:'malfunction', round: c.roundNumber, message:'⚡ System malfunction detected!' });
    message = 'Malfunction triggered!';
  } else if (action === 'crisis') {
    c.sabotageLog.push({ action:'crisis', round: c.roundNumber, message:'🚨 Ship-wide emergency triggered!' });
    message = 'Crisis triggered!';
    cipherPushEvent(message, 'danger');
    render();
    // Trigger crisis then go to discussion
    c.phaseTimer = setTimeout(() => {
      cipherTriggerCrisis();
      const waitForCrisis = setInterval(() => {
        if (!c.crisisActive) {
          clearInterval(waitForCrisis);
          cipherStartDiscussion();
        }
      }, 500);
    }, 1500);
    return;
  } else {
    const agents = c.players.filter(p => p.role === 'agent' && p.alive);
    const target = agents[Math.floor(Math.random()*agents.length)];
    c.sabotageLog.push({ action:'falseclue', target: target?.id, round: c.roundNumber, message:`🎭 ${target?.brand || 'Unknown'} is acting suspicious...` });
    message = 'False clue planted!';
  }

  cipherPushEvent(message, 'danger');
  render();
  // Advance to discussion phase (not straight back to hunt)
  c.phaseTimer = setTimeout(() => {
    cipherStartDiscussion();
  }, 2500);
}

function cipherCallVote() {
  const c = state.cipher;
  if (c.votesUsed >= CIPHER_CONFIG.voteLimit) return;
  clearInterval(c.discussionInterval);
  SFX.voteCall();
  MUSIC.play('vote');
  c.voteActive = true;
  c.selectedVoteTarget = null;
  c.voteResults = null;
  c.votesUsed++;
  cipherPushEvent('🗳️ Emergency vote called!', 'warning');
  state.screen = "cipher_vote";
  render();
}

function cipherCastVote(playerId) {
  const c = state.cipher;
  if (c.voteResults) return;
  c.selectedVoteTarget = playerId;
  SFX.click();
  render();
}

function cipherConfirmVote() {
  const c = state.cipher;
  const targetId = c.selectedVoteTarget;
  if (!targetId) return;

  // Simulate all players voting (weighted toward real saboteur if guardian is playing)
  const target = c.players.find(p => p.id === targetId);
  const isSaboteur = target && target.role === 'saboteur';

  // 50% chance the group agrees with the human player's vote (majority)
  const ejected = Math.random() > 0.3;

  if (ejected && target) {
    target.alive = false;
    target.ejected = true;
    SFX.eject();
    c.voteResults = {
      ejected: true, ejectedName: target.brand, ejectedRole: target.role,
    };
    if (isSaboteur) {
      c.keysThisTerminal += 1;
      cipherPushEvent(`✅ ${target.brand} was ejected — they were the SABOTEUR!`, 'success');
    } else {
      c.timeRemaining = Math.max(0, c.timeRemaining - 60);
      cipherPushEvent(`❌ ${target.brand} was ejected — they were INNOCENT! -60s penalty`, 'danger');
    }
  } else {
    c.voteResults = { ejected: false };
    cipherPushEvent('🗳️ Vote failed — no one was ejected', 'info');
  }
  render();
}

function cipherResumeAfterVote() {
  const c = state.cipher;
  c.voteActive = false;
  c.voteResults = null;
  c.selectedVoteTarget = null;

  // Check if saboteur was ejected and all saboteurs gone = agents win
  const aliveSabs = c.players.filter(p => p.role === 'saboteur' && p.alive);
  if (aliveSabs.length === 0) {
    cipherEndGame('agents_win');
    return;
  }

  c.phase = "hunt";
  c.roundNumber++;
  c.guardianScannedThisRound = false;
  c.guardianScanResult = null;
  c.discussionMessages = [];
  c.deadBodies = [];
  cipherAssignLocations();
  cipherNextQuestion();
  MUSIC.play('hunt');
  state.screen = "cipher_hunt";
  SFX.navigate();
  render();
  startExplorerLoop();
}

function cipherEndGame(outcome) {
  const c = state.cipher;
  clearInterval(c.timerInterval);
  clearTimeout(c.phaseTimer);
  c.outcome = outcome;

  // Calculate XC rewards
  const isSab = c.myRole === 'saboteur';
  const won = (isSab && outcome === 'saboteur_wins') || (!isSab && outcome === 'agents_win');
  const myP = c.players.find(p => p.id === state.player.id);
  const topEarner = c.players.filter(p => p.role !== 'saboteur').sort((a,b) => (b.keys||0) - (a.keys||0))[0];
  const isTopEarner = topEarner && topEarner.id === state.player.id;

  c.xcRewards = {
    participation: CIPHER_CONFIG.xcParticipation,
    outcome: won ? (isSab ? CIPHER_CONFIG.xcSaboteurWin : CIPHER_CONFIG.xcAgentsWin) : 0,
    topEarner: isTopEarner ? CIPHER_CONFIG.xcTopEarner : 0,
    correctVote: 0, // simplified for preview
  };

  // Award XC to player
  const totalXC = Object.values(c.xcRewards).reduce((s,v) => s+v, 0);
  if (state.player) state.player.xc += totalXC;

  clearInterval(c.discussionInterval);
  if (won) { SFX.victory(); MUSIC.play('victory'); } else { SFX.defeat(); MUSIC.play('defeat'); }
  state.screen = "cipher_result";
  render();
}

function startBattle() {
  SFX.battleStart();
  // Pick random opponent
  const others = PLAYERS.filter(p => p.id !== state.player.id && p.role === "player");
  state.opponent = others[Math.floor(Math.random() * others.length)];
  state.questions = shuffleArray(QUESTIONS).slice(0, state.totalRounds);
  state.round = 0;
  state.myScore = 0;
  state.oppScore = 0;
  state.answered = false;
  state.selectedAns = -1;
  state.showResult = false;
  state.screen = "battle";
  state.timeLeft = state.questions[0].time;
  render();
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 5 && state.timeLeft > 0) SFX.timerTick();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) { SFX.timeout(); answerQuestion(-1); }
    }
    render();
  }, 1000);
}

function answerQuestion(idx) {
  state.answered = true;
  state.selectedAns = idx;
  clearInterval(state.timerInterval);

  const q = state.questions[state.round];
  const correct = idx === q.ans;
  if (idx === -1) {
    // Timeout — SFX already played
  } else if (correct) {
    SFX.correct();
    state.myScore += 100 + Math.max(0, state.timeLeft * 5);
  } else {
    SFX.wrong();
  }
  // Simulate opponent
  const oppCorrect = Math.random() > 0.4;
  if (oppCorrect) state.oppScore += 100 + Math.floor(Math.random() * 50);

  render();

  setTimeout(() => {
    state.showResult = true;
    render();

    setTimeout(() => {
      state.round++;
      if (state.round >= state.totalRounds) {
        // Battle over — play victory or defeat
        const won = state.myScore > state.oppScore;
        if (won) SFX.victory(); else SFX.defeat();
        state.screen = "result";
        render();
      } else {
        state.answered = false;
        state.selectedAns = -1;
        state.showResult = false;
        state.timeLeft = state.questions[state.round].time;
        render();
        startTimer();
      }
    }, 2000);
  }, 800);
}

// TOP-DOWN SHIP EXPLORER (Among Us-style)
// ═══════════════════════════════════════════════════════════════════

// Ship layout in pixel coordinates (canvas is 400x400)
const EXPLORER_ROOMS = [
  { id:'bridge',   name:'Bridge',   icon:'🎛️', cx:200, cy:40,  w:90, h:50, color:'#0e4466' },
  { id:'comms',    name:'Comms',    icon:'📡', cx:340, cy:100, w:70, h:50, color:'#2e1a4e' },
  { id:'medbay',   name:'Medbay',   icon:'🏥', cx:60,  cy:100, w:70, h:50, color:'#1a3e2e' },
  { id:'security', name:'Security', icon:'🔒', cx:200, cy:180, w:80, h:50, color:'#3e2e1a' },
  { id:'cargo',    name:'Cargo',    icon:'📦', cx:60,  cy:280, w:80, h:55, color:'#2e3e1a' },
  { id:'engine',   name:'Engine',   icon:'⚙️', cx:200, cy:340, w:90, h:50, color:'#4e2e1a' },
  { id:'reactor',  name:'Reactor',  icon:'☢️', cx:340, cy:280, w:80, h:55, color:'#4e1a1a' },
];

// Hallways connecting rooms (rectangles)
const EXPLORER_HALLS = [
  { x1:155, y1:55, x2:155, y2:160, w:16 },  // bridge → security (left)
  { x1:245, y1:55, x2:245, y2:160, w:16 },  // bridge → security (right)
  { x1:240, y1:35, x2:305, y2:35, w:16 },   // bridge → comms (top)
  { x1:100, y1:35, x2:155, y2:35, w:16 },   // bridge → medbay (top)
  { x1:60,  y1:140, x2:60,  y2:260, w:16 }, // medbay → cargo
  { x1:340, y1:140, x2:340, y2:260, w:16 }, // comms → reactor
  { x1:155, y1:200, x2:155, y2:260, w:16 }, // security → cargo (left)
  { x1:245, y1:200, x2:245, y2:260, w:16 }, // security → reactor (right)
  { x1:120, y1:300, x2:160, y2:340, w:16 }, // cargo → engine
  { x1:240, y1:340, x2:300, y2:300, w:16 }, // engine → reactor
];

const EXPLORER_KEYS = { ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, w:false, a:false, s:false, d:false };

function initExplorer() {
  const c = state.cipher;
  if (c.explorer) return; // already initialized

  // Place player in a random room
  const startRoom = EXPLORER_ROOMS[Math.floor(Math.random() * EXPLORER_ROOMS.length)];
  c.explorer = {
    px: startRoom.cx, py: startRoom.cy,
    speed: 2.5,
    nearTerminal: null,
    nearBody: null,
    interactCooldown: 0,
    aiPlayers: c.players.filter(p => p.id !== state.player.id && p.alive && !p.ejected).map(p => {
      const room = EXPLORER_ROOMS[Math.floor(Math.random() * EXPLORER_ROOMS.length)];
      return { id: p.id, brand: p.brand, x: room.cx + (Math.random()-0.5)*30, y: room.cy + (Math.random()-0.5)*20, tx: room.cx, ty: room.cy, speed: 1 + Math.random(), alive: p.alive, role: p.role };
    }),
    terminals: EXPLORER_ROOMS.map(r => ({
      roomId: r.id, x: r.cx + 20, y: r.cy - 15, active: true
    })),
  };

  // Place dead bodies in explorer coords
  c.deadBodies.forEach(b => {
    const room = EXPLORER_ROOMS.find(r => r.id === b.room);
    if (room) { b.ex = room.cx + (Math.random()-0.5)*20; b.ey = room.cy + (Math.random()-0.5)*15; }
  });
}

function getPlayerRoom(px, py) {
  for (const r of EXPLORER_ROOMS) {
    if (px >= r.cx - r.w/2 - 4 && px <= r.cx + r.w/2 + 4 && py >= r.cy - r.h/2 - 4 && py <= r.cy + r.h/2 + 4) return r;
  }
  return null;
}

function isWalkable(x, y) {
  // In a room?
  for (const r of EXPLORER_ROOMS) {
    if (x >= r.cx - r.w/2 && x <= r.cx + r.w/2 && y >= r.cy - r.h/2 && y <= r.cy + r.h/2) return true;
  }
  // In a hallway?
  for (const h of EXPLORER_HALLS) {
    const minX = Math.min(h.x1, h.x2) - h.w/2;
    const maxX = Math.max(h.x1, h.x2) + h.w/2;
    const minY = Math.min(h.y1, h.y2) - h.w/2;
    const maxY = Math.max(h.y1, h.y2) + h.w/2;
    if (x >= minX && x <= maxX && y >= minY && y <= maxY) return true;
  }
  return false;
}

function explorerTick() {
  const c = state.cipher;
  if (!c || !c.explorer || state.screen !== 'cipher_hunt') {
    window._explorerRAF = null;
    return;
  }
  const ex = c.explorer;

  // Player movement
  let dx = 0, dy = 0;
  if (EXPLORER_KEYS.ArrowUp || EXPLORER_KEYS.w) dy -= ex.speed;
  if (EXPLORER_KEYS.ArrowDown || EXPLORER_KEYS.s) dy += ex.speed;
  if (EXPLORER_KEYS.ArrowLeft || EXPLORER_KEYS.a) dx -= ex.speed;
  if (EXPLORER_KEYS.ArrowRight || EXPLORER_KEYS.d) dx += ex.speed;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; } // normalize diagonal

  const newX = ex.px + dx;
  const newY = ex.py + dy;
  if (dx !== 0 && isWalkable(newX, ex.py)) ex.px = newX;
  if (dy !== 0 && isWalkable(ex.px, newY)) ex.py = newY;

  // Clamp
  ex.px = Math.max(8, Math.min(392, ex.px));
  ex.py = Math.max(8, Math.min(392, ex.py));

  // Update player location for game mechanics
  const myRoom = getPlayerRoom(ex.px, ex.py);
  if (myRoom) c.playerLocations[state.player.id] = myRoom.id;

  // Move AI players randomly
  ex.aiPlayers.forEach(ai => {
    if (!ai.alive) return;
    const dist = Math.sqrt((ai.tx-ai.x)**2 + (ai.ty-ai.y)**2);
    if (dist < 5) {
      // Pick new random target room
      const room = EXPLORER_ROOMS[Math.floor(Math.random() * EXPLORER_ROOMS.length)];
      ai.tx = room.cx + (Math.random()-0.5)*30;
      ai.ty = room.cy + (Math.random()-0.5)*20;
    } else {
      const angle = Math.atan2(ai.ty-ai.y, ai.tx-ai.x);
      const nx = ai.x + Math.cos(angle)*ai.speed;
      const ny = ai.y + Math.sin(angle)*ai.speed;
      if (isWalkable(nx, ny)) { ai.x = nx; ai.y = ny; }
      else { ai.tx = ai.x + (Math.random()-0.5)*40; ai.ty = ai.y + (Math.random()-0.5)*40; }
    }
    const aiRoom = getPlayerRoom(ai.x, ai.y);
    if (aiRoom) c.playerLocations[ai.id] = aiRoom.id;
  });

  // Check proximity to terminals
  ex.nearTerminal = null;
  ex.terminals.forEach(t => {
    if (Math.abs(ex.px - t.x) < 25 && Math.abs(ex.py - t.y) < 25 && t.active) {
      ex.nearTerminal = t;
    }
  });

  // Check proximity to dead bodies
  ex.nearBody = null;
  c.deadBodies.forEach(b => {
    if (b.ex && Math.abs(ex.px - b.ex) < 25 && Math.abs(ex.py - b.ey) < 20 && !b.discoveredBy) {
      ex.nearBody = b;
    }
  });

  // Cooldown
  if (ex.interactCooldown > 0) ex.interactCooldown--;

  // Render canvas
  drawExplorer();

  window._explorerRAF = requestAnimationFrame(explorerTick);
}

function drawExplorer() {
  const canvas = document.getElementById('explorerCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const c = state.cipher;
  const ex = c.explorer;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0f1a';
  ctx.fillRect(0, 0, W, H);

  // Draw hallways
  ctx.fillStyle = '#141c2e';
  ctx.strokeStyle = '#1e2a44';
  ctx.lineWidth = 1;
  EXPLORER_HALLS.forEach(h => {
    const minX = Math.min(h.x1, h.x2) - h.w/2;
    const maxX = Math.max(h.x1, h.x2) + h.w/2;
    const minY = Math.min(h.y1, h.y2) - h.w/2;
    const maxY = Math.max(h.y1, h.y2) + h.w/2;
    ctx.fillRect(minX, minY, maxX-minX, maxY-minY);
    ctx.strokeRect(minX, minY, maxX-minX, maxY-minY);
  });

  // Draw rooms
  EXPLORER_ROOMS.forEach(r => {
    const rx = r.cx - r.w/2, ry = r.cy - r.h/2;
    ctx.fillStyle = r.color;
    ctx.strokeStyle = 'rgba(0,229,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(rx, ry, r.w, r.h, 6); }
    else { ctx.moveTo(rx+6,ry);ctx.lineTo(rx+r.w-6,ry);ctx.quadraticCurveTo(rx+r.w,ry,rx+r.w,ry+6);ctx.lineTo(rx+r.w,ry+r.h-6);ctx.quadraticCurveTo(rx+r.w,ry+r.h,rx+r.w-6,ry+r.h);ctx.lineTo(rx+6,ry+r.h);ctx.quadraticCurveTo(rx,ry+r.h,rx,ry+r.h-6);ctx.lineTo(rx,ry+6);ctx.quadraticCurveTo(rx,ry,rx+6,ry);ctx.closePath(); }
    ctx.fill();
    ctx.stroke();
    // Room name
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '8px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(r.name, r.cx, r.cy + r.h/2 - 4);
  });

  // Draw terminals (small glowing squares)
  ex.terminals.forEach(t => {
    if (!t.active) return;
    const near = (ex.nearTerminal === t);
    ctx.fillStyle = near ? 'rgba(0,229,255,0.8)' : 'rgba(0,229,255,0.3)';
    ctx.shadowColor = near ? '#00e5ff' : 'transparent';
    ctx.shadowBlur = near ? 8 : 0;
    ctx.fillRect(t.x - 4, t.y - 4, 8, 8);
    ctx.shadowBlur = 0;
  });

  // Draw dead bodies
  c.deadBodies.forEach(b => {
    if (!b.ex) return;
    ctx.fillStyle = '#ff1744';
    ctx.shadowColor = '#ff1744';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(b.ex, b.ey, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☠', b.ex, b.ey + 3);
    ctx.shadowBlur = 0;
  });

  // Draw AI players
  ex.aiPlayers.forEach(ai => {
    if (!ai.alive) return;
    const isSabAndImSab = (ai.role === 'saboteur' && c.myRole === 'saboteur');
    ctx.fillStyle = isSabAndImSab ? '#ff1744' : '#5a6a8a';
    ctx.beginPath();
    ctx.arc(ai.x, ai.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isSabAndImSab ? 'rgba(255,23,68,0.5)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Name label
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '6px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ai.brand.split(' ')[0].slice(0,6), ai.x, ai.y - 9);
  });

  // Draw player (cyan with glow)
  ctx.fillStyle = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(ex.px, ex.py, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Player label
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 7px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', ex.px, ex.py - 11);

  // Interaction prompts
  if (ex.nearTerminal && !ex.interactCooldown) {
    ctx.fillStyle = 'rgba(0,229,255,0.9)';
    ctx.font = '9px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[SPACE] Access Terminal', ex.px, ex.py + 22);
  }
  if (ex.nearBody) {
    ctx.fillStyle = 'rgba(255,23,68,0.9)';
    ctx.font = '9px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[R] Report Body', ex.px, ex.py + 32);
  }
}

function startExplorerLoop() {
  if (window._explorerRAF) cancelAnimationFrame(window._explorerRAF);
  window._explorerRAF = requestAnimationFrame(explorerTick);
}

// Key handlers for explorer (Cipher only)
document.addEventListener('keydown', (e) => {
  if (state.screen !== 'cipher_hunt') return;
  if (e.key in EXPLORER_KEYS) { EXPLORER_KEYS[e.key] = true; e.preventDefault(); }
  if (e.key === 'w' || e.key === 'a' || e.key === 's' || e.key === 'd') { EXPLORER_KEYS[e.key] = true; }

  // Spacebar = interact with terminal
  if (e.key === ' ' && state.screen === 'cipher_hunt' && state.cipher.explorer) {
    e.preventDefault();
    const ex = state.cipher.explorer;
    if (ex.nearTerminal && !ex.interactCooldown) {
      ex.interactCooldown = 30;
      SFX.click();
      // Trigger a question or mini-game
      cipherNextQuestion();
      render();
    }
  }

  // R = report body
  if ((e.key === 'r' || e.key === 'R') && state.screen === 'cipher_hunt' && state.cipher.explorer) {
    const ex = state.cipher.explorer;
    if (ex.nearBody) {
      const body = ex.nearBody;
      body.discoveredBy = state.player.id;
      const victim = state.cipher.players.find(p => p.id === body.id);
      const discoverer = state.cipher.players.find(p => p.id === state.player.id);
      if (victim && discoverer) cipherBodyReported(victim, discoverer);
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key in EXPLORER_KEYS) EXPLORER_KEYS[e.key] = false;
  if (e.key === 'w' || e.key === 'a' || e.key === 's' || e.key === 'd') EXPLORER_KEYS[e.key] = false;
});

function riftLaunchArena() {
  const r = state.rift;
  if (!r.myClass) return;
  SFX.battleStart();
  MUSIC.play('hunt');

  const cls = r.myClass;
  r.px = r.arenaW / 2;
  r.py = r.arenaH / 2;
  r.phase = 'pve';
  r.wave = 0;
  r.cooldowns = { q:0, w:0, e:0, r:0 };

  // Build player team (me + 2 AI allies)
  const me = { id:state.player.id, brand:state.player.brand, classId:cls.id, cls:cls,
    hp:cls.hp, maxHp:cls.hp, x:r.arenaW/2, y:r.arenaH/2, alive:true, isMe:true,
    ax:0, ay:0, speed:cls.speed, color:cls.color };

  // Pick 2 random AI teammates with different classes
  const otherClasses = RIFT_CLASSES.filter(c => c.id !== cls.id);
  const aiClasses = shuffleArray(otherClasses).slice(0,2);
  const otherPlayers = PLAYERS.filter(p => p.id !== state.player.id && p.role === 'player');
  const aiPicks = shuffleArray(otherPlayers).slice(0,2);
  const allies = aiPicks.map((p,i) => {
    const ac = aiClasses[i];
    return { id:p.id, brand:p.brand, classId:ac.id, cls:ac,
      hp:ac.hp, maxHp:ac.hp, x:r.arenaW/2 + (i===0?-60:60), y:r.arenaH/2 + 40,
      alive:true, isMe:false, speed:ac.speed, color:ac.color,
      aiTarget:null, aiCooldown:0 };
  });
  r.team = [me, ...allies];

  // Build enemy team for PvP (3 AI opponents)
  const enemyClasses = shuffleArray([...RIFT_CLASSES]).slice(0,3);
  const enemyPlayers = shuffleArray(otherPlayers.filter(p => !aiPicks.find(a=>a.id===p.id))).slice(0,3);
  r.enemyTeam = enemyPlayers.map((p,i) => {
    const ec = enemyClasses[i];
    return { id:p.id, brand:p.brand, classId:ec.id, cls:ec,
      hp:ec.hp, maxHp:ec.hp, x:r.arenaW/2 + (i-1)*80, y:80,
      alive:true, isMe:false, speed:ec.speed, color:ec.color,
      aiTarget:null, aiCooldown:0 };
  });

  r.enemies = [];
  r.projectiles = [];
  r.effects = [];

  state.screen = 'rift_arena';
  render();

  // Start game loop
  riftStartWave();
  riftStartGameLoop();
}

function riftStartGameLoop() {
  const r = state.rift;
  if (window._riftRAF) cancelAnimationFrame(window._riftRAF);
  if (r.gameInterval) clearInterval(r.gameInterval);

  // Game timer (1s ticks)
  r.gameInterval = setInterval(() => {
    r.gameTimer++;
    // Tick cooldowns
    ['q','w','e','r'].forEach(k => { if (r.cooldowns[k] > 0) r.cooldowns[k]--; });
    // PvP timer
    if (r.phase === 'pvp') {
      r.pvpTimer--;
      if (r.pvpTimer <= 0) riftEndMatch('defeat');
    }
    render();
  }, 1000);

  window._riftRAF = requestAnimationFrame(riftGameTick);
}

function riftStopGameLoop() {
  if (window._riftRAF) { cancelAnimationFrame(window._riftRAF); window._riftRAF = null; }
  if (state.rift.gameInterval) { clearInterval(state.rift.gameInterval); state.rift.gameInterval = null; }
}

function riftGameTick() {
  const r = state.rift;
  if (!r || (r.phase !== 'pve' && r.phase !== 'pvp') || state.screen !== 'rift_arena') {
    window._riftRAF = null; return;
  }

  const me = r.team[0];
  if (!me || !me.alive) { riftEndMatch('defeat'); return; }

  // Player movement
  let dx = 0, dy = 0;
  if (r.keys.w) dy -= me.speed;
  if (r.keys.s) dy += me.speed;
  if (r.keys.a) dx -= me.speed;
  if (r.keys.d) dx += me.speed;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  me.x = Math.max(12, Math.min(r.arenaW - 12, me.x + dx));
  me.y = Math.max(12, Math.min(r.arenaH - 12, me.y + dy));
  r.px = me.x; r.py = me.y;

  // Facing direction toward mouse
  const mdx = r.mouse.x - me.x;
  const mdy = r.mouse.y - me.y;
  const mlen = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
  r.facing = { x:mdx/mlen, y:mdy/mlen };

  // AI ally behavior
  r.team.filter(t => !t.isMe && t.alive).forEach(ally => {
    riftAIBehavior(ally, r.phase === 'pvp' ? r.enemyTeam : r.enemies, r);
  });

  // PvE enemies
  if (r.phase === 'pve') {
    r.enemies.filter(e => e.alive).forEach(e => {
      // Move toward nearest team member
      let nearest = null, nd = Infinity;
      r.team.filter(t => t.alive).forEach(t => {
        const d = Math.sqrt((t.x-e.x)**2+(t.y-e.y)**2);
        if (d < nd) { nd = d; nearest = t; }
      });
      if (nearest && nd > 20) {
        const ang = Math.atan2(nearest.y-e.y, nearest.x-e.x);
        e.x += Math.cos(ang) * e.speed;
        e.y += Math.sin(ang) * e.speed;
      }
      // Attack if close
      if (nearest && nd < 25) {
        if (!e._atkCd || e._atkCd <= 0) {
          nearest.hp -= e.dmg;
          r.effects.push({ x:nearest.x, y:nearest.y-10, text:`-${e.dmg}`, color:'#ff4444', life:30 });
          e._atkCd = 60; // 1s cooldown
          if (nearest.isMe) r.dmgTaken += e.dmg;
          if (nearest.hp <= 0) { nearest.hp = 0; nearest.alive = false; }
        }
      }
      if (e._atkCd > 0) e._atkCd--;
    });
  }

  // PvP enemy AI
  if (r.phase === 'pvp') {
    r.enemyTeam.filter(e => e.alive).forEach(enemy => {
      riftAIBehavior(enemy, r.team, r);
    });
  }

  // Move projectiles
  r.projectiles = r.projectiles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0 || p.x < 0 || p.x > r.arenaW || p.y < 0 || p.y > r.arenaH) return false;

    // Hit detection
    const targets = p.friendly ? (r.phase === 'pvp' ? r.enemyTeam : r.enemies) : r.team;
    for (const t of targets.filter(t => t.alive)) {
      const hitDist = (t.size || 10) + 4;
      if (Math.abs(p.x-t.x) < hitDist && Math.abs(p.y-t.y) < hitDist) {
        t.hp -= p.dmg;
        r.effects.push({ x:t.x, y:t.y-12, text:`-${p.dmg}`, color:p.color, life:25 });
        if (p.ownerIsMe) r.dmgDealt += p.dmg;
        if (t.hp <= 0) {
          t.hp = 0; t.alive = false;
          r.kills++;
          r.score += (t.xp || 50);
          r.effects.push({ x:t.x, y:t.y-20, text:'ELIMINATED', color:'#ffd740', life:40 });
          SFX.eject();
        }
        return false;
      }
    }
    return true;
  });

  // Update effects
  r.effects = r.effects.filter(e => { e.life--; e.y -= 0.5; return e.life > 0; });

  // Check wave completion
  if (r.phase === 'pve' && r.waveActive && r.enemies.every(e => !e.alive)) {
    r.waveActive = false;
    if (r.wave >= RIFT_CONFIG.pveWaves) {
      // Transition to PvP
      setTimeout(() => {
        r.phase = 'pvp';
        r.pvpTimer = RIFT_CONFIG.pvpTimerSec;
        // Reset positions
        r.team.filter(t => t.alive).forEach((t,i) => { t.x = r.arenaW/2 + (i-1)*60; t.y = r.arenaH - 80; t.hp = Math.min(t.hp + 30, t.maxHp); });
        r.enemyTeam.forEach((e,i) => { e.x = r.arenaW/2 + (i-1)*80; e.y = 80; });
        r.projectiles = [];
        MUSIC.play('sabotage');
        SFX.sabotageAlert();
        render();
      }, 1500);
    } else {
      setTimeout(() => riftStartWave(), 1500);
    }
  }

  // PvP win check
  if (r.phase === 'pvp') {
    if (r.enemyTeam.every(e => !e.alive)) riftEndMatch('victory');
    else if (r.team.every(t => !t.alive)) riftEndMatch('defeat');
  }

  // Draw
  riftDraw();
  window._riftRAF = requestAnimationFrame(riftGameTick);
}

function riftAIBehavior(unit, targets, r) {
  const aliveTargets = targets.filter(t => t.alive);
  if (aliveTargets.length === 0) return;

  // Find nearest target
  let nearest = null, nd = Infinity;
  aliveTargets.forEach(t => {
    const d = Math.sqrt((t.x-unit.x)**2+(t.y-unit.y)**2);
    if (d < nd) { nd = d; nearest = t; }
  });
  if (!nearest) return;

  const range = unit.cls ? unit.cls.range : 100;
  // Move toward if too far
  if (nd > range * 0.8) {
    const ang = Math.atan2(nearest.y-unit.y, nearest.x-unit.x);
    unit.x += Math.cos(ang) * unit.speed * 0.8;
    unit.y += Math.sin(ang) * unit.speed * 0.8;
    unit.x = Math.max(12, Math.min(r.arenaW-12, unit.x));
    unit.y = Math.max(12, Math.min(r.arenaH-12, unit.y));
  }
  // Attack
  if (unit.aiCooldown <= 0 && nd < range && unit.cls) {
    const ang = Math.atan2(nearest.y-unit.y, nearest.x-unit.x);
    r.projectiles.push({
      x:unit.x, y:unit.y, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5,
      dmg:unit.cls.q.dmg, owner:unit.id, ownerIsMe:false, friendly:r.team.includes(unit),
      color:unit.color, life:60
    });
    unit.aiCooldown = 40 + Math.floor(Math.random()*30);
  }
  if (unit.aiCooldown > 0) unit.aiCooldown--;
}

function riftStartWave() {
  const r = state.rift;
  r.wave++;
  r.waveActive = true;
  r.enemies = [];

  const isBossWave = r.wave === RIFT_CONFIG.pveWaves;
  const count = isBossWave ? 1 : 4 + r.wave * 2;
  const types = isBossWave ? [RIFT_ENEMY_TYPES[3]] : RIFT_ENEMY_TYPES.slice(0, Math.min(3, r.wave + 1));

  for (let i = 0; i < count; i++) {
    const et = types[Math.floor(Math.random() * types.length)];
    const side = Math.floor(Math.random() * 4);
    let ex, ey;
    if (side === 0) { ex = Math.random() * r.arenaW; ey = 0; }
    else if (side === 1) { ex = r.arenaW; ey = Math.random() * r.arenaH; }
    else if (side === 2) { ex = Math.random() * r.arenaW; ey = r.arenaH; }
    else { ex = 0; ey = Math.random() * r.arenaH; }
    r.enemies.push({
      ...et, hp:et.hp, maxHp:et.hp, x:ex, y:ey, alive:true, _atkCd:0
    });
  }

  SFX.navigate();
  r.effects.push({ x:r.arenaW/2, y:r.arenaH/2-20, text:isBossWave?'BOSS WAVE':'WAVE '+r.wave, color:'#ffd740', life:60 });
}

function riftUseAbility(key) {
  const r = state.rift;
  if (!r || !r.myClass || r.cooldowns[key] > 0) return;
  const me = r.team[0];
  if (!me || !me.alive) return;

  const ability = r.myClass[key];
  r.cooldowns[key] = ability.cd;

  if (key === 'q' || (key === 'e' && r.myClass.id === 'coder')) {
    // Projectile attack
    const dmg = ability.dmg;
    r.projectiles.push({
      x:me.x, y:me.y, vx:r.facing.x*6, vy:r.facing.y*6,
      dmg:dmg, owner:me.id, ownerIsMe:true, friendly:true,
      color:r.myClass.color, life:50
    });
    SFX.click();
  } else if (key === 'w') {
    // Defensive — heal or shield
    if (ability.dmg < 0) {
      const heal = Math.abs(ability.dmg);
      r.team.filter(t => t.alive).forEach(t => {
        const d = Math.sqrt((t.x-me.x)**2+(t.y-me.y)**2);
        if (d < 120) {
          t.hp = Math.min(t.maxHp, t.hp + heal);
          r.effects.push({ x:t.x, y:t.y-10, text:`+${heal}`, color:'#00e676', life:25 });
          if (me.isMe) r.healDone += heal;
        }
      });
    } else {
      r.effects.push({ x:me.x, y:me.y, text:ability.name, color:r.myClass.color, life:30 });
    }
    SFX.keyCollect();
  } else if (key === 'e') {
    // Movement / utility
    if (r.myClass.id === 'audio' || r.myClass.id === 'filmmaker') {
      // Dash
      me.x += r.facing.x * 80;
      me.y += r.facing.y * 80;
      me.x = Math.max(12, Math.min(r.arenaW-12, me.x));
      me.y = Math.max(12, Math.min(r.arenaH-12, me.y));
      r.effects.push({ x:me.x, y:me.y, text:'DASH', color:r.myClass.color, life:20 });
    } else if (ability.dmg > 0) {
      // AoE around self
      const targets = r.phase === 'pvp' ? r.enemyTeam : r.enemies;
      targets.filter(t => t.alive).forEach(t => {
        const d = Math.sqrt((t.x-me.x)**2+(t.y-me.y)**2);
        if (d < 100) {
          t.hp -= ability.dmg;
          r.dmgDealt += ability.dmg;
          r.effects.push({ x:t.x, y:t.y-10, text:`-${ability.dmg}`, color:r.myClass.color, life:25 });
          if (t.hp <= 0) { t.hp=0; t.alive=false; r.kills++; r.score += (t.xp||50); SFX.eject(); }
        }
      });
    }
    SFX.click();
  } else if (key === 'r') {
    // Ultimate — big AoE
    SFX.sabotageAlert();
    const targets = r.phase === 'pvp' ? r.enemyTeam : r.enemies;
    targets.filter(t => t.alive).forEach(t => {
      const d = Math.sqrt((t.x-me.x)**2+(t.y-me.y)**2);
      if (d < 160) {
        t.hp -= ability.dmg;
        r.dmgDealt += ability.dmg;
        r.effects.push({ x:t.x, y:t.y-12, text:`-${ability.dmg}`, color:'#ffd740', life:30 });
        if (t.hp <= 0) { t.hp=0; t.alive=false; r.kills++; r.score += (t.xp||50); SFX.eject(); }
      }
    });
    r.effects.push({ x:me.x, y:me.y-20, text:'✦ ULTIMATE ✦', color:'#ffd740', life:50 });
  }
}

function riftEndMatch(outcome) {
  const r = state.rift;
  riftStopGameLoop();
  r.phase = 'results';
  r.outcome = outcome;

  const won = outcome === 'victory';
  const base = RIFT_CONFIG.rewardBase;
  const killBonus = r.kills * RIFT_CONFIG.rewardKillBonus;
  const multi = won ? RIFT_CONFIG.rewardWinMultiplier : 0.5;
  const total = Math.round((base + killBonus) * multi);
  r.rewards = { base, killBonus, multiplier:multi, total, net: total - RIFT_CONFIG.entryFee };

  if (won) { SFX.victory(); MUSIC.play('victory'); }
  else { SFX.defeat(); MUSIC.play('defeat'); }

  state.screen = 'rift_arena';
  render();
}
