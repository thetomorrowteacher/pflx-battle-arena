.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:180px;margin:16px auto}
.pattern-cell{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.15s}
.pattern-cell.pat-lit{background:var(--pflx-cyan);border-color:var(--pflx-cyan);box-shadow:0 0 12px rgba(0,229,255,0.4)}
.pattern-cell.pat-selected{background:rgba(0,229,255,0.3);border-color:var(--pflx-cyan)}
.pattern-cell.pat-wrong{background:rgba(255,23,68,0.3);border-color:var(--pflx-red)}
.pattern-cell.pat-correct{background:rgba(0,230,118,0.3);border-color:var(--pflx-green)}
/* Sequence Memory */
.seq-row{display:flex;gap:10px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.seq-btn{width:52px;height:52px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);cursor:pointer;transition:all 0.15s;opacity:0.6}
.seq-btn:hover{opacity:0.8;transform:scale(1.05)}
.seq-btn.seq-lit{opacity:1;transform:scale(1.1);box-shadow:0 0 20px currentColor;border-color:currentColor}
.seq-btn.seq-wrong{border-color:var(--pflx-red);box-shadow:0 0 20px rgba(255,23,68,0.5)}

/* ══════════ EXPLORER ══════════ */
.explorer-wrap{margin:8px 0}

/* ══════════ DECODER WHEEL ══════════ */
.decoder-wheel-wrap{position:relative;width:180px;height:180px;margin:10px auto}
.decoder-wheel{position:absolute;inset:0;border-radius:50%}
.outer-wheel{border:2px solid rgba(0,229,255,0.15)}
.inner-wheel{inset:26px;border:2px solid rgba(124,77,255,0.2);border-radius:50%}
.decoder-symbol{position:absolute;left:50%;top:50%;width:22px;height:22px;margin:-11px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-family:Orbitron,monospace;font-weight:700}
.decoder-outer{color:var(--pflx-cyan)}
.decoder-inner{color:var(--pflx-purple)}
.decoder-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:1.2rem}

/* ══════════ PLAYER CHAT INPUT ══════════ */
.cipher-chat-input-wrap{display:flex;gap:8px;margin-top:8px;padding:8px;border-radius:10px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04)}
.cipher-chat-input{flex:1;font-family:'Inter',sans-serif;font-size:0.65rem;background:rgba(255,255,255,0.05);border:1px solid rgba(0,229,255,0.12);border-radius:8px;padding:8px 12px;color:#ccd6f6;outline:none}
.cipher-chat-input:focus{border-color:var(--pflx-cyan);box-shadow:0 0 8px rgba(0,229,255,0.1)}
.cipher-chat-send{font-family:Orbitron,monospace;font-size:0.55rem;padding:8px 14px;border-radius:8px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.25);color:var(--pflx-cyan);cursor:pointer;white-space:nowrap}
.cipher-chat-send:hover{background:rgba(0,229,255,0.2)}
.chat-typing{font-size:0.5rem;color:#5a6a8a;font-style:italic;padding:4px 10px}
.cipher-chat-msg.chat-me{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.08)}
.cipher-chat-msg.chat-me .chat-name{color:var(--pflx-gold)}

/* ══════════ POWER OUTAGE EFFECT ══════════ */
.power-outage-mask{position:fixed;inset:0;z-index:240;pointer-events:none;background:radial-gradient(circle 80px at var(--mouse-x,50%) var(--mouse-y,50%),transparent 0%,rgba(0,0,0,0.97) 100%);transition:opacity 0.5s}

/* ══════════ RIFT — MOBA ARENA ══════════ */
.rift-select-wrap{position:relative;z-index:10;min-height:100vh;overflow-y:auto}
.rift-void-bg{position:fixed;inset:0;z-index:0;background:url('Rift.png') center/cover no-repeat;filter:blur(6px) brightness(0.3);transform:scale(1.1)}
.rift-void-bg::after{content:'';position:fixed;inset:0;background:linear-gradient(180deg,rgba(6,8,14,0.6) 0%,rgba(6,8,14,0.8) 40%,rgba(6,8,14,0.95) 100%)}
.rift-void-bg::before{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,229,255,0.03) 39px,rgba(0,229,255,0.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,229,255,0.03) 39px,rgba(0,229,255,0.03) 40px);animation:gridPulse 4s ease-in-out infinite}
@keyframes gridPulse{0%,100%{opacity:0.4}50%{opacity:1}}
.rift-select-content{position:relative;z-index:2;max-width:650px;margin:0 auto;padding:50px 20px 40px}

/* Rift Hero */
.rift-hero{text-align:center;margin-bottom:24px}
.rift-portal-icon{font-size:3rem;margin-bottom:8px;animation:portalSpin 6s linear infinite}
@keyframes portalSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.rift-title{font-family:Orbitron,monospace;font-size:2.4rem;font-weight:900;color:var(--pflx-cyan);text-shadow:0 0 40px rgba(0,229,255,0.5),0 0 80px rgba(0,229,255,0.2);letter-spacing:0.15em}
.rift-subtitle{font-size:0.75rem;color:#8892b0;margin-top:8px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.5}

/* Info Grid */
.rift-info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.rift-info-card{text-align:center;padding:14px 8px;border-radius:10px;background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.08)}
.rift-info-val{font-family:Orbitron,monospace;font-size:0.9rem;font-weight:700;color:var(--pflx-cyan)}
.rift-info-label{font-size:0.45rem;color:#5a6a8a;text-transform:uppercase;letter-spacing:0.1em;margin-top:3px}

/* Class Preview Row */
.rift-class-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.rift-class-preview{text-align:center;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid;min-width:65px}

/* How It Works */
.rift-how-it-works{margin-top:24px;padding:16px;border-radius:12px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.04)}
.rift-hiw-title{font-family:Orbitron,monospace;font-size:0.6rem;color:#5a6a8a;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;text-align:center}
.rift-hiw-step{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:0.6rem;color:#8892b0}
.rift-hiw-num{width:22px;height:22px;border-radius:50%;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-size:0.55rem;color:var(--pflx-cyan);flex-shrink:0}

/* Class Select Grid */
.rift-class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.rift-class-card{padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);border:2px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.25s;text-align:center}
.rift-class-card:hover{border-color:var(--cls-color,rgba(0,229,255,0.3));background:rgba(255,255,255,0.04);transform:translateY(-2px)}
.rift-class-card.selected{border-color:var(--cls-color,var(--pflx-cyan));background:rgba(0,229,255,0.06);box-shadow:0 0 20px rgba(0,229,255,0.1)}
.rcc-icon{font-size:1.8rem;margin-bottom:6px}
.rcc-name{font-family:Orbitron,monospace;font-size:0.65rem;font-weight:700;color:#ccd6f6}
.rcc-pathway{font-size:0.45rem;color:#5a6a8a;margin-top:2px}
.rcc-desc{font-size:0.5rem;color:#8892b0;margin:6px 0;line-height:1.4}
.rcc-stats{display:flex;gap:8px;justify-content:center;font-family:Orbitron,monospace;font-size:0.4rem;color:#5a6a8a}
.rcc-abilities{display:flex;gap:4px;justify-content:center;margin-top:8px}
.rcc-ability{font-size:0.5rem;padding:3px 6px;border-radius:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
.rcc-ult{background:rgba(255,215,64,0.08);border-color:rgba(255,215,64,0.15);color:var(--pflx-gold)}

/* Detail Panel */
.rift-detail-panel{margin-top:20px;padding:20px;border-radius:14px;background:rgba(0,0,0,0.35);border:1px solid rgba(0,229,255,0.1)}
.rift-ability-list{display:flex;flex-direction:column;gap:10px}
.rift-ability-row{display:flex;gap:10px;align-items:flex-start;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)}
.rift-ult-row{background:rgba(255,215,64,0.04);border:1px solid rgba(255,215,64,0.1)}
.rift-ability-key{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-size:0.65rem;font-weight:800;flex-shrink:0}
.rift-ability-info{flex:1}
.rift-ability-name{font-family:Orbitron,monospace;font-size:0.6rem;font-weight:700;color:#ccd6f6}
.rift-ability-desc{font-size:0.5rem;color:#8892b0;margin-top:2px;line-height:1.4}
.rift-ability-stats{font-family:Orbitron,monospace;font-size:0.4rem;color:#5a6a8a;margin-top:4px}

/* Arena HUD */
.rift-arena-wrap{position:relative;z-index:10;max-width:660px;margin:0 auto;padding:10px}
.rift-arena-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:8px 12px;border-radius:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.04)}
.rift-hud-team{display:flex;gap:8px}
.rift-team-member{display:flex;gap:6px;align-items:center;min-width:80px}
.rift-team-member.dead{opacity:0.3}
.rift-hp-bar{height:4px;border-radius:2px;background:#111;overflow:hidden;width:100%}
.rift-hp-fill{height:100%;background:linear-gradient(90deg,#00e676,#00e5ff);border-radius:2px;transition:width 0.2s}
.rift-hud-score{display:flex;gap:12px;font-family:Orbitron,monospace;font-size:0.5rem}

/* Ability Bar */
.rift-ability-bar{display:flex;gap:8px;justify-content:center;margin-top:8px}
.rift-ab-btn{position:relative;width:52px;height:52px;border-radius:10px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.15s}
.rift-ab-btn.ready{border-color:rgba(0,229,255,0.3);background:rgba(0,229,255,0.06)}
.rift-ab-btn.ready:hover{border-color:var(--pflx-cyan);transform:scale(1.08)}
.rift-ab-btn.rift-ult{border-color:rgba(255,215,64,0.2)}
.rift-ab-btn.rift-ult.ready{border-color:rgba(255,215,64,0.5);background:rgba(255,215,64,0.08)}
.rift-ab-icon{font-size:1.1rem}
.rift-ab-key{font-family:Orbitron,monospace;font-size:0.45rem;color:#5a6a8a;font-weight:700}
.rift-ab-cd{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-size:0.9rem;font-weight:900;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.6);border-radius:8px}

/* Results */
.rift-results-card{padding:28px;border-radius:16px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.06);text-align:center}
.rift-stat-box{padding:10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}

/* ═══════════════════════════════════════════════════════════════════════
   CUSTOM GAME MODES — Admin Panel Styles
   ═══════════════════════════════════════════════════════════════════════ */
.mode-admin-wrap{position:relative;z-index:10;max-width:700px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.admin-form{background:rgba(0,0,0,0.4);border:1px solid rgba(0,229,255,0.2);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:16px}
.admin-field{display:flex;flex-direction:column;gap:8px}
.admin-label{font-family:Orbitron,monospace;font-size:0.65rem;font-weight:600;color:#ccd6f6;text-transform:uppercase;letter-spacing:0.1em}
.admin-input,.admin-textarea,.admin-select{background:rgba(255,255,255,0.05);border:1px solid rgba(0,229,255,0.2);border-radius:6px;padding:10px 12px;color:#e0e0e0;font-family:Inter,sans-serif;font-size:0.65rem;transition:all 0.2s}
.admin-input:focus,.admin-textarea:focus,.admin-select:focus{outline:none;border-color:rgba(0,229,255,0.6);background:rgba(0,229,255,0.05);box-shadow:0 0 12px rgba(0,229,255,0.15)}
.admin-textarea{resize:vertical;min-height:80px}
.admin-field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.admin-img-upload{border:2px dashed rgba(0,229,255,0.3);border-radius:8px;padding:20px;text-align:center;cursor:pointer;background:rgba(0,229,255,0.03);transition:all 0.2s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.admin-img-upload:hover{border-color:rgba(0,229,255,0.6);background:rgba(0,229,255,0.08)}
.admin-img-upload-label{font-size:0.7rem;color:#999}
.admin-img-preview{max-width:100%;max-height:120px;border-radius:6px;margin-top:8px}
.admin-mode-list{border-top:1px solid rgba(0,229,255,0.1);padding-top:16px;display:flex;flex-direction:column;gap:12px}
.admin-mode-item{background:rgba(0,0,0,0.3);border:1px solid rgba(0,229,255,0.15);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.admin-mode-item-info{flex:1}
.admin-mode-item-name{font-family:Orbitron,monospace;font-size:0.65rem;font-weight:600;color:#00e5ff}
.admin-mode-item-cat{font-size:0.55rem;color:#999;margin-top:4px}
.admin-mode-delete-btn{background:rgba(255,23,68,0.2);border:1px solid rgba(255,23,68,0.4);color:#ff1744;padding:6px 12px;border-radius:4px;font-size:0.55rem;cursor:pointer;transition:all 0.2s}
.admin-mode-delete-btn:hover{background:rgba(255,23,68,0.4);border-color:#ff1744}
.admin-actions{display:flex;gap:12px;justify-content:flex-end}
.admin-back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e0e0e0;padding:10px 20px;border-radius:6px;font-size:0.65rem;cursor:pointer;transition:all 0.2s;font-family:Orbitron,monospace}
.admin-back-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3)}
.admin-submit-btn{background:linear-gradient(135deg,rgba(0,229,255,0.3),rgba(0,229,255,0.1));border:1px solid rgba(0,229,255,0.4);color:#00e5ff;padding:10px 24px;border-radius:6px;font-size:0.65rem;cursor:pointer;transition:all 0.2s;font-family:Orbitron,monospace;font-weight:600}
.admin-submit-btn:hover{background:linear-gradient(135deg,rgba(0,229,255,0.5),rgba(0,229,255,0.2));border-color:rgba(0,229,255,0.7);box-shadow:0 0 12px rgba(0,229,255,0.2)}
.admin-add-btn{position:fixed;bottom:28px;right:28px;z-index:15;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00e5ff,#00bcd4);border:none;color:#0a0e17;font-size:1.4rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,229,255,0.3);display:flex;align-items:center;justify-content:center}
.admin-add-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,229,255,0.5)}
.live-play-empty{text-align:center;padding:40px 20px;color:#999}
.live-play-empty-icon{font-size:3rem;margin-bottom:16px}
.live-play-empty-text{font-size:0.7rem;color:#666;margin-top:12px}

/* ═══════════════════════════════════════════════════════════════════
   ESPORTS DESIGN CHALLENGE PLATFORM
   ═══════════════════════════════════════════════════════════════════ */

/* Esports Hub — 8-mode selector grid */
.esports-hub{max-width:1100px;margin:0 auto;padding:32px 24px;position:relative;z-index:10}
.esports-hero{text-align:center;margin-bottom:32px}
.esports-hero h2{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:var(--pflx-cyan);text-transform:uppercase;letter-spacing:0.1em}
.esports-hero p{font-size:13px;color:#888;margin-top:6px}

.esports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}

.esports-mode-card{position:relative;overflow:hidden;border-radius:16px;background:rgba(10,14,23,0.85);border:1px solid rgba(0,229,255,0.1);cursor:pointer;transition:all 0.3s ease;padding:20px}
.esports-mode-card:hover{border-color:rgba(0,229,255,0.4);box-shadow:0 0 30px rgba(0,229,255,0.1);transform:translateY(-3px)}
.esports-mode-card .emc-icon{font-size:2.2rem;margin-bottom:10px;filter:drop-shadow(0 0 8px rgba(0,229,255,0.3))}
.esports-mode-card .emc-name{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;color:var(--pflx-cyan);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.esports-mode-card .emc-pathway{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;font-family:'Orbitron',monospace}
.esports-mode-card .emc-desc{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:12px}
.esports-mode-card .emc-meta{display:flex;gap:8px;flex-wrap:wrap}
.esports-mode-card .emc-tag{font-family:'Orbitron',monospace;font-size:0.5rem;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em}
.emc-tag.solo{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);color:#00e676}
.emc-tag.multi{background:rgba(41,121,255,0.1);border:1px solid rgba(41,121,255,0.25);color:#2979ff}
.emc-tag.coop{background:rgba(124,77,255,0.1);border:1px solid rgba(124,77,255,0.25);color:#7c4dff}

/* Esports Mode Lobby */
.esports-lobby{max-width:900px;margin:0 auto;padding:32px 24px;position:relative;z-index:10;overflow:visible;border-radius:12px}

/* Play mode selector */

<script>
// ═══════════════════════════════════════════════════════════════════
// PFLX Battle Arena — Single-File Interactive Preview
// ═══════════════════════════════════════════════════════════════════

const ARENA_RANKS = [
  { tier:"Bronze", minAP:0, icon:"🥉", color:"#cd7f32" },
  { tier:"Silver", minAP:500, icon:"🥈", color:"#c0c0c0" },
  { tier:"Gold", minAP:1500, icon:"🥇", color:"#ffd740" },
  { tier:"Platinum", minAP:3000, icon:"💠", color:"#00e5ff" },
  { tier:"Diamond", minAP:5000, icon:"💎", color:"#7c4dff" },
  { tier:"Champion", minAP:8000, icon:"🏆", color:"#e040fb" },
  { tier:"Legend", minAP:12000, icon:"🔱", color:"#ff1744" },
];

function getRankInfo(ap) {
  for (let i = ARENA_RANKS.length - 1; i >= 0; i--) {
    if (ap >= ARENA_RANKS[i].minAP) return ARENA_RANKS[i];
  }
  return ARENA_RANKS[0];
}

// ═══════════════════════════════════════════════════════════════════════════
// SHARED USER DATA — mirrors X-Coin app's mockUsers from app/lib/data.ts
// In production, both apps will read from the same Supabase backend.
// Battle Arena extends each user with arena-specific stats & badge counts.
// ═══════════════════════════════════════════════════════════════════════════
// ── X-Coin Roster: Fetched dynamically from X-Coin app seed data ──
let XCOIN_ROSTER = [];
let PLAYERS = [];
const XCOIN_SEED_URL = 'https://pflx-xcoin-app.vercel.app/seed-data.json';

// ── Supabase Direct Access (shared with X-Coin app) ──
const SUPABASE_URL = 'https://hyxiagexyptzvetqjmnj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5eGlhZ2V4eXB0enZldHFqbW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODM4MTYsImV4cCI6MjA4OTY1OTgxNn0.hqHVlRu775dZfJrKxSFMNEPhANu5EFm7gJpaJ3RnbnY';

async function supabaseLoad(key) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/app_data?key=eq.' + key + '&select=data', {
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return (rows && rows.length > 0) ? rows[0].data : null;
  } catch(e) { console.warn('Supabase load failed:', key, e.message); return null; }
}

async function supabaseSave(key, value) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/app_data', {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ key: key, data: value })
    });
    return res.ok;

  const defaultStats = { battles:0,wins:0,losses:0,draws:0,streak:0,bestStreak:0,wagered:0,won:0,lost:0,ap:0 };

      id: u.id, name: u.name, brand: u.brandName || u.name,
      role: u.role || "player",

  try {
    const res = await fetch(XCOIN_SEED_URL);
    if (!res.ok) throw new Error('Fetch failed');
    const data = await res.json();
    if (data.users && data.users.length > 0) {
      buildPlayers(data.users);
      console.log(`✅ Loaded ${data.users.length} players from X-Coin`);

    console.warn('⚠️ Could not fetch X-Coin roster, using fallback:', e.message);
    buildPlayers(FALLBACK_ROSTER);
  }
  render();
}

    if (ctx.state === 'suspended') ctx.resume();
    return ctx;

    const c = getCtx();
    const g = c.createGain();
    g.gain.value = muted ? 0 : val * volume;
    g.connect(c.destination);
    return g;
  }

  return {
    setVolume(v) { volume = Math.max(0, Math.min(1, v)); },
    getVolume() { return volume; },
    setMuted(m) { muted = m; },

    // UI click — short blip

        const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = 200;
        o.frequency.exponentialRampToValueAtTime(800, c.currentTime + 0.4);
        o.frequency.exponentialRampToValueAtTime(1200, c.currentTime + 0.6);
        o.connect(g); o.start(c.currentTime); o.stop(c.currentTime + 0.8);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.8);
      } catch(e){}
    },
    terminalUnlock() {
      try {
        const c = getCtx(); const g = gain(0.3);
        [400,600,800,1000].forEach((f,i) => {
          const o = c.createOscillator(); o.type='sine'; o.frequency.value=f;
          o.connect(g); o.start(c.currentTime+i*0.1); o.stop(c.currentTime+i*0.1+0.15);
        });
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
      } catch(e){}
    },
    sabotageAlert() {
      try {
        const c = getCtx(); const g = gain(0.25);
        const o = c.createOscillator(); o.type='sawtooth'; o.frequency.value=150;
        o.frequency.linearRampToValueAtTime(300, c.currentTime+0.15);
        o.frequency.linearRampToValueAtTime(100, c.currentTime+0.3);
        o.connect(g); o.start(c.currentTime); o.stop(c.currentTime+0.4);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.4);
      } catch(e){}
    },
    voteCall() {
      try {
        const c = getCtx(); const g = gain(0.2);
        const o = c.createOscillator(); o.type='square'; o.frequency.value=600;
        o.frequency.linearRampToValueAtTime(800, c.currentTime+0.1);
        o.frequency.linearRampToValueAtTime(600, c.currentTime+0.2);
        o.connect(g); o.start(c.currentTime); o.stop(c.currentTime+0.3);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.3);
      } catch(e){}
    },
    eject() {
      try {
        const c = getCtx(); const g = gain(0.3);
        const o = c.createOscillator(); o.type='sawtooth'; o.frequency.value=800;
        o.frequency.exponentialRampToValueAtTime(100, c.currentTime+0.5);
        o.connect(g); o.start(c.currentTime); o.stop(c.currentTime+0.6);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.6);
      } catch(e){}
    },
    keyCollect() {
      try {
        const c = getCtx(); const g = gain(0.2);
        const o = c.createOscillator(); o.type='sine'; o.frequency.value=800;
        o.frequency.exponentialRampToValueAtTime(1400, c.currentTime+0.1);
        o.connect(g); o.start(c.currentTime); o.stop(c.currentTime+0.15);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.15);
      } catch(e){}
    },
  };
})();

// ═══════════════════════════════════════════════════════════════════════════
// MUSIC ENGINE — Procedural ambient tracks via Web Audio API
// ═══════════════════════════════════════════════════════════════════════════
const MUSIC = (() => {
  let ctx = null;
  let volume = 0.25;
  let muted = false;
  let currentTrack = null;
  let masterGain = null;
  let activeNodes = [];
  let loopTimers = [];

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    if (!masterGain) { masterGain = ctx.createGain(); masterGain.gain.value = volume; masterGain.connect(ctx.destination); }
    return ctx;
  }
  function vol() { return muted ? 0 : volume; }
  function updateGain() { if (masterGain) masterGain.gain.setTargetAtTime(vol(), ctx.currentTime, 0.1); }

  function stopAll() {
    loopTimers.forEach(t => clearInterval(t));
    loopTimers = [];
    activeNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
    activeNodes = [];
    currentTrack = null;
  }

  function makeDrone(freq, type, gainVal) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = gainVal || 0.1;
    o.connect(g);
    g.connect(masterGain);
    o.start();
    activeNodes.push(o, g);
    return { osc: o, gain: g };
  }

  function makeLFO(target, rate, depth) {
    const c = getCtx();
    const lfo = c.createOscillator();
    const lfoGain = c.createGain();
    lfo.frequency.value = rate;
    lfoGain.gain.value = depth;
    lfo.connect(lfoGain);
    lfoGain.connect(target);
    lfo.start();
    activeNodes.push(lfo, lfoGain);
  }

  return {
    setVolume(v) { volume = Math.max(0, Math.min(1, v)); updateGain(); },
    getVolume() { return volume; },
    setMuted(m) { muted = m; updateGain(); },
    isMuted() { return muted; },
    isPlaying() { return currentTrack !== null; },
    getTrack() { return currentTrack; },

    stop() { stopAll(); },

    play(track) {
      if (currentTrack === track) return;
      stopAll();
      currentTrack = track;
      try { this[track](); } catch(e){ console.warn('Music error:', e); }
    },

    lobby() {
      const c = getCtx();
      // Warm pad — C minor
      const d1 = makeDrone(65.41, 'sine', 0.08);   // C2
      const d2 = makeDrone(77.78, 'sine', 0.05);   // Eb2
      const d3 = makeDrone(98.00, 'triangle', 0.04); // G2
      makeLFO(d1.gain.gain, 0.15, 0.03);
      makeLFO(d2.gain.gain, 0.1, 0.02);
      // Gentle shimmer
      const shim = makeDrone(523.25, 'sine', 0.0);
      const shimNotes = [523.25, 622.25, 783.99, 622.25]; // C5 Eb5 G5
      let si = 0;
      const lt = setInterval(() => {
        shim.osc.frequency.setTargetAtTime(shimNotes[si % shimNotes.length], c.currentTime, 0.3);
        shim.gain.gain.setTargetAtTime(0.025, c.currentTime, 0.1);
        shim.gain.gain.setTargetAtTime(0.0, c.currentTime + 1.5, 0.8);
        si++;
      }, 3000);
      loopTimers.push(lt);
    },

    hunt() {
      const c = getCtx();
      // Tense pulse — D minor
      const bass = makeDrone(73.42, 'sawtooth', 0.06); // D2
      const mid = makeDrone(146.83, 'triangle', 0.04); // D3
      makeLFO(bass.gain.gain, 0.25, 0.03); // pulsing
      // Ticking clock
      const tick = makeDrone(0, 'square', 0);
      const lt = setInterval(() => {
        tick.osc.frequency.value = 1200;
        tick.gain.gain.setTargetAtTime(0.03, c.currentTime, 0.005);
        tick.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.05, 0.02);
      }, 1000);
      loopTimers.push(lt);
      // Minor arpeggio ghost notes
      const arp = makeDrone(293.66, 'sine', 0.0); // D4
      const arpNotes = [293.66, 349.23, 440.00, 349.23]; // D4 F4 A4
      let ai = 0;
      const lt2 = setInterval(() => {
        arp.osc.frequency.setTargetAtTime(arpNotes[ai % arpNotes.length], c.currentTime, 0.05);
        arp.gain.gain.setTargetAtTime(0.02, c.currentTime, 0.02);
        arp.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.3, 0.15);
        ai++;
      }, 800);
      loopTimers.push(lt2);
    },

    sabotage() {
      const c = getCtx();
      // Dark drones — tritone
      makeDrone(55.00, 'sawtooth', 0.07); // A1
      const d2 = makeDrone(77.78, 'sawtooth', 0.05); // Eb2 (tritone from A)
      makeLFO(d2.gain.gain, 0.3, 0.04);
      // Low rumble
      const rum = makeDrone(30, 'sine', 0.1);
      makeLFO(rum.osc.frequency, 0.5, 8);
      // Dissonant stab loop
      const stab = makeDrone(0, 'square', 0);
      const lt = setInterval(() => {
        const f = 200 + Math.random() * 300;
        stab.osc.frequency.value = f;
        stab.gain.gain.setTargetAtTime(0.04, c.currentTime, 0.01);
        stab.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.15, 0.08);
      }, 2000 + Math.random() * 1000);
      loopTimers.push(lt);
    },

    discussion() {
      const c = getCtx();
      // Heartbeat pulse
      const beat = makeDrone(50, 'sine', 0.0);
      const lt = setInterval(() => {
        beat.gain.gain.setTargetAtTime(0.12, c.currentTime, 0.01);
        beat.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.1, 0.05);
        setTimeout(() => {
          beat.gain.gain.setTargetAtTime(0.08, c.currentTime, 0.01);
          beat.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.1, 0.05);
        }, 250);
      }, 1200);
      loopTimers.push(lt);
      // Suspense pad — Bb minor
      makeDrone(58.27, 'triangle', 0.05); // Bb1
      const pad = makeDrone(116.54, 'sine', 0.03); // Bb2
      makeLFO(pad.gain.gain, 0.2, 0.02);
    },

    vote() {
      const c = getCtx();
      // Urgent — faster pulse
      const bass = makeDrone(82.41, 'square', 0.04); // E2
      makeLFO(bass.gain.gain, 2.0, 0.03);
      const mid = makeDrone(164.81, 'sawtooth', 0.03);
      makeLFO(mid.osc.frequency, 0.5, 5);
      // Alarm-like ping
      const ping = makeDrone(0, 'sine', 0);
      const lt = setInterval(() => {
        ping.osc.frequency.value = 880;
        ping.gain.gain.setTargetAtTime(0.04, c.currentTime, 0.01);
        ping.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.15, 0.08);
      }, 600);
      loopTimers.push(lt);
    },

    victory() {
      const c = getCtx();
      // Major resolution — C major
      makeDrone(130.81, 'sine', 0.08); // C3
      makeDrone(164.81, 'sine', 0.06); // E3
      makeDrone(196.00, 'triangle', 0.05); // G3
      const shim = makeDrone(523.25, 'sine', 0.0);
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
      let ni = 0;
      const lt = setInterval(() => {
        shim.osc.frequency.setTargetAtTime(notes[ni % notes.length], c.currentTime, 0.05);
        shim.gain.gain.setTargetAtTime(0.04, c.currentTime, 0.02);
        shim.gain.gain.setTargetAtTime(0.0, c.currentTime + 0.8, 0.4);
        ni++;
      }, 1500);
      loopTimers.push(lt);
    },

    defeat() {
      const c = getCtx();
      // Somber — descending minor
      makeDrone(55.00, 'sine', 0.08); // A1
      makeDrone(65.41, 'triangle', 0.04); // C2
      const desc = makeDrone(220, 'sine', 0.03);
      makeLFO(desc.gain.gain, 0.1, 0.02);
      // Slow descending tone
      desc.osc.frequency.setTargetAtTime(110, c.currentTime + 10, 5);
    },
  };
})();

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

  let particles = '';

        el.setSelectionRange(state._focusCursor, state._focusCursor);

    }
    state._focusId = null;

  }
}

function togglePanel() {
  state.panelOpen = !state.panelOpen;
  state.panelOpen ? SFX.panelOpen() : SFX.panelClose();
  // Don't re-render the whole app — just toggle classes for smooth animation
  const panel = document.getElementById('sidePanel');
  const overlay = document.getElementById('panelOverlay');
  const btn = document.getElementById('menuBtn');
  if (panel) panel.classList.toggle('open', state.panelOpen);
  if (overlay) overlay.classList.toggle('open', state.panelOpen);
  if (btn) btn.classList.toggle('open', state.panelOpen);
}

function renderSideQuests() {

function cipherTimerStr() {
  const c = state.cipher;
  const mins = Math.floor(c.timeRemaining / 60);
  const secs = c.timeRemaining % 60;
  return `${mins}:${secs.toString().padStart(2,'0')}`;
}

const TERMINAL_NAMES = ['ALPHA','BETA','GAMMA','DELTA','OMEGA'];

function renderTerminals() {
  const c = state.cipher;
  const keysNeeded = CIPHER_CONFIG.keysPerTerminal;
  const terminals = [];
  for (let i = 0; i < CIPHER_CONFIG.terminalCount; i++) {
    const corrupted = c.sabotageLog.some(s => s.action === 'corrupt' && s.terminal === i && !s.fixed);
    const unlocked = i < c.terminalsUnlocked;
    const isCurrent = i === c.terminalsUnlocked;
    const progressPct = isCurrent ? Math.min(100, (c.keysThisTerminal / keysNeeded) * 100) : (unlocked ? 100 : 0);
    const cls = unlocked ? 'unlocked' : corrupted ? 'corrupted' : 'locked';
    const icon = unlocked ? '🔓' : corrupted ? '⚠️' : '🔒';
    terminals.push(`<div class="cipher-terminal-wrap">
      <div class="cipher-terminal ${cls}">${icon}</div>
      <div class="cipher-terminal-label">${TERMINAL_NAMES[i] || 'T'+(i+1)}</div>
      <div class="cipher-terminal-progress"><div class="cipher-terminal-progress-bar" style="width:${progressPct}%"></div></div>
    </div>`);
    if (i < CIPHER_CONFIG.terminalCount - 1) {
      terminals.push(`<div class="cipher-terminal-connector ${unlocked ? 'active' : ''}"></div>`);
    }
  }
  return `<div class="cipher-terminals">${terminals.join('')}</div>`;
}

function renderPlayerBar() {
  const c = state.cipher;
  const isSab = c.myRole === 'saboteur';
  return `<div class="cipher-player-bar">${c.players.map(p => {
    const isMe = p.id === state.player.id;
    const flagged = c.sabotageLog.some(s => s.action === 'falseclue' && s.target === p.id);
    let cls = 'cipher-pb-player';
    if (isMe) cls += ' pb-me';
    if (p.ejected || !p.alive) cls += ' pb-ejected';
    if (flagged && !p.ejected && p.alive) cls += ' pb-flagged';
    const avatarHTML = p.image ? `<img src="${p.image}">` : (p.avatarText || p.brand.slice(0,2));
    const isDead = !p.alive && !p.ejected;
    const status = p.ejected ? '❌' : isDead ? '☠️' : flagged ? '⚠️' : '🟢';
    // Saboteur sees fake inflated key count for themselves
    const keyDisplay = (isSab && isMe) ? (p.keys + Math.floor(c.questionsAnswered * 0.5)) : (p.keys || 0);
    return `<div class="${cls}">
      <div class="cipher-pb-avatar">${avatarHTML}</div>
      <span class="cipher-pb-name">${isMe ? 'You' : p.brand.split(' ')[0]}</span>
      <span class="cipher-pb-keys">🔑${keyDisplay}</span>
      <span class="cipher-pb-status">${status}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderEventFeed() {
  const c = state.cipher;
  const events = c.eventLog.slice(-6).reverse();
  if (events.length === 0) return '';
  return `<div class="cipher-event-feed">${events.map(e => {
    const cls = e.type === 'danger' ? 'evt-danger' : e.type === 'success' ? 'evt-success' : e.type === 'warning' ? 'evt-warning' : '';
    return `<div class="cipher-event ${cls}"><span class="evt-time">${e.time || ''}</span>${e.text}</div>`;
  }).join('')}</div>`;
}

function renderCipherHunt() {
  const c = state.cipher;
  const timerStr = cipherTimerStr();
  const timerLow = c.timeRemaining <= 60;
  const keysNeeded = CIPHER_CONFIG.keysPerTerminal;
  const isSab = c.myRole === 'saboteur';
  const isGuardian = c.myRole === 'guardian';

  // Current question
  const q = c.currentQ;
  let questionHTML = '';
  if (q && q.fillIn) {
    // Fill-in-the-blank type
    const inputCls = c.huntAnswered ? (c.huntCorrect ? 'correct' : 'wrong') : '';
    questionHTML = `<div class="cipher-question-card">
      <div class="cipher-q-category">${q.cat} • ${q.diff} • Fill-in-the-Blank</div>
      <div class="cipher-q-text">${q.text}</div>
      <div class="cipher-fill-wrap">
        <input class="cipher-fill-input ${inputCls}" id="cipherFillInput" type="text" placeholder="Type your answer..." value="${c.huntFillIn}" ${c.huntAnswered ? 'disabled' : ''} autocomplete="off" />
        ${!c.huntAnswered ? `<button class="cipher-fill-submit" onclick="cipherSubmitFillIn()">Submit Answer</button>` : ''}
        ${c.huntAnswered && c.huntCorrect ? `<div class="cipher-key-earned">🔑 +1 Cipher Key Earned!</div>` : ''}
        ${c.huntAnswered && !c.huntCorrect ? `<div style="text-align:center;margin-top:10px;font-family:Orbitron,monospace;font-size:0.6rem;color:var(--pflx-red)">✕ Answer: ${q.correctAnswer}</div>` : ''}
      </div>
    </div>`;
  } else if (q) {
    // Multiple choice
    const answers = q.answers.map((a, i) => {
      let cls = 'cipher-ans';
      if (c.huntAnswered) {
        if (i === q.correctIdx) cls += ' correct';
        else if (i === c.huntSelectedAns) cls += ' wrong';
      }
      return `<div class="${cls}" data-cipher-ans="${i}">${a}</div>`;
    }).join('');
    questionHTML = `<div class="cipher-question-card">
      <div class="cipher-q-category">${q.cat} • ${q.diff}</div>
      <div class="cipher-q-text">${q.text}</div>
      <div class="cipher-answers">${answers}</div>
      ${c.huntAnswered && c.huntCorrect ? `<div class="cipher-key-earned">🔑 +1 Cipher Key Earned!</div>` : ''}
      ${c.huntAnswered && !c.huntCorrect ? `<div style="text-align:center;margin-top:12px;font-family:Orbitron,monospace;font-size:0.65rem;color:var(--pflx-red)">✕ Incorrect</div>` : ''}
    </div>`;
  }

  // Saboteur inline action button (Among Us style)
  const sabInline = (isSab && !c.saboteurInlineCooldown && c.questionsAnswered > 1) ?
    `<div class="cipher-sab-inline" onclick="cipherInlineSabotage()">💀 SABOTAGE</div>` : '';

  // Guardian scan reveal overlay
  let scanOverlay = '';
  if (c.guardianScanResult) {
    const sr = c.guardianScanResult;
    scanOverlay = `<div class="cipher-scan-reveal ${sr.isSab?'scan-saboteur':'scan-clear'}">
      <div style="font-size:2rem;margin-bottom:8px">${sr.isSab?'🔴':'✅'}</div>
      <div style="font-family:Orbitron,monospace;font-size:0.9rem;font-weight:700;color:${sr.isSab?'var(--pflx-red)':'var(--pflx-green)'}">${sr.name} is ${sr.isSab?'SABOTEUR!':'CLEAR'}</div>
      <div style="font-size:0.6rem;color:#8892b0;margin-top:6px">This information is secret to you.</div>
    </div>`;
  }

  // Kill button for saboteur
  const killBtn = isSab ?
    `<div class="cipher-kill-btn ${c.killCooldown?'on-cooldown':''}" onclick="${c.killCooldown?'':'cipherKillPlayer()'}">${c.killCooldown?'💀 COOLDOWN':'💀 KILL'}</div>` : '';

  // Body reported overlay
  const bodyOverlay = c.bodyReported ? `<div class="body-reported-overlay">
    <div class="body-reported-card">
      <div style="font-size:3rem;margin-bottom:12px">☠️</div>
      <h2>BODY REPORTED</h2>
      <div style="font-size:0.7rem;color:#ccc;margin-top:12px">Emergency meeting starting...</div>
    </div>
  </div>` : '';

  // Mini-game or question
  const taskHTML = c.miniGame ? renderMiniGame() : questionHTML;

  return `<div class="cipher-wrap">
    <div class="cipher-hud">
      <div class="cipher-hud-item"><div class="cipher-hud-label">Timer</div><div class="cipher-hud-value timer ${timerLow?'low':''}">${timerStr}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Terminals</div><div class="cipher-hud-value">${c.terminalsUnlocked} / ${CIPHER_CONFIG.terminalCount}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Keys</div><div class="cipher-hud-value" style="color:var(--pflx-gold)">${c.keysThisTerminal} / ${keysNeeded}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Round</div><div class="cipher-hud-value">${c.roundNumber}</div></div>
    </div>
    ${renderTerminals()}
    <div class="explorer-wrap">

      <div style="text-align:center;font-size:0.45rem;color:#5a6a8a;margin-top:4px">Arrow keys / WASD to move • SPACE to interact • R to report body</div>

    ${taskHTML}
    ${renderEventFeed()}
    ${sabInline}
    ${killBtn}
    ${scanOverlay}
    ${renderCrisisOverlay()}
    ${bodyOverlay}

}

function renderCipherDiscuss() {
  const c = state.cipher;
  const timerStr = cipherTimerStr();
  const timerLow = c.timeRemaining <= 60;
  const isGuardian = c.myRole === 'guardian';
  const canVote = c.votesUsed < CIPHER_CONFIG.voteLimit;
  const discTime = c.discussionTimer;
  const discMins = Math.floor(discTime / 60);
  const discSecs = discTime % 60;
  const discStr = `${discMins}:${discSecs.toString().padStart(2,'0')}`;

  // Guardian scan UI
  let guardianUI = '';
  if (isGuardian && !c.guardianScannedThisRound) {
    const scanTargets = c.players.filter(p => p.id !== state.player.id && p.alive && !p.ejected);
    guardianUI = `<div class="cipher-guardian-panel" style="margin:12px 0;padding:10px;border-radius:10px;background:rgba(0,188,212,0.08);border:1px solid rgba(0,188,212,0.2)">
      <div style="font-family:Orbitron,monospace;font-size:0.55rem;color:var(--pflx-teal);margin-bottom:8px">🛡️ GUARDIAN SCAN — Choose a player to investigate</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${scanTargets.map(p =>
        `<button class="btn-arena" style="font-size:0.55rem;padding:6px 12px" onclick="cipherGuardianScan('${p.id}')">${p.brand.split(' ')[0]}</button>`
      ).join('')}</div>
    </div>`;
  } else if (isGuardian && c.guardianScannedThisRound && c.guardianScanResult) {
    const sr = c.guardianScanResult;
    guardianUI = `<div style="margin:12px 0;padding:10px;border-radius:10px;background:rgba(${sr.isSab?'255,23,68':'0,230,118'},0.08);border:1px solid rgba(${sr.isSab?'255,23,68':'0,230,118'},0.2);text-align:center">
      <div style="font-family:Orbitron,monospace;font-size:0.6rem;color:${sr.isSab?'var(--pflx-red)':'var(--pflx-green)'}">🛡️ Scan Result: ${sr.name} is ${sr.isSab?'SABOTEUR 🔴':'CLEAR ✅'}</div>
      <div style="font-size:0.5rem;color:#5a6a8a;margin-top:4px">This info is secret to you</div>
    </div>`;
  }

  // Chat messages from AI + system + player
  const chatHTML = c.discussionMessages.map(m => {
    if (m.system) {
      return `<div class="cipher-chat-msg chat-system">${m.text}</div>`;
    }
    if (m.isMe) {
      return `<div class="cipher-chat-msg chat-me"><span class="chat-name">You:</span> ${m.text}</div>`;
    }
    return `<div class="cipher-chat-msg"><span class="chat-name">${m.name}:</span> ${m.text}</div>`;
  }).join('');
  const typingHTML = c.chatTyping ? '<div class="chat-typing">Someone is typing...</div>' : '';

  // Latest sabotage report summary
  const latestSab = c.sabotageLog.filter(s => s.round === c.roundNumber);
  const sabReport = latestSab.length > 0 ? latestSab.map(s => `<div style="color:var(--pflx-red);font-size:0.6rem;margin:2px 0">${s.message}</div>`).join('') : '<div style="color:var(--pflx-green);font-size:0.6rem">No sabotage detected this round.</div>';

  return `<div class="cipher-wrap cipher-discuss-wrap">
    <div class="cipher-hud">
      <div class="cipher-hud-item"><div class="cipher-hud-label">Game Timer</div><div class="cipher-hud-value timer ${timerLow?'low':''}">${timerStr}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Terminals</div><div class="cipher-hud-value">${c.terminalsUnlocked} / ${CIPHER_CONFIG.terminalCount}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Discussion</div><div class="cipher-hud-value" style="color:var(--pflx-gold)">${discStr}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Round</div><div class="cipher-hud-value">${c.roundNumber}</div></div>
    </div>

    <div style="text-align:center;margin:8px 0">
      <div style="font-family:Orbitron,monospace;font-size:0.65rem;color:var(--pflx-gold);letter-spacing:0.1em">💬 DISCUSSION PHASE</div>
      <div style="font-size:0.5rem;color:#5a6a8a;margin-top:4px">Review evidence, discuss suspicions, then vote or skip</div>
    </div>

    <div style="margin:10px 0;padding:10px;border-radius:10px;background:rgba(255,23,68,0.04);border:1px solid rgba(255,23,68,0.1)">
      <div style="font-family:Orbitron,monospace;font-size:0.5rem;color:var(--pflx-red);margin-bottom:6px">⚠️ SABOTAGE REPORT — Round ${c.roundNumber}</div>
      ${sabReport}
    </div>

    ${renderPlayerBar()}
    ${guardianUI}

    <div class="cipher-chat">${chatHTML || '<div style="text-align:center;font-size:0.55rem;color:#5a6a8a;padding:20px">Crewmates are analyzing the evidence...</div>'}${typingHTML}</div>
    <div class="cipher-chat-input-wrap">
      <input class="cipher-chat-input" id="cipherChatInput" type="text" placeholder="Type a message..." value="${c.chatInput || ''}" autocomplete="off" />
      <button class="cipher-chat-send" onclick="cipherSendChat()">Send</button>
    </div>

    ${renderEventFeed()}

    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
      ${canVote ? `<button class="btn-arena btn-arena-red" style="font-size:0.7rem;padding:10px 24px" onclick="cipherCallVote()">🗳️ Call Vote (${CIPHER_CONFIG.voteLimit - c.votesUsed} left)</button>` : `<button class="btn-arena" style="font-size:0.7rem;padding:10px 24px;opacity:0.3" disabled>🗳️ No Votes Left</button>`}
      <button class="btn-arena" style="font-size:0.7rem;padding:10px 24px" onclick="cipherSkipVote()">⏭️ Skip to Next Round</button>
    </div>
  </div>`;
}

function renderCipherSabotage() {
  const c = state.cipher;
  const isSaboteur = c.myRole === 'saboteur';
  const mins = Math.floor(c.timeRemaining / 60);
  const secs = c.timeRemaining % 60;
  const timerStr = `${mins}:${secs.toString().padStart(2,'0')}`;

  if (isSaboteur) {
    const actions = [
      { id:'corrupt', icon:'💀', name:'Corrupt Terminal', desc:'Corrupt the next unlocked terminal. Agents must re-earn keys to fix it.' },

      { id:'falseclue', icon:'🎭', name:'Plant False Clue', desc:'Frame a random Agent as suspicious. Their name glows red to other players.' },

        <div class="cipher-hud-item"><div class="cipher-hud-label">Phase</div><div class="cipher-hud-value" style="color:var(--pflx-red)">SABOTAGE</div></div>

      <div class="cipher-sabotage-wrap saboteur-view">
        <div class="cipher-sabotage-title">Choose Your Sabotage</div>

        <div class="cipher-sabotage-actions">

        <div class="cipher-hud-item"><div class="cipher-hud-label">Phase</div><div class="cipher-hud-value" style="color:var(--pflx-cyan)">SCANNING</div></div>
      </div>
      <div class="cipher-scanning agent-view">
        <div class="scan-anim"></div>
        <div class="cipher-sabotage-title">Scanning for Threats...</div>
        <div style="font-size:0.7rem;color:#8892b0;margin-top:8px">Someone may be sabotaging the mission. Stay alert.</div>
        ${c.sabotageLog.length > 0 ? `<div style="margin-top:16px;font-family:Orbitron,monospace;font-size:0.6rem;color:var(--pflx-red)">⚠️ ${c.sabotageLog[c.sabotageLog.length-1].message || 'Anomaly detected!'}</div>` : ''}

    </div>`;
  }
}

function renderCipherVote() {
  const c = state.cipher;
  const mins = Math.floor(c.timeRemaining / 60);
  const secs = c.timeRemaining % 60;
  const timerStr = `${mins}:${secs.toString().padStart(2,'0')}`;
  const alivePlayers = c.players.filter(p => p.alive && p.id !== state.player.id);

  const cards = alivePlayers.map(p => {
    const avatarHTML = p.image ? `<img src="${p.image}">` : (p.avatarText || p.brand.slice(0,2));
    const isVoted = c.selectedVoteTarget === p.id;
    return `<div class="cipher-vote-card ${isVoted?'voted':''} ${p.ejected?'ejected':''}" onclick="cipherCastVote('${p.id}')">
      <div class="cipher-vote-avatar">${avatarHTML}</div>
      <div class="cipher-vote-name">${p.brand}</div>
    </div>`;
  }).join('');

  let resultHTML = '';
  if (c.voteResults) {
    const r = c.voteResults;
    if (r.ejected) {
      const wasSab = r.ejectedRole === 'saboteur';
      resultHTML = `<div class="cipher-vote-result ${wasSab?'correct-eject':'wrong-eject'}">
        <div style="font-size:1.5rem;margin-bottom:8px">${wasSab ? '✅' : '❌'}</div>
        <div style="font-family:Orbitron,monospace;font-size:0.8rem;font-weight:700;color:${wasSab?'var(--pflx-green)':'var(--pflx-red)'}">
          ${r.ejectedName} was ${wasSab ? 'the SABOTEUR!' : 'an AGENT!'}
        </div>
        <div style="font-size:0.65rem;color:#8892b0;margin-top:6px">${wasSab ? '+1 Key bonus for all Agents!' : '-60 seconds penalty!'}</div>
      </div>`;
    } else {
      resultHTML = `<div class="cipher-vote-result no-eject">
        <div style="font-size:1.2rem;margin-bottom:6px">🤷</div>
        <div style="font-family:Orbitron,monospace;font-size:0.7rem;color:#8892b0">No majority reached. No one was ejected.</div>
      </div>`;
    }
  }

  return `<div class="cipher-wrap">
    <div class="cipher-hud">
      <div class="cipher-hud-item"><div class="cipher-hud-label">Timer</div><div class="cipher-hud-value timer">${timerStr}</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Phase</div><div class="cipher-hud-value" style="color:var(--pflx-gold)">VOTE</div></div>
      <div class="cipher-hud-item"><div class="cipher-hud-label">Votes Left</div><div class="cipher-hud-value">${CIPHER_CONFIG.voteLimit - c.votesUsed}</div></div>
    </div>
    <div style="text-align:center;margin:16px 0">
      <div style="font-family:Orbitron,monospace;font-size:1rem;font-weight:700;color:var(--pflx-gold);margin-bottom:6px">🗳️ EMERGENCY VOTE</div>
      <div style="font-size:0.7rem;color:#8892b0">Select who you think is the Saboteur</div>
    </div>
    <div class="cipher-vote-grid">${cards}</div>
    ${c.selectedVoteTarget && !c.voteResults ? `<div style="text-align:center;margin-top:12px"><button class="btn-arena btn-arena-gold" style="font-size:0.7rem;padding:10px 32px" onclick="cipherConfirmVote()">Confirm Vote</button></div>` : ''}
    ${resultHTML}
    ${c.voteResults ? `<div style="text-align:center;margin-top:16px"><button class="btn-arena" style="font-size:0.7rem;padding:10px 28px" onclick="cipherResumeAfterVote()">Continue →</button></div>` : ''}
  </div>`;
}

function renderCipherResult() {
  const c = state.cipher;
  const won = (c.myRole === 'saboteur' && c.outcome === 'saboteur_wins') ||
              (c.myRole !== 'saboteur' && c.outcome === 'agents_win');
  const outcomeText = c.outcome === 'agents_win' ? 'AGENTS WIN — ESCAPE SUCCESSFUL' : 'SABOTEUR WINS — TIME EXPIRED';

  const roleRevealCards = c.players.map(p => {
    const avatarHTML = p.image ? `<img src="${p.image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (p.avatarText || p.brand.slice(0,2));
    const roleClass = p.role === 'saboteur' ? 'reveal-saboteur' : p.role === 'guardian' ? 'reveal-guardian' : 'reveal-agent';
    const roleLabel = p.role === 'saboteur' ? '🦹 Saboteur' : p.role === 'guardian' ? '🛡️ Guardian' : '🕵️ Agent';
    const ejectedTag = p.ejected ? ' <span style="color:var(--pflx-red);font-size:0.45rem">(Ejected)</span>' : '';
    return `<div class="cipher-reveal-card ${roleClass}">
      <div class="cipher-vote-avatar" style="margin:0 auto 6px">${avatarHTML}</div>
      <div style="font-family:Orbitron,monospace;font-size:0.55rem;color:#ccd6f6;font-weight:600">${p.brand}${ejectedTag}</div>
      <div class="cipher-reveal-role" style="color:${p.role==='saboteur'?'var(--pflx-red)':p.role==='guardian'?'var(--pflx-gold)':'var(--pflx-cyan)'}">${roleLabel}</div>
      <div style="font-size:0.5rem;color:#5a6a8a;margin-top:2px">${p.keys||0} keys</div>
    </div>`;
  }).join('');

  const rewards = c.xcRewards || {};
  const rewardRows = [
    ['Participation', rewards.participation || 0],
    [won && c.myRole !== 'saboteur' ? 'Agents Win Bonus' : won && c.myRole === 'saboteur' ? 'Saboteur Win Bonus' : 'Defeat', rewards.outcome || 0],
    ['Top Earner Bonus', rewards.topEarner || 0],
    ['Correct Vote Bonus', rewards.correctVote || 0],
  ].filter(r => r[1] > 0);
  const totalXC = rewardRows.reduce((s, r) => s + r[1], 0);

  return `<div class="cipher-wrap cipher-result-wrap">
    <img src="Cipher.png" alt="Cipher" style="height:100px;margin:0 auto 12px;display:block;filter:drop-shadow(0 0 15px rgba(0,229,255,0.3))" onerror="this.style.display='none'" />
    <div style="font-family:Orbitron,monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:#5a6a8a;margin-bottom:4px">GAME OVER</div>
    <div class="cipher-result-outcome ${won?'win':'lose'}">${outcomeText}</div>
    <div style="font-size:0.75rem;color:#8892b0;margin-bottom:20px">You were: <strong style="color:${c.myRole==='saboteur'?'var(--pflx-red)':c.myRole==='guardian'?'var(--pflx-gold)':'var(--pflx-cyan)'}">${c.myRole==='saboteur'?'🦹 Saboteur':c.myRole==='guardian'?'🛡️ Guardian':'🕵️ Agent'}</strong></div>

    <div style="font-family:Orbitron,monospace;font-size:0.6rem;color:#5a6a8a;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Role Reveal</div>
    <div class="cipher-roles-reveal">${roleRevealCards}</div>

    <div class="cipher-xc-rewards glass-panel" style="padding:16px">
      <div style="font-family:Orbitron,monospace;font-size:0.65rem;color:var(--pflx-gold);margin-bottom:10px;text-align:center">XC REWARDS</div>
      ${rewardRows.map(r => `<div class="cipher-xc-row"><span class="label">${r[0]}</span><span class="amount">+${r[1]} XC</span></div>`).join('')}
      <div class="cipher-xc-row cipher-xc-total"><span class="label" style="color:#e6f1ff;font-weight:700">Total Earned</span><span class="amount" style="font-size:1rem">+${totalXC} XC</span></div>
    </div>

    <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
      <button class="btn-arena" style="font-size:0.7rem;padding:10px 28px" onclick="exitCipher()">← Back to Side Quests</button>
      <button class="btn-arena btn-arena-gold" style="font-size:0.7rem;padding:10px 28px" onclick="launchCipherSession()">🔄 Play Again</button>
    </div>
  </div>`;
}

function renderWager() {
  const p = state.player;
  const presets = WAGER_PRESETS.map(w => {
    const active = state.wager === w ? 'active' : '';
    const dis = w > p.xc ? 'disabled' : '';
    return `<div class="wager-preset ${active} ${dis}" data-wager="${w}">${w.toLocaleString()} XC</div>`;
  }).join("");

  return `<div class="home-wrap"><div class="wager-wrap"><div class="wager-box glass-panel">
    <div class="wager-title text-glow-gold">Set Your Wager</div>
    <div class="wager-bal">Your balance: <span>${p.xc.toLocaleString()} XC</span></div>
    <div class="wager-presets">${presets}</div>
    <div class="wager-summary">
      <div class="row"><span class="lbl">Your Wager</span><span class="amt" style="color:#ffd740;font-size:1.2rem">${state.wager.toLocaleString()} XC</span></div>
      <div class="row"><span class="lbl">Potential Prize</span><span class="amt" style="color:#00e676">${(state.wager*2).toLocaleString()} XC</span></div>
    </div>
    <div class="wager-actions">
      <button class="btn-arena btn-arena-red" onclick="goHome()">Cancel</button>
      <button class="btn-arena btn-arena-gold" onclick="startBattle()">Lock In Wager</button>
    </div>
  </div></div></div>`;
}

function renderBattle() {
  const p = state.player;
  const o = state.opponent;
  const q = state.questions[state.round];
  const tPct = (state.timeLeft / q.time) * 100;
  const tColor = state.timeLeft > 10 ? '#00e5ff' : state.timeLeft > 5 ? '#ffd740' : '#ff1744';

  const answers = q.opts.map((opt, i) => {
    let cls = '';
    if (state.showResult && i === q.ans) cls = 'correct';
    else if (state.showResult && state.selectedAns === i && i !== q.ans) cls = 'wrong';
    else if (state.selectedAns === i) cls = 'selected';
    if (state.answered && !cls) cls = 'disabled';
    const letter = String.fromCharCode(65 + i);
    let icon = '';
    if (state.showResult && i === q.ans) icon = '<span class="answer-icon" style="color:#00e676">✓</span>';
    if (state.showResult && state.selectedAns === i && i !== q.ans) icon = '<span class="answer-icon" style="color:#ff1744">✗</span>';
    return `<div class="answer-btn glass-panel ${cls}" data-answer="${i}">
      <div class="answer-letter">${letter}</div>
      <span class="answer-text">${opt}</span>${icon}
    </div>`;
  }).join("");

  return `<div style="max-width:800px;margin:0 auto;padding:24px;position:relative;z-index:10">
    <div class="battle-header">
      <div class="battle-chip"><span class="lbl">Round</span><span class="val" style="color:#00e5ff">${state.round+1}/${state.totalRounds}</span></div>
      <div class="battle-chip"><span class="lbl">Prize</span><span class="val" style="color:#ffd740">${(state.wager*2).toLocaleString()} XC</span></div>
    </div>
    <div class="scoreboard">
      <div class="sb-player"><span class="avatar">${p.avatar}</span><div><div class="name" style="color:#00e5ff">${p.brand}</div><div class="score">${state.myScore}</div></div></div>
      <div class="vs-divider" style="font-size:1.5rem">VS</div>
      <div class="sb-player"><div style="text-align:right"><div class="name" style="color:#ff1744">${o.brand}</div><div class="score">${state.oppScore}</div></div><span class="avatar">${o.avatar}</span></div>
    </div>
    <div class="timer-wrap"><div class="timer-fill" style="width:${tPct}%;background:${tColor}${state.timeLeft<=5?';animation:flicker 0.15s infinite':''}"></div></div>
    <div class="question-box glass-panel">
      <div class="cat">${q.cat} • ${q.diff}</div>
      <div class="q">${q.q}</div>
    </div>
    <div class="answers-grid">${answers}</div>
  </div>`;
}

function renderResult() {
  const p = state.player;
  const o = state.opponent;
  const won = state.myScore > state.oppScore;
  return `<div class="result-wrap"><div class="result-box glass-panel" style="border-color:${won?'rgba(255,215,64,0.3)':'rgba(255,23,68,0.3)'};${won?'box-shadow:0 0 30px rgba(255,215,64,0.2)':''}">
    ${won?'<img src="Battle%20Arena.png" alt="Victory" style="height:120px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,215,64,0.5))" />':'<div class="result-emoji">💀</div>'}
    <div class="result-title ${won?'text-glow-gold':'text-glow-red'}" style="color:${won?'#ffd740':'#ff1744'}">${won?'Victory!':'Defeat'}</div>
    <div class="result-sub">${won?'You won '+(state.wager*2).toLocaleString()+' XC!':'You lost '+state.wager.toLocaleString()+' XC.'}</div>
    <div class="result-scores">
      <div class="ps"><div class="name">${p.brand}</div><div class="score" style="color:#00e5ff">${state.myScore}</div></div>
      <div class="sep">—</div>
      <div class="ps"><div class="name">${o.brand}</div><div class="score" style="color:#ff1744">${state.oppScore}</div></div>

    <div class="result-actions">

      <button class="btn-arena btn-arena-gold" onclick="goLeaderboard()">Leaderboard</button>
    </div>

}

function renderLeaderboard() {
  // Only rank players, not hosts/admins (unless they have arena stats)
  const sorted = [...PLAYERS].filter(p => p.stats.battles > 0 || p.role === "player").sort((a,b) => b.stats.ap - a.stats.ap);

  // Helper for avatar HTML
  function avatarHTML(p, size) {
    if (p.image) return `<img src="${p.image}" alt="">`;
    return p.avatarText || p.avatar;
  }

  // Podium: show top 3 in 2nd-1st-3rd order
  const top3 = sorted.slice(0, 3);
  const podiumOrder = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3;
  const heights = top3.length >= 3 ? [140, 190, 110] : [190];
  const colors = top3.length >= 3 ? ['#c0c0c0','#ffd740','#cd7f32'] : ['#ffd740'];
  const medals = top3.length >= 3 ? ['🥈','🥇','🥉'] : ['🥇'];
  const borderGlows = top3.length >= 3
    ? ['rgba(192,192,192,0.3)','rgba(255,215,64,0.4)','rgba(205,127,50,0.3)']
    : ['rgba(255,215,64,0.4)'];

  const podium = podiumOrder.map((p,i) => {
    const isMe = p.id === state.player.id;
    return `<div class="podium-slot">
      <div class="podium-avatar" style="border:2px solid ${borderGlows[i]};box-shadow:0 0 20px ${borderGlows[i]};background:linear-gradient(135deg,rgba(0,229,255,0.12),rgba(124,77,255,0.12))">${avatarHTML(p)}</div>
      <div class="name" style="${isMe?'color:#ffd740':''}">${p.brand}</div>
      <div class="pathway">${p.pathway}</div>
      <div class="ap">${p.stats.ap.toLocaleString()} AP</div>
      <div class="podium-bar" style="height:${heights[i]}px;background:linear-gradient(to top,${colors[i]}33,${colors[i]}08);border:1px solid ${colors[i]}44;border-bottom:none">${medals[i]}</div>
    </div>`;
  }).join("");

  const rows = sorted.map((p,i) => {
    const ri = getRankInfo(p.stats.ap);
    const wr = p.stats.battles>0?Math.round(p.stats.wins/p.stats.battles*100):0;
    const wrC = wr>=60?"#00e676":wr>=40?"#ffd740":"#ff1744";
    const isMe = p.id === state.player.id;
    const posIcon = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return `<div class="lb-row ${isMe?'me':''}">
      <div class="pos">${posIcon}</div>
      <div class="player">
        <div class="lb-avatar">${avatarHTML(p)}</div>
        <div class="info">
          <div class="pname" style="${isMe?'color:#ffd740':'color:#ccc'}">${p.brand}</div>
          <div class="ppath">${p.pathway}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:center"><div class="rank-badge" style="background:${ri.color}15;border:1px solid ${ri.color}40;color:${ri.color};font-size:9px">${ri.icon} ${ri.tier}</div></div>
      <div class="cell" style="color:#00e676">${p.stats.wins}</div>
      <div class="cell" style="color:#ff1744">${p.stats.losses}</div>
      <div class="cell" style="color:${wrC}">${wr}%</div>
      <div class="cell" style="color:#ffd740">${p.stats.streak>0?p.stats.streak+'🔥':'—'}</div>
      <div class="ap-val" style="color:${ri.color}">${p.stats.ap.toLocaleString()}</div>
    </div>`;
  }).join("");

  return `<div class="lb-wrap">
    <div class="lb-hero"><img src="Battle%20Arena.png" alt="Battle Arena" style="height:100px;margin:0 auto 12px;display:block;filter:drop-shadow(0 0 12px rgba(0,229,255,0.3))" /><h2 class="text-glow-cyan">Arena Leaderboard</h2><p>Top fighters ranked by Arena Points. Synced with <img src="PFLX.png" alt="PFLX" style="height:14px;vertical-align:middle;margin:0 2px;filter:drop-shadow(0 0 4px rgba(0,229,255,0.3))" /> X-Coin.</p></div>
    <div class="podium">${podium}</div>
    <div class="lb-table glass-panel">
      <div class="lb-row header"><div style="text-align:center">#</div><div>Player</div><div style="text-align:center">Rank</div><div style="text-align:center">W</div><div style="text-align:center">L</div><div style="text-align:center">Win%</div><div style="text-align:center">🔥</div><div style="text-align:right">AP</div></div>
      ${rows}
    </div>
    <div style="text-align:center;margin-top:32px"><button class="btn-arena" onclick="goHome()">← Back to Arena</button></div>
  </div>`;
}

// Event binding
function bindEvents() {
  // ── Category card click delegation (fixes inline onclick issues) ──
  const catGrid = document.querySelector('.cat-grid');
  if (catGrid) {
    catGrid.onclick = function(e) {
      const card = e.target.closest('.cat-card');
      if (card && card.dataset.cat) {
        e.stopPropagation();
        goScreen(card.dataset.cat);
      }
    };
  }

  // ── Esports mode card click delegation ──
  const esGrid = document.querySelector('.esports-grid');
  if (esGrid) {
    esGrid.onclick = function(e) {
      const card = e.target.closest('.esports-mode-card');
      if (card) {
        const modeId = card.getAttribute('onclick')?.match(/esportsSelectMode\('([^']+)'\)/)?.[1];
        if (modeId) { e.stopPropagation(); esportsSelectMode(modeId); }
      }
    };
  }

  // ── Badge toggle chips in settings ──
  document.querySelectorAll('.es-badge-toggle').forEach(toggle => {
    toggle.onclick = function(e) {
      e.preventDefault();
      const cb = this.querySelector('input[type="checkbox"]');
      if (cb) { cb.checked = !cb.checked; this.classList.toggle('active', cb.checked); }
    };
  });

  // ── Login Step 1: Brand select dropdown ──
  const brandSelect = document.getElementById("brandSelect");
  if (brandSelect) {
    brandSelect.onchange = () => {
      const pid = brandSelect.value;
      if (!pid) return;
      SFX.click();
      state.selectedLoginPlayer = PLAYERS.find(p => p.id === pid);
      state.loginStep = "pin";
      state.pinValue = "";
      state.pinError = "";
      state.pinVisible = false;
      render();
    };
  }

  // ── Login Step 2: PIN input ──
  const pinInput = document.getElementById("pinInput");
  if (pinInput) {
    pinInput.oninput = () => {
      state.pinValue = pinInput.value.replace(/[^0-9]/g, "").slice(0, 4);
      pinInput.value = state.pinValue;
      // Enable/disable play button live
      const playBtn = document.getElementById("playBtn");
      if (playBtn) {
        if (state.pinValue.length === 4) {
          playBtn.disabled = false;
          playBtn.classList.remove("disabled");
          playBtn.classList.add("enabled");
        } else {
          playBtn.disabled = true;
          playBtn.classList.add("disabled");
          playBtn.classList.remove("enabled");
        }
      }
    };
    // Auto-focus the pin input
    pinInput.focus();
  }

  // ── PIN visibility toggle ──
  const pinToggle = document.getElementById("pinToggle");
  if (pinToggle) {
    pinToggle.onclick = () => {
      state.pinVisible = !state.pinVisible;
      render();
      // Re-focus pin input after re-render
      setTimeout(() => {
        const pi = document.getElementById("pinInput");
        if (pi) { pi.focus(); pi.setSelectionRange(pi.value.length, pi.value.length); }
      }, 50);
    };
  }

  // ── Change player (back to step 1) ──
  const changePlayer = document.getElementById("changePlayer");
  if (changePlayer) {
    changePlayer.onclick = () => {
      state.loginStep = "select";
      state.selectedLoginPlayer = null;
      state.pinValue = "";
      state.pinError = "";
      state.pinVisible = false;
      render();
    };
  }

  // ── Play button (verify PIN & login) ──
  const playBtn = document.getElementById("playBtn");
  if (playBtn) {
    playBtn.onclick = () => {
      const p = state.selectedLoginPlayer;
      if (!p) return;
      if (state.pinValue === p.pin) {
        // Successful login
        login(p.id);
      } else {
        SFX.loginError();
        state.pinError = "Incorrect PIN. Try again.";
        state.pinValue = "";
        render();
        setTimeout(() => {
          const pi = document.getElementById("pinInput");
          if (pi) pi.focus();
        }, 50);
      }
    };
  }

  // ── PIN Enter key support ──
  if (pinInput) {
    pinInput.onkeydown = (e) => {
      if (e.key === "Enter" && state.pinValue.length === 4) {
        const pb = document.getElementById("playBtn");
        if (pb) pb.click();
      }
    };
  }

  // ── Side panel close handlers ──
  const panelOverlay = document.getElementById("panelOverlay");
  if (panelOverlay) {
    panelOverlay.onclick = () => togglePanel();
  }
  const panelClose = document.getElementById("panelClose");
  if (panelClose) {
    panelClose.onclick = () => togglePanel();
  }

  // ── Category card selection (Home screen) ──
  document.querySelectorAll('[data-cat]').forEach(card => {
    card.onclick = () => {
      if (card.classList.contains('disabled')) return;
      if (card.dataset.cat === 'side_quests') goSideQuests();
    };
  });
  // ── Game mode selection (Side Quests screen) ──
  document.querySelectorAll('[data-mode]').forEach(card => {
    card.onclick = () => { SFX.modeSelect(); state.selectedMode = card.dataset.mode; render(); };
  });
  // ── Cipher answer selection ──
  document.querySelectorAll('[data-cipher-ans]').forEach(el => {
    el.onclick = () => {
      if (!state.cipher.huntAnswered) cipherAnswerQuestion(parseInt(el.dataset.cipherAns));
    };
  });
  // ── Cipher fill-in-blank input ──
  const cipherFillEl = document.getElementById('cipherFillInput');
  if (cipherFillEl) {
    cipherFillEl.oninput = () => { state.cipher.huntFillIn = cipherFillEl.value; };
    cipherFillEl.onkeydown = (e) => { e.stopPropagation(); if (e.key === 'Enter') cipherSubmitFillIn(); };
  }
  // ── Mini-game code input ──
  const mgCodeInput = document.getElementById('mgCodeInput');
  if (mgCodeInput) {
    mgCodeInput.oninput = () => { if (state.cipher.miniGame) state.cipher.miniGame.input = mgCodeInput.value.replace(/[^0-9]/g,'').slice(0,4); };
    mgCodeInput.onkeydown = (e) => { e.stopPropagation(); if (e.key === 'Enter') cipherMiniGameAction('submit',0); };
  }
  // ── Crisis code input ──
  const crisisInput = document.getElementById('crisisCodeInput');
  if (crisisInput) {
    crisisInput.oninput = () => { state.cipher.crisisInput = crisisInput.value.replace(/[^0-9]/g,'').slice(0,4); if (state.cipher.crisisInput.length === 4) cipherCrisisAction('submit'); };
  }
  // ── Player chat input ──
  const chatInput = document.getElementById('cipherChatInput');
  if (chatInput) {
    chatInput.oninput = () => { state.cipher.chatInput = chatInput.value; };
    chatInput.onkeydown = (e) => {
      e.stopPropagation();
      if (e.key === 'Enter') cipherSendChat();
    };
    // Auto-scroll chat to bottom
    const chatBox = chatInput.closest('.cipher-discuss-wrap')?.querySelector('.cipher-chat');
    if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
  }
  // ── Music controls ──
  const musicVolSlider = document.getElementById('musicVolume');
  if (musicVolSlider) {
    musicVolSlider.oninput = () => {
      MUSIC.setVolume(parseFloat(musicVolSlider.value));
      document.getElementById('musicVolLabel').textContent = Math.round(MUSIC.getVolume() * 100) + '%';
    };
  }
  const musicMuteToggle = document.getElementById('musicMuteToggle');
  if (musicMuteToggle) {
    musicMuteToggle.onclick = () => {
      MUSIC.setMuted(!MUSIC.isMuted());
      render();
    };
  }
  // ── Wager selection ──
  document.querySelectorAll('[data-wager]').forEach(el => {
    el.onclick = () => { if (!el.classList.contains('disabled')) { SFX.wagerSelect(); state.wager = parseInt(el.dataset.wager); render(); } };
  });
  // ── Quiz answer selection ──
  document.querySelectorAll('[data-answer]').forEach(el => {
    el.onclick = () => { if (!state.answered) answerQuestion(parseInt(el.dataset.answer)); };
  });

  // ── Settings: volume slider ──
  const volSlider = document.getElementById("sfxVolume");
  if (volSlider) {
    volSlider.oninput = () => {
      SFX.setVolume(parseFloat(volSlider.value));
      document.getElementById("volLabel").textContent = Math.round(SFX.getVolume() * 100) + "%";
    };
    volSlider.onchange = () => SFX.click(); // preview sound at new volume
  }
  const muteToggle = document.getElementById("sfxMuteToggle");
  if (muteToggle) {
    muteToggle.onclick = () => {
      SFX.setMuted(!SFX.isMuted());
      render();
    };
  }

  // ── Game Card Background uploads ──
  MODES.forEach((m, i) => {
    const inp = document.getElementById(`bgInput_${i}`);
    if (inp) {
      inp.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          MODES[i].bgImage = ev.target.result;
          SFX.loginSuccess();
          render();
        };
        reader.readAsDataURL(file);
      };
    }

  // ── Admin Mode Admin Panel handlers ──
  const adminImageInput = document.getElementById('adminImageInput');
  const adminImageUpload = document.getElementById('adminImageUpload');
  if (adminImageInput && adminImageUpload) {
    // Click the zone to trigger file picker
    adminImageUpload.onclick = () => adminImageInput.click();
    // Drag & drop
    adminImageUpload.ondragover = (e) => { e.preventDefault(); adminImageUpload.style.borderColor='#00e5ff'; };
    adminImageUpload.ondragleave = () => { adminImageUpload.style.borderColor=''; };
    adminImageUpload.ondrop = (e) => {
      e.preventDefault();
      adminImageUpload.style.borderColor='';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => { state.adminImagePreview = ev.target.result; render(); };
        reader.readAsDataURL(file);
      }
    };
    // File input change
    adminImageInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        state.adminImagePreview = ev.target.result;
        render();
      };
      reader.readAsDataURL(file);
    };
  }

  const adminForm = document.getElementById('adminForm');
  if (adminForm) {
    adminForm.onsubmit = (e) => {
      e.preventDefault();
      
      // Gather form data
      const name = document.getElementById('adminModeName')?.value || '';
      const desc = document.getElementById('adminModeDesc')?.value || '';
      const category = document.getElementById('adminModeCategory')?.value || 'side_quests';
      const linkType = document.getElementById('adminLinkType')?.value || 'none';
      const linkUrl = document.getElementById('adminLinkUrl')?.value || '';
      const min = parseInt(document.getElementById('adminMinPlayers')?.value) || 2;
      const max = parseInt(document.getElementById('adminMaxPlayers')?.value) || 6;
      const mins = parseInt(document.getElementById('adminDuration')?.value) || 15;

      // Gather selected tags
      const tags = [];
      if (document.getElementById('adminTagMultiplayer')?.checked) tags.push('Multiplayer');
      if (document.getElementById('adminTagSolo')?.checked) tags.push('Solo');
      if (document.getElementById('adminTagRanked')?.checked) tags.push('Ranked');
      if (document.getElementById('adminTagPvP')?.checked) tags.push('PvP');
      if (document.getElementById('adminTagPvE')?.checked) tags.push('PvE');
      if (document.getElementById('adminTagBeta')?.checked) tags.push('Beta');

      // Validate
      if (!name.trim()) {
        alert('Mode name is required');
        return;
      }
      if (!desc.trim()) {
        alert('Mode description is required');
        return;
      }
      if (linkType !== 'none' && !linkUrl.trim()) {
        alert('Link URL is required for this link type');
        return;
      }

      // Create custom mode object
      const customMode = {
        name: name,
        desc: desc,
        category: category,
        linkType: linkType,
        linkUrl: linkUrl,
        min: min,
        max: max,
        mins: mins,
        tags: tags,
        bgImage: state.adminImagePreview || null,
        icon: '',
        status: 'active',
        createdAt: new Date().toISOString()
      };

      // Add the mode
      addCustomMode(customMode);

      // Reset form and preview
      adminForm.reset();
      state.adminImagePreview = null;

      // Navigate back to the appropriate screen
      SFX.modeSelect();
      const returnTo = customMode.category || state.adminPreCategory || 'home';
      state.adminPreCategory = null;
      state.screen = returnTo;
      render();
    };
  }
  });
}

// CIPHER GAME LOGIC

function goScreen(s) { SFX.navigate(); state.screen = s; render(); }

function showCipherJoin() {
  const code = prompt("Enter 6-digit Room Code:");
  if (code && code.length === 6) {
    // In preview, just launch a new session (simulated join)
    launchCipherSession();
  }
}

function launchCipherSession() {
  SFX.navigate();
  // Generate 6-digit room code
  const roomCode = String(Math.floor(100000 + Math.random() * 900000));
  // Populate with current player + random AI players from roster
  const otherPlayers = PLAYERS.filter(p => p.id !== state.player.id && p.role === 'player');
  const aiCount = Math.min(3 + Math.floor(Math.random() * 3), otherPlayers.length); // 3-5 AI
  const aiPlayers = shuffleArray(otherPlayers).slice(0, aiCount);
  const allPlayers = [state.player, ...aiPlayers].map(p => ({
    id: p.id, name: p.name, brand: p.brand, avatarText: p.avatarText,
    image: p.image, role: null, keys: 0, ejected: false, alive: true,
  }));

  state.cipher = {
    phase: "lobby", roomCode, players: allPlayers,
    myRole: null, terminalsUnlocked: 0, totalKeys: 0, keysThisTerminal: 0,
    currentQ: null, questionsAnswered: 0, questionPool: [],
    timeRemaining: CIPHER_CONFIG.sessionTimer * 60,
    timerInterval: null, roundNumber: 1,
    voteActive: false, votesUsed: 0, selectedVoteTarget: null, voteResults: null,
    sabotageChoice: null, sabotageLog: [], outcome: null,
    showRoleReveal: false, xcRewards: null, huntAnswered: false,
    huntSelectedAns: -1, huntCorrect: null, huntFillIn: '', phaseTimer: null,
    eventLog: [], discussionTimer: 0, discussionInterval: null,
    discussionMessages: [], guardianScannedThisRound: false,
    guardianScanResult: null, saboteurInlineCooldown: false,
    // Ship map & locations
    playerLocations: {}, proximityAlert: null,
    // Kill mechanic
    killCooldown: false, killCooldownTimer: null, deadBodies: [],
    bodyReported: false, bodyReportTimer: null,
    // Crisis events
    crisisActive: false, crisisType: null, crisisTimer: 0,
    crisisInterval: null, crisisCode: '', crisisInput: '',
    crisisHeld: [false, false], crisisResolved: false, crisisRound: 0,
    // Mini-games
    miniGame: null, // { type, state, ... }
    // Player chat
    chatInput: '', chatTyping: false,
    // Top-down explorer
    explorer: null, // initialized when hunt starts
  };
  MUSIC.play('lobby');
  state.screen = "cipher_lobby";
  render();
}

function exitCipher() {
  clearInterval(state.cipher.timerInterval);
  clearInterval(state.cipher.discussionInterval);
  clearInterval(state.cipher.crisisInterval);
  clearTimeout(state.cipher.phaseTimer);
  clearTimeout(state.cipher.bodyReportTimer);
  clearTimeout(state.cipher.killCooldownTimer);

  const el = document.querySelector('.power-outage-mask');

  state.cipher = { phase:null, roomCode:null, myRole:null, players:[], terminalsUnlocked:0,
    totalKeys:0, keysThisTerminal:0, currentQ:null, questionsAnswered:0, questionPool:[],
    timeRemaining:0, timerInterval:null, roundNumber:1, voteActive:false, votesUsed:0,
    selectedVoteTarget:null, voteResults:null, sabotageChoice:null, sabotageLog:[],
    outcome:null, showRoleReveal:false, xcRewards:null, huntAnswered:false,
    huntSelectedAns:-1, huntCorrect:null, huntFillIn:'', phaseTimer:null,
    eventLog:[], discussionTimer:0, discussionInterval:null,
    discussionMessages:[], guardianScannedThisRound:false,
    guardianScanResult:null, saboteurInlineCooldown:false,
    playerLocations:{}, proximityAlert:null,
    killCooldown:false, killCooldownTimer:null, deadBodies:[], bodyReported:false, bodyReportTimer:null,
    crisisActive:false, crisisType:null, crisisTimer:0, crisisInterval:null,
    crisisCode:'', crisisInput:'', crisisHeld:[false,false], crisisResolved:false, crisisRound:0,
    miniGame:null, chatInput:'', chatTyping:false, explorer:null };
  if (window._explorerRAF) { cancelAnimationFrame(window._explorerRAF); window._explorerRAF = null; }
