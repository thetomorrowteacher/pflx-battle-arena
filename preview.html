// RIFT CANVAS DRAW
// ═══════════════════════════════════════════════════════════════════

function riftDraw() {
  const canvas = document.getElementById('riftCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const r = state.rift;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0,0,W,H);

  // Void background
  ctx.fillStyle = '#06080e';
  ctx.fillRect(0,0,W,H);

  // Grid lines (Tron-style)
  ctx.strokeStyle = 'rgba(0,229,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

  // Arena border glow
  ctx.strokeStyle = r.phase==='pvp' ? 'rgba(255,23,68,0.3)' : 'rgba(0,229,255,0.15)';
  ctx.lineWidth = 2;
  ctx.strokeRect(4,4,W-8,H-8);

  // Draw enemies
  if (r.phase === 'pve') {
    r.enemies.filter(e => e.alive).forEach(e => {
      ctx.fillStyle = e.color;
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // HP bar
      const bw = e.size * 2;
      ctx.fillStyle = '#111';
      ctx.fillRect(e.x-bw/2, e.y-e.size-8, bw, 4);
      ctx.fillStyle = e.hp > e.maxHp*0.5 ? '#00e676' : e.hp > e.maxHp*0.25 ? '#ffd740' : '#ff1744';
      ctx.fillRect(e.x-bw/2, e.y-e.size-8, bw*(e.hp/e.maxHp), 4);
    });
  }

  // Draw enemy team (PvP)
  if (r.phase === 'pvp') {
    r.enemyTeam.filter(e => e.alive).forEach(e => {
      ctx.fillStyle = '#ff1744';
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(e.x, e.y, 10, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Name
      ctx.fillStyle = '#ff8a80';
      ctx.font = '7px Orbitron, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.brand.split(' ')[0].slice(0,6), e.x, e.y-14);
      // HP bar
      ctx.fillStyle = '#111';
      ctx.fillRect(e.x-15, e.y-20, 30, 3);
      ctx.fillStyle = '#ff1744';
      ctx.fillRect(e.x-15, e.y-20, 30*(e.hp/e.maxHp), 3);
    });
  }

  // Draw team (allies + me)
  r.team.filter(t => t.alive).forEach(t => {
    const isMe = t.isMe;
    const radius = isMe ? 10 : 8;
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = isMe ? 16 : 8;
    ctx.beginPath();
    ctx.arc(t.x, t.y, radius, 0, Math.PI*2);
    ctx.fill();
    if (isMe) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.shadowBlur = 0;
    // Name
    ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.font = isMe ? 'bold 8px Orbitron, monospace' : '6px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isMe ? 'YOU' : t.brand.split(' ')[0].slice(0,6), t.x, t.y - radius - 6);
    // HP bar
    const bw = isMe ? 28 : 20;
    ctx.fillStyle = '#111';
    ctx.fillRect(t.x-bw/2, t.y-radius-4, bw, 3);
    ctx.fillStyle = t.hp > t.maxHp*0.5 ? '#00e676' : t.hp > t.maxHp*0.25 ? '#ffd740' : '#ff1744';
    ctx.fillRect(t.x-bw/2, t.y-radius-4, bw*(t.hp/t.maxHp), 3);
  });

  // Draw projectiles
  r.projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Draw effects (floating text)
  r.effects.forEach(e => {
    const alpha = Math.min(1, e.life / 15);
    ctx.fillStyle = e.color + Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.font = 'bold 10px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(e.text, e.x, e.y);
  });

  // Phase indicator
  ctx.fillStyle = r.phase === 'pvp' ? 'rgba(255,23,68,0.8)' : 'rgba(0,229,255,0.7)';
  ctx.font = 'bold 9px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(r.phase === 'pvp' ? `PVP CLASH — ${r.pvpTimer}s` : `WAVE ${r.wave}/${RIFT_CONFIG.pveWaves}`, W/2, 16);
}

// ── Rift Input Handlers ──
document.addEventListener('keydown', (e) => {
  if (!state.rift || state.screen !== 'rift_arena') return;
  const r = state.rift;
  if (e.key === 'w' || e.key === 'W') r.keys.w = true;
  if (e.key === 'a' || e.key === 'A') r.keys.a = true;
  if (e.key === 's' || e.key === 'S') r.keys.s = true;
  if (e.key === 'd' || e.key === 'D') r.keys.d = true;
  if (e.key === 'q' || e.key === 'Q') { e.preventDefault(); riftUseAbility('q'); }
  if (e.key === 'w' || e.key === 'W') { /* already handled by movement */ }
  if (e.key === 'e' || e.key === 'E') { e.preventDefault(); riftUseAbility('e'); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); riftUseAbility('r'); }
});

document.addEventListener('keyup', (e) => {
  if (!state.rift) return;
  const r = state.rift;
  if (e.key === 'w' || e.key === 'W') r.keys.w = false;
  if (e.key === 'a' || e.key === 'A') r.keys.a = false;
  if (e.key === 's' || e.key === 'S') r.keys.s = false;
  if (e.key === 'd' || e.key === 'D') r.keys.d = false;
});

// Mouse tracking for aiming
document.addEventListener('mousemove', (e) => {
  if (!state.rift || state.screen !== 'rift_arena') return;
  const canvas = document.getElementById('riftCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  state.rift.mouse.x = (e.clientX - rect.left) * scaleX;
  state.rift.mouse.y = (e.clientY - rect.top) * scaleY;
});

// Click to fire Q
document.addEventListener('click', (e) => {
  if (!state.rift || state.screen !== 'rift_arena' || state.rift.phase === 'results') return;
  const canvas = document.getElementById('riftCanvas');
  if (canvas && canvas.contains(e.target)) {
    riftUseAbility('q');
  }
});

// Fetch live badges from X-Coin
async function loadXCoinBadges() {
  try {
    const res = await fetch(XCOIN_SEED_URL);
    if (!res.ok) throw new Error('Fetch failed');
    const data = await res.json();
    if (data.coinCategories && data.coinCategories.length > 0) {
      const badges = [];
      data.coinCategories.forEach(cat => {
        const catName = cat.name;
        const catType = catName.toLowerCase().includes('primary') ? 'primary' :
                        catName.toLowerCase().includes('premium') ? 'premium' :
                        catName.toLowerCase().includes('executive') ? 'executive' : 'signature';
        (cat.coins || []).forEach(coin => {
          const id = coin.name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
          badges.push({
            id: id,
            name: coin.name,
            icon: '',
            image: coin.image || '',
            type: catType,
            category: catName,
            desc: (coin.description || '').substring(0, 120),
            xc: coin.xc || 0,
          });
        });
      });
      if (badges.length > 0) {
        PFLX_BADGES = badges;
        console.log('✅ Loaded ' + badges.length + ' badges from X-Coin');
      }
    }
  } catch (e) {
    console.warn('⚠️ Could not fetch X-Coin badges, using fallback:', e.message);
  }
}
loadXCoinBadges();

// Default config per mode — host can override these
function getDefaultEsportsConfig() {
  const config = {};
  ESPORTS_MODES.forEach(mode => {
    config[mode.id] = {
      enabled: true,
      timers: {},
      xcBase: 500,
      participationXC: 100,
      winnerXC: 500,
      xcMultipliers: {},
      participationBadges: ['positive_participant'],
      winnerBadges: ['arena_champion'],
      coopBadge: 'team_player',
      maxContestantsMulti: 8,
      maxContestantsCoop: 10,
      bgMusic: '',
      coverImage: '',
      // Keep legacy single-badge keys for backward compat
      participationBadge: 'positive_participant',
      winnerBadge: 'arena_champion',
    };
    mode.tiers.forEach(tier => {
      config[mode.id].timers[tier.diff] = tier.timeMins;
      config[mode.id].xcMultipliers[tier.diff] = tier.xcMult;
    });
  });
  return config;
}

let esportsHostConfig = getDefaultEsportsConfig();

// ── Merge saved config with defaults (fills missing keys) ──
function mergeWithDefaults(parsed) {
  const defaults = getDefaultEsportsConfig();
  Object.keys(defaults).forEach(modeId => {
    if (!parsed[modeId]) parsed[modeId] = defaults[modeId];
    else {
      Object.keys(defaults[modeId]).forEach(key => {
        if (parsed[modeId][key] === undefined) parsed[modeId][key] = defaults[modeId][key];
      });
    }
  });
  return parsed;
}

// ── Load config: Supabase (source of truth) → localStorage (fast cache) ──
async function loadEsportsConfig() {
  // 1. Try localStorage first for instant load
  try {
    const cached = localStorage.getItem('pflx_esports_host_config');
    if (cached) esportsHostConfig = mergeWithDefaults(JSON.parse(cached));
  } catch(e) {}

  // 2. Then fetch from Supabase (overrides localStorage)
  try {
    const cloudConfig = await supabaseLoad('arena_esports_config');
    if (cloudConfig && typeof cloudConfig === 'object') {
      esportsHostConfig = mergeWithDefaults(cloudConfig);
      // Update localStorage cache
      try { localStorage.setItem('pflx_esports_host_config', JSON.stringify(esportsHostConfig)); } catch(e) {}
      console.log('✅ Esports config loaded from Supabase');
    }
    // Load media from Supabase
    const cloudMedia = await supabaseLoad('arena_esports_media');
    if (cloudMedia && typeof cloudMedia === 'object') {
      Object.keys(cloudMedia).forEach(modeId => {
        if (esportsHostConfig[modeId]) {
          if (cloudMedia[modeId].coverImage) esportsHostConfig[modeId].coverImage = cloudMedia[modeId].coverImage;
          if (cloudMedia[modeId].bgMusic) esportsHostConfig[modeId].bgMusic = cloudMedia[modeId].bgMusic;
          if (cloudMedia[modeId].bgMusicName) esportsHostConfig[modeId].bgMusicName = cloudMedia[modeId].bgMusicName;
        }
      });
      console.log('✅ Esports media loaded from Supabase');
    }
  } catch(e) {
    console.warn('⚠️ Supabase config load failed, using cache:', e.message);
  }
  render();
}

// ── Save config: Supabase (source of truth) + localStorage (cache) ──
async function saveEsportsConfig() {
  // Separate config (settings) from media (cover images, music)
  const configOnly = {};
  const mediaOnly = {};
  Object.keys(esportsHostConfig).forEach(modeId => {
    const cfg = { ...esportsHostConfig[modeId] };
    const media = {};
    if (cfg.coverImage) { media.coverImage = cfg.coverImage; }
    if (cfg.bgMusic) { media.bgMusic = cfg.bgMusic; media.bgMusicName = cfg.bgMusicName || ''; }
    delete cfg.coverImage; delete cfg.bgMusic; delete cfg.bgMusicName;
    configOnly[modeId] = cfg;
    if (Object.keys(media).length > 0) mediaOnly[modeId] = media;
  });

  // Save config to Supabase
  const configOk = await supabaseSave('arena_esports_config', configOnly);
  // Save media to Supabase (separate key to keep config small)
  let mediaOk = true;
  if (Object.keys(mediaOnly).length > 0) {
    mediaOk = await supabaseSave('arena_esports_media', mediaOnly);
  }

  // Also cache in localStorage for fast reload
  try { localStorage.setItem('pflx_esports_host_config', JSON.stringify(configOnly)); } catch(e) {}

  if (configOk && mediaOk) {
    console.log('✅ Esports config + media saved to Supabase');
    return true;
  } else {
    console.error('❌ Supabase save failed — config:', configOk, 'media:', mediaOk);
    alert('Some settings failed to save to the cloud. Check your connection and try again.');
    return false;
  }
}

async function esportsConfigSave() {
  ESPORTS_MODES.forEach(mode => {
    const cfg = esportsHostConfig[mode.id];
    // Read timers
    ['cadet','officer','commander'].forEach(diff => {
      const el = document.getElementById('esc_timer_' + mode.id + '_' + diff);
      if (el) cfg.timers[diff] = parseInt(el.value) || cfg.timers[diff];
    });
    // Read XC multipliers
    ['cadet','officer','commander'].forEach(diff => {
      const el = document.getElementById('esc_xc_' + mode.id + '_' + diff);
      if (el) cfg.xcMultipliers[diff] = parseFloat(el.value) || cfg.xcMultipliers[diff];
    });
    // Read base XC
    const baseEl = document.getElementById('esc_basexc_' + mode.id);
    if (baseEl) cfg.xcBase = parseInt(baseEl.value) || cfg.xcBase;
    // Read segmented XC
    const partXcEl = document.getElementById('esc_partxc_' + mode.id);
    if (partXcEl) cfg.participationXC = parseInt(partXcEl.value) || 100;
    const winXcEl = document.getElementById('esc_winxc_' + mode.id);
    if (winXcEl) cfg.winnerXC = parseInt(winXcEl.value) || 500;
    // Read multi-badges
    const partBadgesEl = document.getElementById('esc_partbadges_' + mode.id);
    if (partBadgesEl) {
      cfg.participationBadges = Array.from(partBadgesEl.querySelectorAll('input:checked')).map(el => el.value);
      if (cfg.participationBadges.length === 0) cfg.participationBadges = ['positive_participant'];
      cfg.participationBadge = cfg.participationBadges[0]; // legacy compat
    }
    const winBadgesEl = document.getElementById('esc_winbadges_' + mode.id);
    if (winBadgesEl) {
      cfg.winnerBadges = Array.from(winBadgesEl.querySelectorAll('input:checked')).map(el => el.value);
      if (cfg.winnerBadges.length === 0) cfg.winnerBadges = ['arena_champion'];
      cfg.winnerBadge = cfg.winnerBadges[0]; // legacy compat
    }
    const coopBadge = document.getElementById('esc_badge_coop_' + mode.id);
    if (coopBadge) cfg.coopBadge = coopBadge.value;
    // Read branding
    const coverEl = document.getElementById('esc_coverimg_' + mode.id);
    if (coverEl) cfg.coverImage = coverEl.value.trim();
    const musicEl = document.getElementById('esc_bgmusic_' + mode.id);
    if (musicEl) cfg.bgMusic = musicEl.value.trim();
    // Read max contestants
    const maxMulti = document.getElementById('esc_maxmulti_' + mode.id);
    if (maxMulti) cfg.maxContestantsMulti = parseInt(maxMulti.value) || 8;
    const maxCoop = document.getElementById('esc_maxcoop_' + mode.id);
    if (maxCoop) cfg.maxContestantsCoop = parseInt(maxCoop.value) || 10;
    // Read enabled
    const enabledEl = document.getElementById('esc_enabled_' + mode.id);
    if (enabledEl) cfg.enabled = enabledEl.checked;
  });
  await saveEsportsConfig();
  esportsSettingsSaved = true;
  SFX.correct();
  render();
}

async function esportsConfigReset() {
  esportsHostConfig = getDefaultEsportsConfig();
  await saveEsportsConfig();
  esportsSettingsSaved = false;
  SFX.wrong();
  render();
}

// Get effective timer for a mode + difficulty (host override or default)
function getEsportsTimer(modeId, diff) {
  return esportsHostConfig[modeId]?.timers?.[diff] ?? ESPORTS_MODES.find(m => m.id === modeId)?.tiers.find(t => t.diff === diff)?.timeMins ?? 30;
}

function getEsportsXcMult(modeId, diff) {
  return esportsHostConfig[modeId]?.xcMultipliers?.[diff] ?? ESPORTS_MODES.find(m => m.id === modeId)?.tiers.find(t => t.diff === diff)?.xcMult ?? 1;
}

function getEsportsBaseXc(modeId) {
  return esportsHostConfig[modeId]?.xcBase ?? 500;
}

function getEsportsBadge(modeId, type) {
  const cfg = esportsHostConfig[modeId];
  if (!cfg) return 'positive_participant';
  if (type === 'participation') return cfg.participationBadge;
  if (type === 'winner') return cfg.winnerBadge;
  if (type === 'coop') return cfg.coopBadge;
  return 'positive_participant';
}

function isModeEnabled(modeId) {
  return esportsHostConfig[modeId]?.enabled !== false;
}

// ── Create a new match ──
function esportsCreateMatch(title) {
  const mode = esportsState.selectedMode;
  const diffId = esportsState.selectedDiff;
  const playMode = esportsState.selectedPlay;
  const tier = mode.tiers.find(t => t.diff === diffId);
  const prompt = getRandomPrompt(mode);

  // Use host config overrides
  const cfgTimeMins = getEsportsTimer(mode.id, diffId);
  const cfgXcMult = getEsportsXcMult(mode.id, diffId);
  const cfgBaseXC = getEsportsBaseXc(mode.id);
  const cfgMaxMulti = esportsHostConfig[mode.id]?.maxContestantsMulti || 8;
  const cfgMaxCoop = esportsHostConfig[mode.id]?.maxContestantsCoop || 10;

  const match = {
    id: nextMatchId(),
    modeId: mode.id,
    modeName: mode.name,
    modeIcon: mode.icon,
    modeColor: mode.color,
    pathway: mode.pathway,
    difficulty: diffId,
    playMode: playMode,
    title: title || mode.name + ' Challenge',
    prompt: prompt,
    materialKit: generateMaterialKit(mode.id),
    tools: tier.tools,
    timeMins: cfgTimeMins,
    timeLeft: cfgTimeMins * 60,
    xcMult: cfgXcMult,
    baseXC: cfgBaseXC,
    status: 'open',
    contestants: [{ id: state.player.id, name: state.player.name, brand: state.player.brand, avatar: state.player.avatarText, image: state.player.image, submission: null, votes: 0 }],
    maxContestants: playMode === 'solo' ? 1 : (playMode === 'coop' ? cfgMaxCoop : cfgMaxMulti),
    hostId: state.player.id,
    createdAt: Date.now(),
    winner: null,
    badges: {
      participation: getEsportsBadge(mode.id, 'participation'),
      winner: getEsportsBadge(mode.id, 'winner'),
      coop: getEsportsBadge(mode.id, 'coop'),
      participationBadges: esportsHostConfig[mode.id]?.participationBadges || ['positive_participant'],
      winnerBadges: esportsHostConfig[mode.id]?.winnerBadges || ['arena_champion'],
    },
    participationXC: esportsHostConfig[mode.id]?.participationXC || 100,
    winnerXC: esportsHostConfig[mode.id]?.winnerXC || cfgBaseXC,
    bgMusic: esportsHostConfig[mode.id]?.bgMusic || '',
    coverImage: esportsHostConfig[mode.id]?.coverImage || '',
  };

  esportsState.matches.unshift(match);
  esportsState.activeMatch = match.id;
  saveEsportsState();

  if (playMode === 'solo') {
    esportsStartMatch(match.id);
  } else {
    esportsState.view = 'match';
  }
  SFX.modeSelect();
  render();
}

// ── Join match ──
function esportsJoinMatch(matchId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match || match.status !== 'open') return;
  if (match.contestants.find(c => c.id === state.player.id)) return;
  if (match.contestants.length >= match.maxContestants) return;

  match.contestants.push({ id: state.player.id, name: state.player.name, brand: state.player.brand, avatar: state.player.avatarText, image: state.player.image, submission: null, votes: 0 });
  esportsState.activeMatch = matchId;
  esportsState.view = 'match';
  saveEsportsState();
  SFX.click();
  render();
}

// ── Start match (begin timer) ──
function esportsStartMatch(matchId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match) return;
  stopLobbyMusic();
  match.status = 'in_progress';
  match.timeLeft = match.timeMins * 60;
  esportsState.activeMatch = matchId;
  esportsState.view = 'match';
  saveEsportsState();

  // Clear any existing timer
  if (esportsState.matchTimer) clearInterval(esportsState.matchTimer);

  esportsState.matchTimer = setInterval(() => {
    const m = esportsState.matches.find(x => x.id === matchId);
    if (!m || m.status !== 'in_progress') { clearInterval(esportsState.matchTimer); return; }
    m.timeLeft--;
    if (m.timeLeft <= 0) {
      m.timeLeft = 0;
      clearInterval(esportsState.matchTimer);
      esportsEndSubmissions(matchId);
    }
    // Update timer display without full re-render
    const timerEl = document.getElementById('esports-timer-val');
    const fillEl = document.getElementById('esports-timer-fill');
    if (timerEl) {
      const mins = Math.floor(m.timeLeft / 60);
      const secs = m.timeLeft % 60;
      timerEl.textContent = mins + ':' + String(secs).padStart(2, '0');
    }
    if (fillEl) {
      const pct = (m.timeLeft / (m.timeMins * 60)) * 100;
      fillEl.style.width = pct + '%';
      fillEl.style.background = pct > 50 ? 'var(--pflx-green)' : (pct > 20 ? 'var(--pflx-gold)' : 'var(--pflx-red)');
    }
    saveEsportsState();
  }, 1000);

  SFX.battleStart();
  render();
}

// ── Submit entry ──
function esportsSubmit(matchId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match) return;
  const linkInput = document.getElementById('esports-sub-link');
  const notesInput = document.getElementById('esports-sub-notes');
  const link = linkInput ? linkInput.value.trim() : '';
  const notes = notesInput ? notesInput.value.trim() : '';

  if (!link && !notes) { SFX.loginError(); return; }

  const contestant = match.contestants.find(c => c.id === state.player.id);
  if (contestant) {
    contestant.submission = { link, notes, submittedAt: Date.now() };
    saveEsportsState();
    SFX.correct();
    render();
  }
}

// ── End submissions, go to judging ──
function esportsEndSubmissions(matchId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match) return;
  if (esportsState.matchTimer) clearInterval(esportsState.matchTimer);

  if (match.playMode === 'solo') {
    // Solo mode — auto-complete; only award winner if they submitted
    match.status = 'completed';
    const contestant = match.contestants.find(c => c.id === state.player.id);
    match.winner = (contestant && contestant.submission) ? state.player.id : null;
    esportsState.view = 'results';
  } else {
    match.status = 'judging';
    esportsState.view = 'judging';
  }
  saveEsportsState();
  SFX.timeout();
  render();
}

// ── Vote for a submission ──
function esportsVote(matchId, playerId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match || match.status !== 'judging') return;
  // Can't vote for yourself
  if (playerId === state.player.id) return;

  const contestant = match.contestants.find(c => c.id === playerId);
  if (contestant) {
    contestant.votes++;
    saveEsportsState();
    SFX.click();
    render();
  }
}

// ── Finalize match — pick winner ──
function esportsFinalizeMatch(matchId) {
  const match = esportsState.matches.find(m => m.id === matchId);
  if (!match) return;

  // Winner = most votes; tie = first submitter
  const withSubs = match.contestants.filter(c => c.submission);
  if (withSubs.length === 0) {
    match.status = 'completed';
    esportsState.view = 'results';
    saveEsportsState();
    render();
    return;
  }

  withSubs.sort((a,b) => b.votes - a.votes || a.submission.submittedAt - b.submission.submittedAt);
  match.winner = withSubs[0].id;
  match.status = 'completed';
  esportsState.view = 'results';
  saveEsportsState();
  SFX.victory();
  render();
}

  esportsState.view = 'hub';

async function saveModeSettings(modeId) {
  const cfg = esportsHostConfig[modeId];
  const mode = ESPORTS_MODES.find(m => m.id === modeId);
  if (!cfg || !mode) return;

  // Timers
  ['cadet','officer','commander'].forEach(diff => {
    const el = document.getElementById('msp_timer_' + diff);
    if (el) cfg.timers[diff] = parseInt(el.value) || cfg.timers[diff];
  });
  // XC multipliers
  ['cadet','officer','commander'].forEach(diff => {
    const el = document.getElementById('msp_xc_' + diff);
    if (el) cfg.xcMultipliers[diff] = parseFloat(el.value) || cfg.xcMultipliers[diff];
  });
  // Participant XC + Winner XC
  const partXc = document.getElementById('msp_partxc');
  if (partXc) cfg.participationXC = parseInt(partXc.value) || 100;
  const winXc = document.getElementById('msp_winxc');
  if (winXc) cfg.winnerXC = parseInt(winXc.value) || 500;
  // Multi-badges
  const partBadges = document.getElementById('msp_partbadges');
  if (partBadges) {
    cfg.participationBadges = Array.from(partBadges.querySelectorAll('input:checked')).map(el => el.value);
    if (cfg.participationBadges.length === 0) cfg.participationBadges = ['positive_participant'];
    cfg.participationBadge = cfg.participationBadges[0];
  }
  const winBadges = document.getElementById('msp_winbadges');
  if (winBadges) {
    cfg.winnerBadges = Array.from(winBadges.querySelectorAll('input:checked')).map(el => el.value);
    if (cfg.winnerBadges.length === 0) cfg.winnerBadges = ['arena_champion'];
    cfg.winnerBadge = cfg.winnerBadges[0];
  }
  // Co-op badge
  const coopEl = document.getElementById('msp_coopbadge');
  if (coopEl) cfg.coopBadge = coopEl.value;
  // Player limits
  const maxMulti = document.getElementById('msp_maxmulti');
  if (maxMulti) cfg.maxContestantsMulti = parseInt(maxMulti.value) || 8;
  const maxCoop = document.getElementById('msp_maxcoop');
  if (maxCoop) cfg.maxContestantsCoop = parseInt(maxCoop.value) || 10;
  // Enabled
  const enabledEl = document.getElementById('msp_enabled');
  if (enabledEl) cfg.enabled = enabledEl.checked;
  // Cover image + music are handled via file upload handlers (already set on cfg)

  await saveEsportsConfig();
  SFX.correct();
  closeModeSettings();
  render();
}

// ── Media storage: separate localStorage keys to avoid bloating config ──
function saveMedia(key, data) {
  try { localStorage.setItem(key, data); return true; }
  catch(e) { console.warn('Media too large for localStorage:', key, Math.round(data.length/1024)+'KB'); return false; }
}
function loadMedia(key) {
  try { return localStorage.getItem(key) || ''; } catch(e) { return ''; }
}
function clearMedia(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

// Load persisted media into config on startup
function loadAllMedia() {
  ESPORTS_MODES.forEach(mode => {
    const cfg = esportsHostConfig[mode.id];
    if (cfg) {
      const cover = loadMedia('pflx_es_cover_' + mode.id);
      if (cover) cfg.coverImage = cover;
      const music = loadMedia('pflx_es_music_' + mode.id);
      if (music) cfg.bgMusic = music;
      const musicName = loadMedia('pflx_es_musicname_' + mode.id);
      if (musicName) cfg.bgMusicName = musicName;
    }
  });
}
loadAllMedia();

function mspUploadCover(modeId, input) {
  const file = input.files[0];
  if (!file) return;
  // Compress image via canvas — max 800px wide, JPEG quality 0.6
  const img = new Image();
  img.onload = function() {
    const maxW = 800;
    const scale = img.width > maxW ? maxW / img.width : 1;
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const compressed = canvas.toDataURL('image/jpeg', 0.6);
    console.log('Cover compressed: ' + Math.round(compressed.length/1024) + 'KB (from ' + Math.round(file.size/1024) + 'KB)');
    esportsHostConfig[modeId].coverImage = compressed;
    renderModeSettingsOverlay();
  };
  img.src = URL.createObjectURL(file);
}

function mspClearCover(modeId) {
  esportsHostConfig[modeId].coverImage = '';
  renderModeSettingsOverlay();
}

function mspUploadMusic(modeId, input) {
  const file = input.files[0];
  if (!file) return;
  // Limit music to 2MB
  if (file.size > 2 * 1024 * 1024) {
    alert('Music file must be under 2MB. Try a shorter clip or lower quality MP3.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    esportsHostConfig[modeId].bgMusic = e.target.result;
    esportsHostConfig[modeId].bgMusicName = file.name;
    renderModeSettingsOverlay();
  };
  reader.readAsDataURL(file);
}

            ${allBadges.map(b => `<label class="es-badge-toggle ${winBadges.includes(b.id) ? 'active' : ''}"><input type="checkbox" value="${b.id}" ${winBadges.includes(b.id) ? 'checked' : ''} style="display:none" /><span>${b.image ? '<img src="'+b.image+'" style="width:16px;height:16px;border-radius:3px;vertical-align:middle;margin-right:3px">' : b.icon} ${b.name}</span></label>`).join('')}
          </div>
        </div>
      </div>

      <!-- Co-op + Player Limits -->
      <div class="msp-section">
        <h4>👥 Co-op & Player Limits</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="msp-field"><label>Co-op Badge</label><select id="msp_coopbadge">${allBadges.map(b => `<option value="${b.id}" ${cfg.coopBadge===b.id?'selected':''}>${b.icon} ${b.name}</option>`).join('')}</select></div>
          <div class="msp-field"><label>Max Multiplayer</label><input type="number" id="msp_maxmulti" value="${cfg.maxContestantsMulti}" min="2" max="32" /></div>
          <div class="msp-field"><label>Max Co-op</label><input type="number" id="msp_maxcoop" value="${cfg.maxContestantsCoop}" min="4" max="32" /></div>
        </div>
      </div>

      <!-- Save bar -->
      <div class="msp-save-bar">
        <button class="btn-arena btn-arena-red" style="font-size:0.6rem;padding:8px 16px" onclick="closeModeSettings()">Cancel</button>
        <button class="btn-arena btn-arena-gold" style="font-size:0.7rem;padding:10px 24px" onclick="saveModeSettings('${modeId}')">💾 Save Settings</button>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);

  // Wire badge toggles in overlay
  document.querySelectorAll('#modeSettingsOverlay .es-badge-toggle').forEach(toggle => {
    toggle.onclick = function(e) {
      e.preventDefault();
      e.stopPropagation();
      const cb = this.querySelector('input[type="checkbox"]');
      if (cb) { cb.checked = !cb.checked; this.classList.toggle('active', cb.checked); }
    };
  });
}

// ── Lobby background music ──
function requestPlatformMusicPause() {
  try { window.parent.postMessage(JSON.stringify({ type: 'pflx_music_control', action: 'pause' }), '*'); } catch(e) {}
}
function requestPlatformMusicResume() {
  try { window.parent.postMessage(JSON.stringify({ type: 'pflx_music_control', action: 'resume' }), '*'); } catch(e) {}
}

function startLobbyMusic(modeId) {
  stopLobbyMusic();
  // Pause Platform/console music so lobby music can play clean
  requestPlatformMusicPause();
  const cfg = esportsHostConfig[modeId];
  if (!cfg?.bgMusic) return;
  try {
    modeSettingsBgMusicAudio = new Audio(cfg.bgMusic);
    modeSettingsBgMusicAudio.loop = true;
    modeSettingsBgMusicAudio.volume = 0.3;
    modeSettingsBgMusicAudio.play().catch(() => {});
  } catch(e) {}
}

function stopLobbyMusic() {
  if (modeSettingsBgMusicAudio) {
    modeSettingsBgMusicAudio.pause();
    modeSettingsBgMusicAudio.currentTime = 0;
    modeSettingsBgMusicAudio = null;
  }
  // Resume Platform music when leaving the lobby
  requestPlatformMusicResume();
}

// ── Render: In-Match View ──
function renderEsportsMatch() {
  const match = esportsState.matches.find(m => m.id === esportsState.activeMatch);
  if (!match) return renderEsportsHub();

  const mode = ESPORTS_MODES.find(m => m.id === match.modeId);
  const mins = Math.floor(match.timeLeft / 60);
  const secs = match.timeLeft % 60;
  const pct = (match.timeLeft / (match.timeMins * 60)) * 100;
  const timerColor = pct > 50 ? 'var(--pflx-green)' : (pct > 20 ? 'var(--pflx-gold)' : 'var(--pflx-red)');

  const isInProgress = match.status === 'in_progress';
  const myEntry = match.contestants.find(c => c.id === state.player.id);
  const hasSubmitted = myEntry && myEntry.submission;
  const isHost = match.hostId === state.player.id;

  // Contestants grid
  const contestantCards = match.contestants.map(c => {
    const sub = c.submission ? ' submitted' : '';
    const av = c.image ? `<img src="${c.image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : c.avatar;
    return `<div class="ec-player${sub}">
      <div class="ec-av">${av}</div>
      <div class="ec-name">${c.brand || c.name}${c.submission ? ' ✓' : ''}</div>
    </div>`;
  }).join('');

  // Tools tags
  const toolTags = match.tools.map(t => `<div class="esports-tool-tag">${t}</div>`).join('');

  // Submission form (only show if in_progress and not submitted)
  let submitSection = '';
  if (isInProgress && myEntry && !hasSubmitted) {
    submitSection = `<div class="esports-submit">
      <h4>📤 Submit Your Entry</h4>
      <input type="text" class="es-link-input" id="esports-sub-link" placeholder="${mode.submissionLabel}" />
      <textarea class="es-textarea" id="esports-sub-notes" placeholder="Notes about your submission (optional)" style="margin-top:8px"></textarea>
      <div style="text-align:right;margin-top:12px">
        <button class="btn-arena btn-arena-gold" style="font-size:0.7rem;padding:10px 20px" onclick="esportsSubmit('${match.id}')">Submit Entry</button>
      </div>
    </div>`;
  } else if (hasSubmitted) {
    submitSection = `<div class="esports-submit" style="border-color:rgba(0,230,118,0.2)">
      <h4 style="color:#00e676">✅ Entry Submitted</h4>
      <p style="font-size:12px;color:#aaa;margin-top:4px">${myEntry.submission.link}</p>
      ${myEntry.submission.notes ? `<p style="font-size:11px;color:#666;margin-top:4px">${myEntry.submission.notes}</p>` : ''}
    </div>`;
  }

  // Start / End buttons
  let actionButtons = '';
  if (match.status === 'open' && isHost && match.playMode !== 'solo') {
    actionButtons = `<div style="text-align:center;margin-bottom:20px">
      <button class="btn-arena btn-arena-gold" style="font-size:0.8rem;padding:14px 32px" onclick="esportsStartMatch('${match.id}')">⚡ Start Match</button>
    </div>`;
  }
  if (isInProgress && isHost) {
    actionButtons += `<div style="text-align:center;margin-top:16px">
      <button class="btn-arena btn-arena-red" style="font-size:0.65rem;padding:8px 20px" onclick="esportsEndSubmissions('${match.id}')">⏹️ End Early — Go to Judging</button>
    </div>`;
  }

  return `<div class="esports-match">
    <button class="sq-back" onclick="esportsGoHub()" style="margin-bottom:16px">← Exit Match</button>

    <div class="esports-match-header">
      <div class="emh-mode">
        <div class="emh-mode-icon" style="filter:drop-shadow(0 0 8px ${match.modeColor})">${match.modeIcon}</div>
        <div>
          <div class="emh-mode-name" style="color:${match.modeColor}">${match.modeName}</div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;font-family:Orbitron,monospace">${match.difficulty} • ${match.playMode}</div>
        </div>
      </div>
      <div class="emh-timer">

      <div class="emh-status ${isInProgress ? 'working' : ''}" style="${match.status === 'open' ? 'background:rgba(41,121,255,0.1);border:1px solid rgba(41,121,255,0.3);color:#2979ff' : ''}">${match.status === 'open' ? '⏳ Waiting' : (isInProgress ? '🔥 Live' : '⚖️ Judging')}</div>
    </div>

    ${isInProgress ? `<div class="esports-timer-bar"><div class="esports-timer-fill" id="esports-timer-fill" style="width:${pct}%;background:${timerColor}"></div></div>` : ''}

    <div class="esports-prompt">
      <div class="ep-label">🎯 Design Prompt</div>
      <div class="ep-text">${match.prompt}</div>
    </div>

    ${match.materialKit ? `<div class="es-material-kit">
      <div class="esk-title">📦 ${match.materialKit.label}</div>
      <div class="esk-items">
        ${match.materialKit.items.map(item => `<div class="esk-item"><span class="esk-label">${item.label}:</span> <span class="esk-value">${item.value}</span></div>`).join('')}

    <div style="text-align:center;margin-bottom:16px">
      <div style="font-family:Orbitron,monospace;font-size:0.6rem;color:#888;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Allowed Tools</div>
      <div class="esports-tools">${toolTags}</div>
    </div>

    ${actionButtons}

    <div class="esports-contestants">
      <h4>Contestants (${match.contestants.length}/${match.maxContestants})</h4>
      <div class="ec-grid">${contestantCards}</div>
    </div>

    ${submitSection}
  </div>`;
}

// ── Render: Results Screen ──
function renderEsportsResults() {
  const match = esportsState.matches.find(m => m.id === esportsState.activeMatch);
  if (!match) return renderEsportsHub();

  const winner = match.contestants.find(c => c.id === match.winner);
  const isSolo = match.playMode === 'solo';
  const playerContestant = match.contestants.find(c => c.id === state.player.id);
  const didSubmit = playerContestant && playerContestant.submission;

  // Segmented XC
  const xcWin = Math.round((match.winnerXC || match.baseXC) * match.xcMult);
  const xcParticipate = didSubmit ? Math.round((match.participationXC || Math.round(match.baseXC * 0.2)) * match.xcMult) : 0;

  // Badges — support arrays
  const partBadgeIds = match.badges?.participationBadges || [match.badges?.participation || 'positive_participant'];
  const winBadgeIds = match.badges?.winnerBadges || [match.badges?.winner || 'arena_champion'];

  const partBadgeHTML = partBadgeIds.map(bid => {
    const b = PFLX_BADGES.find(x => x.id === bid) || { icon: '🏅', name: bid, image: '' };
    const img = b.image ? `<img src="${b.image}" style="width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:3px">` : b.icon;
    return `<span class="er-badge-chip">${img} ${b.name}</span>`;
  }).join('');
  const winBadgeHTML = winBadgeIds.map(bid => {
    const b = PFLX_BADGES.find(x => x.id === bid) || { icon: '🏆', name: bid, image: '' };
    const img = b.image ? `<img src="${b.image}" style="width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:3px">` : b.icon;
    return `<span class="er-badge-chip">${img} ${b.name}</span>`;
  }).join('');

  // Sorted standings
  const standings = [...match.contestants].sort((a,b) => {
    if (a.id === match.winner) return -1;
    if (b.id === match.winner) return 1;
    return b.votes - a.votes;
  });

  const standingRows = standings.map((c, i) => {
    const isWinner = c.id === match.winner;
    const hasSub = !!c.submission;
    const av = c.image ? `<img src="${c.image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : c.avatar;
    const xcAward = !hasSub ? 0 : (isWinner ? xcWin : xcParticipate);
    return `<div class="er-standing-row ${isWinner ? 'winner' : ''} ${!hasSub ? 'no-sub' : ''}">
      <div class="er-rank-num">${isWinner ? '🏆' : (hasSub ? '#' + (i+1) : '—')}</div>
      <div class="ej-av" style="width:30px;height:30px;font-size:11px">${av}</div>
      <div style="flex:1;font-family:Orbitron,monospace;font-size:0.7rem;font-weight:${isWinner ? 700 : 500};color:${isWinner ? '#ffd740' : (hasSub ? '#ccc' : '#666')}">${c.brand || c.name}${!hasSub ? ' <span style="color:#ff1744;font-size:0.55rem">(No Submission)</span>' : ''}</div>
      <div style="font-family:Orbitron,monospace;font-size:0.7rem;color:${xcAward > 0 ? 'var(--pflx-gold)' : '#555'};font-weight:700">${xcAward > 0 ? '+' + xcAward + ' XC' : '0 XC'}</div>
    </div>`;
  }).join('');

  const noSubmission = !didSubmit;
  const isWinner = match.winner === state.player?.id;

  return `<div class="esports-results">
    ${match.coverImage ? `<img src="${match.coverImage}" style="width:100%;max-height:140px;object-fit:cover;border-radius:12px;margin-bottom:16px;opacity:0.6" />` : ''}
    <div class="er-trophy">${noSubmission ? '⚠️' : (isSolo ? '⭐' : '🏆')}</div>
    <div class="er-title">${noSubmission ? 'Challenge Incomplete' : (isSolo ? 'Challenge Complete' : 'Match Complete')}</div>
    <div class="er-mode">${match.modeIcon} ${match.modeName} • ${match.difficulty} • ${match.playMode}</div>

    ${noSubmission ? `<div style="background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.3);border-radius:12px;padding:16px;margin:16px 0;text-align:center">
      <div style="font-family:Orbitron,monospace;font-size:0.8rem;color:#ff1744;font-weight:700">No Entry Submitted</div>
      <div style="font-size:0.65rem;color:#888;margin-top:6px">You must submit work to earn rewards. Better luck next time!</div>
    </div>` : (winner ? `<div class="er-winner">
      <div class="erw-label">${isSolo ? 'Completed By' : '👑 Champion'}</div>
      <div class="erw-name">${winner.brand || winner.name}</div>
    </div>` : '<div style="font-size:14px;color:#888;margin-bottom:20px">No winner determined</div>')}

    ${!noSubmission ? (() => {
      // Collect all earned badge IDs
      const earnedBadgeIds = [...partBadgeIds];
      if (isWinner) earnedBadgeIds.push(...winBadgeIds);
      // Build animated badge reveal cards with staggered delays
      const badgeRevealCards = earnedBadgeIds.map((bid, i) => {
        const b = PFLX_BADGES.find(x => x.id === bid) || { name: bid, image: '', icon: '🏅', xc: 0 };
        const delay = 0.3 + (i * 0.25);
        return `<div class="badge-reveal" style="animation-delay:${delay}s">
          ${b.image ? `<img src="${b.image}" class="shine" alt="${b.name}" />` : `<div style="width:56px;height:56px;border-radius:10px;background:rgba(255,215,64,0.15);border:2px solid rgba(255,215,64,0.4);display:flex;align-items:center;justify-content:center;font-size:1.8rem">${b.icon}</div>`}
          <div class="badge-reveal-name">${b.name}</div>
          ${b.xc ? `<div class="badge-reveal-xc">+${b.xc} XC</div>` : ''}
        </div>`;
      }).join('');

      return `
      <div style="font-family:Orbitron,monospace;font-size:0.6rem;font-weight:700;color:var(--pflx-gold);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;opacity:0;animation:badgePopIn 0.4s 0.1s forwards">Badges Earned</div>
      <div class="badge-reveal-container">${badgeRevealCards}</div>

      <div class="er-rewards-segmented">
        <div class="er-segment">
          <div class="er-seg-title">🏅 All Participants</div>
          <div class="er-reward"><div class="err-val">+${xcParticipate} XC</div><div class="err-label">Participation Reward</div></div>
          <div class="er-badge-list">${partBadgeHTML}</div>
        </div>
        ${isWinner ? `<div class="er-segment winner-seg">
          <div class="er-seg-title">🏆 Winner Bonus</div>
          <div class="er-reward"><div class="err-val">+${xcWin} XC</div><div class="err-label">${isSolo ? 'Completion Reward' : 'Winner Reward'}</div></div>
          <div class="er-badge-list">${winBadgeHTML}</div>
        </div>` : ''}
        <div class="er-reward" style="margin-top:12px"><div class="err-val">${match.xcMult}x</div><div class="err-label">XC Multiplier</div></div>
      </div>`;
    })() : `<div class="er-rewards">
      <div class="er-reward"><div class="err-val" style="color:#ff1744">0 XC</div><div class="err-label">No Reward</div></div>
    </div>`}

    ${!isSolo ? `<div class="er-standings"><h4>Final Standings</h4>${standingRows}</div>` : ''}

    <button class="btn-arena btn-arena-gold" style="font-size:0.8rem;padding:14px 32px" onclick="esportsGoHub()">🏟️ Back to Challenges</button>
  </div>`;
}

// ── Master Esports Router ──
function renderEsportsScreen() {
  if (esportsState.view === 'lobby') return renderEsportsLobby();
  if (esportsState.view === 'match') return renderEsportsMatch();
  if (esportsState.view === 'judging') return renderEsportsJudging();
  if (esportsState.view === 'results') return renderEsportsResults();
  return renderEsportsHub();
}

// Init
render();
</script>
</body>
</html>
